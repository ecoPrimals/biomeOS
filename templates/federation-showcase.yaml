# Federation Showcase BYOB Manifest
# Comprehensive demonstration of the complete ecoPrimals ecosystem
# Pure Rust implementation showcasing all Primals working together

name: federation-showcase
description: "Complete ecoPrimals federation showcase across basement towers"
version: "1.0.0"

# Team configuration
team:
  id: federation-showcase
  name: "EcoPrimals Showcase Team"
  description: "Demonstrating complete ecosystem federation capabilities"

# Federation configuration
federation:
  enabled: true
  deployment_strategy: "ecosystem_wide"
  coordination_mode: "distributed"
  security_level: "maximum"
  
  # Network configuration
  networking:
    proximity_optimization: true
    mesh_enabled: true
    encryption: "beardog_bstp"
    
  # Discovery configuration
  discovery:
    protocols: ["mdns", "upnp", "stun", "beardog"]
    global_reach: true
    bootstrap_nodes: ["tower-1", "tower-2", "tower-3"]

# Resource allocation across federation
quotas:
  total_cpu_cores: 64
  total_memory_gb: 256
  total_storage_tb: 16
  total_network_gbps: 50
  max_services: 20
  max_teams: 5

# Complete ecosystem services
services:
  # Songbird - Coordination and orchestration
  songbird-federation:
    image: "songbird-federation:latest"
    build:
      context: "songbird"
      dockerfile: "Dockerfile.federation"
      
    resources:
      cpu: 4
      memory: 8GB
      storage: 20GB
      
    placement:
      strategy: "federation_master"
      prefer_capabilities: ["coordination", "orchestration"]
      prefer_nodes: ["tower-1"]
      
    environment:
      RUST_LOG: "info"
      SONGBIRD_MODE: "federation_master"
      ECOSYSTEM_INTEGRATION: "full"
      PRIMAL_COORDINATION: "enabled"
      
    ports:
      - "8000:8000"   # Federation API
      - "8001:8001"   # Primal coordination
      - "8002:8002"   # Team workspace management
      
    volumes:
      - name: "federation-state"
        mount: "/var/lib/songbird/federation"
        size: "10GB"

  # BearDog - Security and networking
  beardog-federation:
    image: "beardog-federation:latest"
    build:
      context: "beardog"
      dockerfile: "Dockerfile.federation"
      
    resources:
      cpu: 2
      memory: 4GB
      storage: 10GB
      
    placement:
      strategy: "security_distributed"
      prefer_capabilities: ["security", "networking"]
      distribute_across: ["all_towers"]
      
    environment:
      RUST_LOG: "info"
      BEARDOG_MODE: "federation_security"
      TUNNEL_PROTOCOL: "bstp"
      ENCRYPTION_LEVEL: "gaming_grade"
      SONGBIRD_INTEGRATION: "enabled"
      
    ports:
      - "9000:9000"   # Security API
      - "9001:9001"   # Tunnel endpoints
      - "9002:9002"   # Threat monitoring
      
    volumes:
      - name: "security-state"
        mount: "/var/lib/beardog/federation"
        size: "5GB"

  # NestGate - Storage federation
  nestgate-federation:
    image: "nestgate-federation:latest"
    build:
      context: "nestgate"
      dockerfile: "Dockerfile.federation"
      
    resources:
      cpu: 3
      memory: 6GB
      storage: 100GB
      
    placement:
      strategy: "storage_distributed"
      prefer_capabilities: ["storage", "zfs"]
      distribute_across: ["all_towers"]
      
    environment:
      RUST_LOG: "info"
      NESTGATE_MODE: "federation_storage"
      ZFS_FEDERATION: "enabled"
      CROSS_TOWER_REPLICATION: "enabled"
      SONGBIRD_INTEGRATION: "enabled"
      
    ports:
      - "7000:7000"   # Storage API
      - "7001:7001"   # ZFS management
      - "7002:7002"   # Cross-tower sync
      
    volumes:
      - name: "storage-pool"
        mount: "/var/lib/nestgate/federation"
        size: "50GB"

  # Toadstool - Compute federation
  toadstool-federation:
    image: "toadstool-federation:latest"
    build:
      context: "toadstool"
      dockerfile: "Dockerfile.federation"
      
    resources:
      cpu: 4
      memory: 8GB
      storage: 20GB
      
    placement:
      strategy: "compute_distributed"
      prefer_capabilities: ["compute", "containers"]
      distribute_across: ["all_towers"]
      
    environment:
      RUST_LOG: "info"
      TOADSTOOL_MODE: "federation_compute"
      CONTAINER_RUNTIME: "podman"
      COMPUTE_FEDERATION: "enabled"
      SONGBIRD_INTEGRATION: "enabled"
      
    ports:
      - "6000:6000"   # Compute API
      - "6001:6001"   # Container management
      - "6002:6002"   # Job scheduling
      
    volumes:
      - name: "compute-state"
        mount: "/var/lib/toadstool/federation"
        size: "10GB"

  # Squirrel - AI/ML federation
  squirrel-federation:
    image: "squirrel-federation:latest"
    build:
      context: "squirrel"
      dockerfile: "Dockerfile.federation"
      
    resources:
      cpu: 6
      memory: 12GB
      storage: 30GB
      gpu: 2
      
    placement:
      strategy: "ai_optimized"
      prefer_capabilities: ["ai", "ml", "gpu"]
      prefer_nodes: ["tower-2", "tower-3"]
      
    environment:
      RUST_LOG: "info"
      SQUIRREL_MODE: "federation_ai"
      ML_FRAMEWORK: "candle"
      GPU_ACCELERATION: "enabled"
      SONGBIRD_INTEGRATION: "enabled"
      
    ports:
      - "5000:5000"   # AI API
      - "5001:5001"   # ML training
      - "5002:5002"   # Model serving
      
    volumes:
      - name: "ai-models"
        mount: "/var/lib/squirrel/models"
        size: "20GB"

  # BiomeOS - Workspace management
  biomeos-federation:
    image: "biomeos-federation:latest"
    build:
      context: "biomeOS"
      dockerfile: "Dockerfile.federation"
      
    resources:
      cpu: 2
      memory: 4GB
      storage: 15GB
      
    placement:
      strategy: "workspace_management"
      prefer_capabilities: ["workspace", "byob"]
      prefer_nodes: ["tower-1"]
      
    environment:
      RUST_LOG: "info"
      BIOMEOS_MODE: "federation_workspace"
      BYOB_FEDERATION: "enabled"
      PRIMAL_INTEGRATION: "full"
      
    ports:
      - "4000:4000"   # Workspace API
      - "4001:4001"   # BYOB management
      - "4002:4002"   # Team isolation
      
    volumes:
      - name: "workspace-state"
        mount: "/var/lib/biomeos/federation"
        size: "10GB"

  # Federation Dashboard
  federation-dashboard:
    image: "federation-dashboard:latest"
    build:
      context: "ecoPrimals"
      dockerfile: "Dockerfile.dashboard"
      
    resources:
      cpu: 2
      memory: 4GB
      storage: 10GB
      
    placement:
      strategy: "user_interface"
      prefer_capabilities: ["frontend", "monitoring"]
      prefer_nodes: ["tower-1"]
      
    environment:
      RUST_LOG: "info"
      DASHBOARD_MODE: "federation_overview"
      PRIMAL_ENDPOINTS: "all"
      REAL_TIME_UPDATES: "enabled"
      
    ports:
      - "3000:3000"   # Web dashboard
      - "3001:3001"   # WebSocket API
      - "3002:3002"   # Metrics API
      
    volumes:
      - name: "dashboard-assets"
        mount: "/var/www/dashboard"
        size: "5GB"

  # Demo Team Workspaces
  demo-ai-research:
    image: "demo-ai-research:latest"
    build:
      context: "ecoPrimals/demos"
      dockerfile: "Dockerfile.ai-research"
      
    resources:
      cpu: 4
      memory: 8GB
      storage: 20GB
      gpu: 1
      
    placement:
      strategy: "ai_workload"
      prefer_capabilities: ["ai", "ml", "gpu"]
      prefer_nodes: ["tower-2"]
      
    environment:
      RUST_LOG: "info"
      DEMO_MODE: "ai_research"
      WORKLOAD_TYPE: "machine_learning"
      FEDERATION_INTEGRATION: "enabled"
      
    ports:
      - "8080:8080"   # Research API
      - "8888:8888"   # Jupyter interface
      
    volumes:
      - name: "research-data"
        mount: "/var/lib/research"
        size: "15GB"

  # Demo Gaming Tournament
  demo-gaming:
    image: "demo-gaming:latest"
    build:
      context: "ecoPrimals/demos"
      dockerfile: "Dockerfile.gaming"
      
    resources:
      cpu: 4
      memory: 8GB
      storage: 15GB
      
    placement:
      strategy: "gaming_optimized"
      prefer_capabilities: ["gaming", "low_latency"]
      prefer_nodes: ["tower-2"]
      
    environment:
      RUST_LOG: "info"
      DEMO_MODE: "gaming_tournament"
      WORKLOAD_TYPE: "real_time_gaming"
      LATENCY_OPTIMIZATION: "enabled"
      
    ports:
      - "8090:8090"   # Game server
      - "8091:8091"   # Tournament API
      
    volumes:
      - name: "gaming-data"
        mount: "/var/lib/gaming"
        size: "10GB"

  # Demo Frontend Development
  demo-frontend:
    image: "demo-frontend:latest"
    build:
      context: "ecoPrimals/demos"
      dockerfile: "Dockerfile.frontend"
      
    resources:
      cpu: 2
      memory: 4GB
      storage: 10GB
      
    placement:
      strategy: "frontend_optimized"
      prefer_capabilities: ["frontend", "web"]
      prefer_nodes: ["tower-1"]
      
    environment:
      RUST_LOG: "info"
      DEMO_MODE: "frontend_development"
      WORKLOAD_TYPE: "web_application"
      CDN_INTEGRATION: "enabled"
      
    ports:
      - "3010:3010"   # Frontend app
      - "3011:3011"   # Development API
      
    volumes:
      - name: "frontend-assets"
        mount: "/var/www/frontend"
        size: "5GB"

# Service dependencies and coordination
dependencies:
  # Core federation dependencies
  songbird-federation:
    depends_on: []  # Root coordinator
    
  beardog-federation:
    depends_on: ["songbird-federation"]
    
  nestgate-federation:
    depends_on: ["songbird-federation", "beardog-federation"]
    
  toadstool-federation:
    depends_on: ["songbird-federation", "beardog-federation"]
    
  squirrel-federation:
    depends_on: ["songbird-federation", "toadstool-federation"]
    
  biomeos-federation:
    depends_on: ["songbird-federation", "nestgate-federation"]
    
  # Dashboard dependencies
  federation-dashboard:
    depends_on: ["songbird-federation", "beardog-federation", "nestgate-federation", "toadstool-federation"]
    
  # Demo workspace dependencies
  demo-ai-research:
    depends_on: ["squirrel-federation", "toadstool-federation", "nestgate-federation"]
    
  demo-gaming:
    depends_on: ["songbird-federation", "beardog-federation", "toadstool-federation"]
    
  demo-frontend:
    depends_on: ["biomeos-federation", "nestgate-federation", "toadstool-federation"]

# Networking configuration
networking:
  # Federation mesh
  mesh:
    enabled: true
    protocol: "beardog_bstp"
    encryption: "gaming_grade"
    discovery: "proximity_first"
    
  # Load balancing
  load_balancing:
    algorithm: "proximity_weighted"
    health_check_interval: "5s"
    failover_timeout: "30s"
    
  # Ingress endpoints
  ingress:
    enabled: true
    endpoints:
      - name: "federation-dashboard"
        service: "federation-dashboard"
        port: 3000
        path: "/"
        
      - name: "federation-api"
        service: "songbird-federation"
        port: 8000
        path: "/api"
        
      - name: "ai-research"
        service: "demo-ai-research"
        port: 8080
        path: "/ai"
        
      - name: "gaming-tournament"
        service: "demo-gaming"
        port: 8090
        path: "/gaming"
        
      - name: "frontend-dev"
        service: "demo-frontend"
        port: 3010
        path: "/frontend"

# Storage configuration
storage:
  # Federation state
  federation-state:
    type: "state"
    size: "10GB"
    replication: "cross_tower"
    consistency: "strong"
    
  # Security state
  security-state:
    type: "secrets"
    size: "5GB"
    replication: "secure_cross_tower"
    encryption: "hardware"
    
  # Distributed storage pool
  storage-pool:
    type: "distributed"
    size: "50GB"
    replication: "cross_tower"
    tier: "mixed"
    
  # AI models and data
  ai-models:
    type: "models"
    size: "20GB"
    tier: "hot"
    replication: "cross_tower"
    
  # Research data
  research-data:
    type: "data"
    size: "15GB"
    tier: "hot"
    replication: "optional"
    
  # Gaming data
  gaming-data:
    type: "data"
    size: "10GB"
    tier: "hot"
    replication: "local"

# Monitoring and observability
monitoring:
  # Federation health
  health:
    federation_topology: "10s"
    primal_coordination: "15s"
    cross_tower_connectivity: "20s"
    service_mesh_health: "30s"
    
  # Performance metrics
  metrics:
    coordination_latency: "5s"
    storage_throughput: "10s"
    compute_utilization: "15s"
    network_bandwidth: "10s"
    security_events: "5s"
    
  # Alerts
  alerts:
    - name: "federation_split_brain"
      condition: "coordinator_consensus == false"
      action: "emergency_coordination_recovery"
      
    - name: "cross_tower_connectivity_loss"
      condition: "tower_connectivity < 2"
      action: "enable_local_operation_mode"
      
    - name: "security_threat_detected"
      condition: "beardog_threat_level > 7"
      action: "isolate_affected_services"
      
    - name: "resource_exhaustion"
      condition: "total_resource_usage > 90%"
      action: "emergency_load_shedding"

# Federation scenarios
scenarios:
  # Complete ecosystem demo
  complete_ecosystem:
    description: "Demonstrate complete ecoPrimals ecosystem"
    duration: "30m"
    steps:
      - "initialize_federation"
      - "start_all_primals"
      - "establish_cross_tower_connectivity"
      - "deploy_demo_workloads"
      - "demonstrate_coordination"
      - "show_network_effects"
      
  # Multi-team deployment
  multi_team_deployment:
    description: "Deploy multiple teams across federation"
    duration: "20m"
    steps:
      - "deploy_ai_research_team"
      - "deploy_gaming_team"
      - "deploy_frontend_team"
      - "demonstrate_isolation"
      - "show_resource_sharing"
      
  # Disaster recovery
  disaster_recovery:
    description: "Demonstrate federation resilience"
    duration: "25m"
    steps:
      - "establish_baseline_operation"
      - "simulate_tower_failure"
      - "observe_automatic_failover"
      - "verify_service_continuity"
      - "demonstrate_recovery"
      
  # Global federation
  global_federation:
    description: "Connect to global federation network"
    duration: "45m"
    steps:
      - "establish_local_federation"
      - "connect_to_regional_peers"
      - "join_global_mesh"
      - "demonstrate_worldwide_coordination"
      - "show_proximity_optimization"

# Build configuration
build:
  rust:
    version: "1.70+"
    workspace: true
    features: ["federation", "all-primals"]
    
  container:
    registry: "localhost:5000"
    tag_format: "federation-showcase-{service}-{version}"
    
  dependencies:
    workspace_dependencies: true
    external_dependencies:
      - "tokio"
      - "serde"
      - "tonic"
      - "tracing"

# Deployment configuration
deployment:
  strategy: "coordinated_rolling"
  coordination_timeout: "300s"
  health_check_timeout: "60s"
  
  phases:
    - name: "foundation"
      services: ["songbird-federation", "beardog-federation"]
      
    - name: "infrastructure"
      services: ["nestgate-federation", "toadstool-federation"]
      
    - name: "applications"
      services: ["squirrel-federation", "biomeos-federation"]
      
    - name: "demonstrations"
      services: ["federation-dashboard", "demo-ai-research", "demo-gaming", "demo-frontend"]

# Documentation
documentation:
  overview: |
    This BYOB manifest demonstrates the complete ecoPrimals ecosystem
    working together in a federated configuration across multiple basement towers.
    
    It showcases:
    - Complete Primal coordination (Songbird, BearDog, NestGate, Toadstool, Squirrel)
    - Multi-tower federation with proximity optimization
    - Team workspace isolation with resource sharing
    - Gaming-grade security and performance
    - Real-time monitoring and visualization
    
  deployment: |
    # Deploy the complete federation showcase
    biomeos deploy federation-showcase.yaml
    
    # Monitor deployment progress
    biomeos status federation-showcase --watch
    
    # Access the federation dashboard
    open http://localhost:3000
    
    # Run demonstration scenarios
    biomeos exec federation-showcase federation-dashboard -- /scenarios/complete_ecosystem
    
  architecture: |
    The federation showcase demonstrates:
    
    1. **Songbird Federation**: Central coordination and orchestration
    2. **BearDog Security**: Gaming-grade encryption and tunneling
    3. **NestGate Storage**: Distributed storage with cross-tower replication
    4. **Toadstool Compute**: Container orchestration and job scheduling
    5. **Squirrel AI**: Distributed AI/ML workloads with GPU acceleration
    6. **BiomeOS Workspace**: Team isolation and BYOB management
    7. **Live Dashboard**: Real-time federation monitoring and control
    
    All components work together to create a self-contained, scalable,
    high-performance computing federation.

# Metadata
metadata:
  author: "EcoPrimals Team"
  category: "federation"
  tags: ["federation", "ecosystem", "showcase", "all-primals", "rust"]
  license: "MIT"
  rust_version: "1.70+"
  complexity: "advanced"
  estimated_resources: "64 CPU cores, 256GB RAM, 16TB storage"
  estimated_deployment_time: "15-30 minutes" 