niche:
  id: "custom-generic"
  name: "Custom Generic"
  description: "Generic template for creating custom biomes with any primal combination"
  category: "custom"
  difficulty: "advanced"
  version: "1.0.0"
  author: "biomeOS Team"
  
  features:
    - "Fully customizable primal selection"
    - "Open-ended configuration"
    - "Any service combination"
    - "Flexible workflows"
    - "Community extensible"
  
  required_primals:
    - "toadstool"  # For compute - always needed
  
  optional_primals:
    - "songbird"   # For networking
    - "nestgate"   # For storage
    - "squirrel"   # For AI/MCP capabilities
    - "beardog"    # For security
  
  customization_options:
    - id: "project_name"
      name: "Project Name"
      description: "Name of your custom biome"
      type: "text"
      default: "my-custom-biome"
      required: true
      validation_regex: "^[a-zA-Z0-9-_]+$"
      
    - id: "description"
      name: "Project Description"
      description: "Describe what your biome does"
      type: "text"
      default: "Custom biome for specialized use case"
      required: true
      
    - id: "enable_networking"
      name: "Enable Networking"
      description: "Include songbird for network capabilities"
      type: "boolean"
      default: false
      required: false
      
    - id: "enable_storage"
      name: "Enable Storage"
      description: "Include nestgate for storage capabilities"
      type: "boolean"
      default: false
      required: false
      
    - id: "enable_ai"
      name: "Enable AI/MCP"
      description: "Include squirrel for AI and MCP capabilities"
      type: "boolean"
      default: false
      required: false
      
    - id: "enable_security"
      name: "Enable Security"
      description: "Include beardog for security features"
      type: "boolean"
      default: false
      required: false
      
    - id: "compute_resources"
      name: "Compute Resources"
      description: "Select compute resource allocation"
      type: "select"
      options:
        - "Light (2 CPU, 4GB RAM)"
        - "Medium (4 CPU, 8GB RAM)"
        - "Heavy (8 CPU, 16GB RAM)"
        - "Maximum (16 CPU, 32GB RAM)"
      default: "Medium (4 CPU, 8GB RAM)"
      required: true

  manifest_template: |
    metadata:
      version: "1.0.0"
      name: "{{project_name}}"
      description: "{{description}}"
      tags: ["custom", "generic", "{{project_name}}"]
      
    primals:
      compute:
        primal_type: "toadstool"
        version: ">=1.0.0"
        name: "{{project_name}}-compute"
        required: true
        config:
          container_runtime: "podman"
          {{#if_eq compute_resources "Light (2 CPU, 4GB RAM)"}}
          resource_pools:
            cpu: 2
            memory: "4GB"
            storage: "50GB"
          {{/if_eq}}
          {{#if_eq compute_resources "Medium (4 CPU, 8GB RAM)"}}
          resource_pools:
            cpu: 4
            memory: "8GB"
            storage: "100GB"
          {{/if_eq}}
          {{#if_eq compute_resources "Heavy (8 CPU, 16GB RAM)"}}
          resource_pools:
            cpu: 8
            memory: "16GB"
            storage: "200GB"
          {{/if_eq}}
          {{#if_eq compute_resources "Maximum (16 CPU, 32GB RAM)"}}
          resource_pools:
            cpu: 16
            memory: "32GB"
            storage: "500GB"
          {{/if_eq}}
        networking:
          host: "0.0.0.0"
          port: 8080
        expose: ["{{project_name}}.service"]
        
      {{#if enable_networking}}
      networking:
        primal_type: "songbird"
        version: ">=1.0.0"
        name: "{{project_name}}-network"
        required: false
        config:
          service_discovery: true
          load_balancing: true
          health_checks: true
        dependencies: ["compute"]
      {{/if}}
      
      {{#if enable_storage}}
      storage:
        primal_type: "nestgate"
        version: ">=1.0.0"
        name: "{{project_name}}-storage"
        required: false
        config:
          storage_type: "block"
          backup_enabled: true
          versioning: false
        dependencies: ["compute"]
      {{/if}}
      
      {{#if enable_ai}}
      ai:
        primal_type: "squirrel"
        version: ">=1.0.0"
        name: "{{project_name}}-ai"
        required: false
        config:
          mcp_enabled: true
          ai_models: ["general"]
          context_management: true
        dependencies: ["compute"]
      {{/if}}
      
      {{#if enable_security}}
      security:
        primal_type: "beardog"
        version: ">=1.0.0"
        name: "{{project_name}}-security"
        required: false
        config:
          encryption: true
          authentication: true
          authorization: true
        dependencies: ["compute"]
      {{/if}}
      
    services:
      main:
        name: "{{project_name}}-service"
        description: "Main service for {{project_name}}"
        primal: "compute"
        config:
          custom_service: true
          
    workflows:
      setup:
        name: "Setup Workflow"
        steps:
          - name: "Initialize Environment"
            type: "setup"
            config:
              custom_setup: true
              
          - name: "Start Services"
            type: "start"
            config:
              health_checks: true 