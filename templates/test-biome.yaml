apiVersion: biomeOS/v1
kind: Biome
metadata:
  name: basic-biome
  description: "Basic biome template"
  version: "1.0.0"

services:
  web-server:
    primal: toadstool
    runtime: Container
    image: nginx:alpine
    ports:
      - "80:80"
    resources:
      cpu: 1.0
      memory: 1073741824  # 1GB

  storage:
    primal: nestgate
    runtime: Native
    resources:
      storage: 10737418240  # 10GB

networking:
  load_balancing: true
  service_discovery: true

security:
  network_policies: true
  resource_quotas: true
