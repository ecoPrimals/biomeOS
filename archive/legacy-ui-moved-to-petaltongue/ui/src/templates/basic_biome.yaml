apiVersion: biome.io/v1
kind: Biome
metadata:
  name: basic-biome
  version: "1.0.0"
  description: "Basic biome with essential primals"

primals:
  toadstool:
    enabled: true
    priority: 2
    config:
      compute_nodes: 1
      memory_limit: "8Gi"
      
  songbird:
    enabled: true
    priority: 3
    config:
      orchestration_mode: "standard"
      
resources:
  limits:
    memory: "16Gi"
    cpu: "4"
    
networking:
  mode: "auto"
  
security:
  encryption: true 