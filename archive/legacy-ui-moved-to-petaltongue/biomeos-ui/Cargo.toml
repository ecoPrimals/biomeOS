[package]
name = "biomeos-ui"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "BiomeOS UI Components & Integration - Comprehensive UI backend with unified types"

[dependencies]
# BiomeOS ecosystem crates
biomeos-types = { path = "../biomeos-types" }
biomeos-manifest = { path = "../biomeos-manifest" }
biomeos-core = { path = "../biomeos-core" }

# Async runtime and utilities
tokio = { version = "1.0", features = ["full"] }
anyhow = { workspace = true }

# Serialization and data handling
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = { workspace = true }

# Date and time handling
chrono = { version = "0.4", features = ["serde"] }

# Unique identifiers
uuid = { workspace = true, features = ["v4", "serde"] }

# Logging and tracing
tracing = { workspace = true }

# Error handling
thiserror = "1.0"

# Validation utilities
regex = "1.10"
url = "2.4"

# File system operations
hostname = "0.3"

[dev-dependencies]
tokio-test = { workspace = true }
tempfile = "3.8"

[features]
default = ["live-backend"]
live-backend = []
