# biomeOS Cross-Compilation Configuration
# genomeBin Multi-Architecture Support
#
# biomeOS is pure Rust with zero C dependencies, making cross-compilation
# straightforward. Uses the same relocation-model=static approach as NestGate
# to avoid the musl ≤1.2.2 static-PIE segfault (Ubuntu 22.04 ships 1.2.2).
#
# Prerequisites:
#   rustup target add aarch64-unknown-linux-musl x86_64-unknown-linux-musl
#   sudo apt install gcc-aarch64-linux-gnu musl-tools

# ============================================================================
# ARM64 Targets
# ============================================================================

# ARM64 Linux (musl — static, fully portable)
# Used for: Pixel 8a, Raspberry Pi, ARM servers
# relocation-model=static prevents static-PIE segfault on musl ≤1.2.2
[target.aarch64-unknown-linux-musl]
linker = "aarch64-linux-gnu-gcc"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
    "-C", "relocation-model=static",
]

# ARM64 Linux (gnu — for development/testing)
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

# ============================================================================
# x86_64 Targets
# ============================================================================

# x86_64 Linux (musl — static, fully portable)
# Used for: LiveSpore USBs, NUC deployment, gate2
[target.x86_64-unknown-linux-musl]
linker = "musl-gcc"
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-static",
    "-C", "relocation-model=static",
]

# ============================================================================
# Convenience Aliases
# ============================================================================

[alias]
build-arm64 = "build --release --target aarch64-unknown-linux-musl -p biomeos"
build-x64 = "build --release --target x86_64-unknown-linux-musl -p biomeos"
build-all-arches = "build --release --target x86_64-unknown-linux-musl --target aarch64-unknown-linux-musl -p biomeos"
