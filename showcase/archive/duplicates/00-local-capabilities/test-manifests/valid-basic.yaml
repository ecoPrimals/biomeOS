metadata:
  name: "test-biome"
  version: "1.0.0"
  description: "Test biome for demo"

services:
  web:
    metadata:
      name: "web-service"
      version: "1.0.0"
    image: "nginx:latest"
    ports:
      - port: 8080
        protocol: "tcp"
    environment:
      - name: "ENV"
        value: "production"

dependencies:
  - name: "database"
    version: ">=1.0"

networks:
  default:
    driver: "bridge"
