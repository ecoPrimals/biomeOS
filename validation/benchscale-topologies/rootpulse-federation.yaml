metadata:
  name: rootpulse-federation
  description: "3-tower RootPulse federation with mDNS/UDP validation"
  version: "2.0"
  tags: ["biomeos", "rootpulse", "federation", "p2p", "mdns", "udp"]
  updated: "2025-12-28"
  architecture: "Pure mDNS/UDP ecosystem (no HTTP coordination!)"

# Multi-tower federation testing
# Validates RootPulse coordination via Songbird mDNS/UDP
# NO HTTP between primals - ecosystem mode only!

network:
  name: rootpulse-federation
  subnet: "10.61.0.0/24"
  # mDNS enabled across subnet
  mdns_enabled: true
  multicast_dns: true

nodes:
  # Tower 1: North America
  - name: tower-na
    image: ubuntu:22.04
    ram_mb: 4096
    vcpus: 2
    disk_gb: 30
    
    env:
      BIOMEOS_MODE: production
      BIOMEOS_NICHE: rootpulse
      ROOTPULSE_ROLE: tower
      ROOTPULSE_REGION: north-america
      TOWER_NAME: na
      
      # Ecosystem coordination (mDNS/UDP)
      PRIMAL_DISCOVERY: mdns
      COORDINATION_PROTOCOL: udp
      STANDALONE_HTTP: enabled  # For human/external access only
      ECOSYSTEM_HTTP: disabled   # NO HTTP between primals!
    
    network_conditions:
      latency_ms: 10
      packet_loss_percent: 0.1
      bandwidth_kbps: 1000000
    
    services:
      - name: biomeos
      - name: nestgate
        ecosystem_mode: mdns_udp
      - name: beardog
        ecosystem_mode: mdns_udp
      - name: songbird
        mode: ecosystem_only  # NO HTTP!
        discovery: mdns
        coordination: udp
    
    validation:
      tests:
        - name: tower_healthy
          command: biomeos status
          expect_exit_code: 0
        
        - name: mdns_discovery_working
          command: avahi-browse -t _songbird._tcp -r -p | grep -c "^="
          expect_output: ">=1"
  
  # Tower 2: Europe
  - name: tower-eu
    image: ubuntu:22.04
    ram_mb: 4096
    vcpus: 2
    disk_gb: 30
    
    env:
      BIOMEOS_MODE: production
      BIOMEOS_NICHE: rootpulse
      ROOTPULSE_ROLE: tower
      ROOTPULSE_REGION: europe
      TOWER_NAME: eu
      
      # Ecosystem coordination (mDNS/UDP)
      PRIMAL_DISCOVERY: mdns
      COORDINATION_PROTOCOL: udp
      STANDALONE_HTTP: enabled
      ECOSYSTEM_HTTP: disabled  # NO HTTP coordination!
    
    network_conditions:
      latency_ms: 80  # Transatlantic
      packet_loss_percent: 0.5
      bandwidth_kbps: 500000
    
    services:
      - name: biomeos
      - name: nestgate
        ecosystem_mode: mdns_udp
      - name: beardog
        ecosystem_mode: mdns_udp
      - name: songbird
        mode: ecosystem_only  # NO HTTP!
    
    validation:
      tests:
        - name: tower_healthy
          command: biomeos status
          expect_exit_code: 0
        
        - name: discovers_na_via_mdns
          command: avahi-browse -t _songbird._tcp -r -p | grep "tower-na"
          expect_exit_code: 0
  
  # Tower 3: Asia
  - name: tower-asia
    image: ubuntu:22.04
    ram_mb: 4096
    vcpus: 2
    disk_gb: 30
    
    env:
      BIOMEOS_MODE: production
      BIOMEOS_NICHE: rootpulse
      ROOTPULSE_ROLE: tower
      ROOTPULSE_REGION: asia
      TOWER_NAME: asia
      
      # Ecosystem coordination (mDNS/UDP)
      PRIMAL_DISCOVERY: mdns
      COORDINATION_PROTOCOL: udp
      STANDALONE_HTTP: enabled
      ECOSYSTEM_HTTP: disabled  # NO HTTP coordination!
    
    network_conditions:
      latency_ms: 150  # Transpacific
      packet_loss_percent: 1.0
      bandwidth_kbps: 300000
    
    services:
      - name: biomeos
      - name: nestgate
        ecosystem_mode: mdns_udp
      - name: beardog
        ecosystem_mode: mdns_udp
      - name: songbird
        mode: ecosystem_only  # NO HTTP!
    
    validation:
      tests:
        - name: tower_healthy
          command: biomeos status
          expect_exit_code: 0
        
        - name: discovers_federation_via_mdns
          command: avahi-browse -t _songbird._tcp -r -p | grep -cE "(tower-na|tower-eu)"
          expect_output: "2"

# Federation-level validation
validation:
  tests:
    - name: federation_discovery_mdns
      description: "All towers discover each other via Songbird mDNS (NOT HTTP!)"
      target: tower-na
      command: |
        # Check mDNS discovery (correct method)
        avahi-browse -t _songbird._tcp -r -p | grep -cE "tower-(eu|asia)"
      expect_output: "2"  # Should see 2 other towers via mDNS
    
    - name: no_http_federation_coordination
      description: "Verify NO HTTP used for federation coordination"
      target: tower-na
      command: |
        # Ensure NO HTTP connections to other towers
        ! netstat -an | grep ESTABLISHED | grep -E "10.61.0" | grep -E ":(2300|9020)"
      expect_exit_code: 0  # No HTTP connections = success
    
    - name: udp_coordination_active
      description: "Verify UDP coordination is active"
      target: tower-na
      command: |
        netstat -an | grep udp | grep -E "10.61.0"
      expect_exit_code: 0  # UDP connections exist
    
    - name: rootpulse_commit_propagation
      description: "Commit propagates via mDNS/UDP coordination"
      steps:
        - target: tower-na
          command: |
            cd /tmp/test-repo
            rootpulse init
            echo "federated commit via mDNS/UDP!" > file.txt
            rootpulse commit -m "Test federation via ecosystem"
            rootpulse push
        
        - target: tower-eu
          command: |
            # Wait for UDP replication
            sleep 10
            cd /tmp/test-repo
            rootpulse clone federation://tower-na/test-repo
            cat test-repo/file.txt
          expect_output: "federated commit via mDNS/UDP!"
        
        - target: tower-asia
          command: |
            cd /tmp/test-repo
            rootpulse clone federation://tower-na/test-repo
            cat test-repo/file.txt
          expect_output: "federated commit via mDNS/UDP!"
    
    - name: lineage_verification_p2p
      description: "BearDog lineage proofs valid across P2P federation"
      target: tower-eu
      command: |
        cd /tmp/test-repo
        rootpulse verify --lineage --all
      expect_exit_code: 0
    
    - name: performance_benchmark_udp
      description: "Measure UDP federation sync performance"
      target: tower-na
      command: |
        cd /tmp/bench-repo
        rootpulse init
        for i in {1..100}; do
          echo "$i" > file-$i.txt
          rootpulse commit -m "Commit $i"
        done
        time rootpulse push --federation
      max_duration_sec: 60
  
  # Success criteria
  success:
    - all_towers_healthy: true
    - federation_size: 3
    - mdns_discovery_working: true
    - no_http_coordination: true  # Critical!
    - udp_coordination_active: true
    - commit_propagation: true
    - lineage_valid: true
    - sync_time_acceptable: true

# Security validation
security:
  tests:
    - name: verify_ecosystem_security
      description: "Confirm mDNS/UDP used (more secure than HTTP)"
      checks:
        - no_http_between_towers: true
        - mdns_local_network_only: true
        - udp_application_encrypted: true
        - lineage_cryptographic_proof: true
        - zero_configuration_security: true


