#
# Method Stability Tiers — stadial readiness classification
#
# Every registered method has a stability tier:
#   stable       — API contract locked, breaking changes require deprecation cycle
#   maturing     — API shape may evolve, but semantics are fixed
#   experimental — subject to change or removal
#   internal     — not intended for external callers
#
# Format: method pattern → tier. Patterns use prefix matching:
#   "graph.*" matches all graph.* methods.

[metadata]
version = "1.0.0"
description = "biomeOS method stability tier annotations"
total_methods = 456

# ─── Stable (locked contract) ────────────────────────────────────────

[tiers.stable]
description = "API contract locked. Breaking changes require deprecation cycle."
methods = [
    "health.check",
    "health.liveness",
    "health.readiness",
    "capabilities.list",
    "capability.list",
    "capability.call",
    "capability.register",
