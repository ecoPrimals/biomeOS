# ------------------------------------------------------------------------------
# Data Domain (NestGate Live Providers)
# Scientific data access: NCBI genomes, NOAA weather, IRIS seismic
# NestGate acts as a data gateway — it owns the HTTP providers and
# exposes them via semantic capabilities routed through biomeOS.
# Added: Phase 1 groundSpring NUCLEUS integration (Feb 28, 2026)
# ------------------------------------------------------------------------------

[domains.data]
provider = "nestgate"
capabilities = [
    "data",
    "ncbi",
    "noaa",
    "iris",
    "metagenomics_data",
    "weather_data",
    "seismic_data"
]

[translations.data]
# NCBI E-utilities (genome, SRA, protein, nucleotide databases)
"data.ncbi_search" = { provider = "nestgate", method = "data.ncbi_search" }
"data.ncbi_fetch" = { provider = "nestgate", method = "data.ncbi_fetch" }
# NOAA Climate Data Online (GHCND daily weather observations)
"data.noaa_ghcnd" = { provider = "nestgate", method = "data.noaa_ghcnd" }
# IRIS FDSN (seismic station metadata and earthquake events)
"data.iris_stations" = { provider = "nestgate", method = "data.iris_stations" }
"data.iris_events" = { provider = "nestgate", method = "data.iris_events" }

# ------------------------------------------------------------------------------
# Science Domain (wetSpring)
# Biodiversity, spectral analysis, Anderson localization, NCBI data
# wetSpring operates as a science primal — it consumes ToadStool GPU
# primitives internally and NestGate for data, but exposes high-level
# science capabilities to the ecosystem.
# ------------------------------------------------------------------------------

[domains.science]
provider = "wetspring"
capabilities = [
    "science",
    "biodiversity",
    "spectral",
    "metagenomics",
    "kinetics",
    "monitoring"
]

[domains.neural_science]
provider = "neuralspring"
capabilities = [
    "spectral_analysis",
    "anderson_localization",
    "hessian_eigenanalysis",
    "agent_coordination",
    "training_trajectory"
]

[translations.science]
# Diversity pipeline: FASTQ → Shannon, Simpson, observed features, Bray-Curtis
"science.diversity" = { provider = "wetspring", method = "science.diversity" }
# Anderson localization spectral analysis (uses ToadStool GPU Lanczos internally)
"science.anderson" = { provider = "wetspring", method = "science.anderson" }
# NCBI data fetch routed through NestGate when available, sovereign fallback
"science.ncbi_fetch" = { provider = "nestgate", method = "storage.retrieve", fallback_provider = "wetspring" }
# ODE quorum sensing model (uses ToadStool batched RK4 internally)
"science.qs_model" = { provider = "wetspring", method = "science.qs_model" }
# Full pipeline: NCBI → diversity → Anderson → QS classification
"science.full_pipeline" = { provider = "wetspring", method = "science.full_pipeline" }
# Kinetics models (Gompertz, Monod, Haldane, first-order)
"science.kinetics.gompertz" = { provider = "wetspring", method = "science.kinetics.gompertz" }
"science.kinetics.first_order" = { provider = "wetspring", method = "science.kinetics.first_order" }
"science.kinetics.monod" = { provider = "wetspring", method = "science.kinetics.monod" }
"science.kinetics.haldane" = { provider = "wetspring", method = "science.kinetics.haldane" }
# Beta diversity (community comparison matrix)
"science.beta_diversity" = { provider = "wetspring", method = "science.beta_diversity" }
# Rarefaction curves (sampling depth analysis)
"science.rarefaction" = { provider = "wetspring", method = "science.rarefaction" }
# Non-negative matrix factorization (community typing)
"science.nmf" = { provider = "wetspring", method = "science.nmf" }
# Environmental monitoring pipeline
"science.monitoring" = { provider = "wetspring", method = "science.monitoring" }
# AI observation / attention / urgency routing (wetSpring brain)
"science.brain.observe" = { provider = "wetspring", method = "brain.observe" }
"science.brain.attention" = { provider = "wetspring", method = "brain.attention" }
"science.brain.urgency" = { provider = "wetspring", method = "brain.urgency" }
# Telemetry snapshot
"science.metrics" = { provider = "wetspring", method = "metrics.snapshot" }

# ------------------------------------------------------------------------------
# neuralSpring Science Capabilities
# Spectral analysis, Anderson localization, loss landscape, multi-agent coordination
# Uses ToadStool GPU (barracuda eigh_gpu, variance_gpu, etc.) internally
# ------------------------------------------------------------------------------
"science.spectral_analysis" = { provider = "neuralspring", method = "science.spectral_analysis" }
"science.anderson_localization" = { provider = "neuralspring", method = "science.anderson_localization" }
"science.hessian_eigen" = { provider = "neuralspring", method = "science.hessian_eigen" }
"science.agent_coordination" = { provider = "neuralspring", method = "science.agent_coordination" }
"science.ipr" = { provider = "neuralspring", method = "science.ipr" }
"science.disorder_sweep" = { provider = "neuralspring", method = "science.disorder_sweep" }
# Training trajectory spectral analysis (IPR/LSR/entropy evolution over epochs)
"science.training_trajectory" = { provider = "neuralspring", method = "science.training_trajectory" }

# ------------------------------------------------------------------------------
# Ecology Domain (airSpring)
# Agricultural & ecological science: ET₀, water balance, yield, soil, diversity
# airSpring operates as an ecology science primal — it consumes ToadStool GPU
# primitives internally (via barracuda) and NestGate for weather/NASS data,
# exposing high-level agricultural science capabilities to the ecosystem.
# Added: Phase 2 airSpring NUCLEUS integration (Mar 1, 2026)
# ------------------------------------------------------------------------------

[domains.ecology]
provider = "airspring"
capabilities = [
    "ecology",
    "et0",
    "irrigation",
    "water_balance",
    "yield",
    "agriculture",
    "soil_science",
    "biodiversity",
    "soil_physics",
    "crop_management",
    "drought",
    "statistics"
]

[translations.ecology]
# ── Evapotranspiration (7 methods) ──
# FAO-56 Penman-Monteith reference evapotranspiration
"ecology.et0_fao56" = { provider = "airspring", method = "science.et0_fao56" }
# Hargreaves-Samani (1985) temperature-based ET₀
"ecology.et0_hargreaves" = { provider = "airspring", method = "science.et0_hargreaves" }
# Priestley-Taylor (1972) radiation-based ET₀
"ecology.et0_priestley_taylor" = { provider = "airspring", method = "science.et0_priestley_taylor" }
# Makkink (1957) radiation-based ET₀
"ecology.et0_makkink" = { provider = "airspring", method = "science.et0_makkink" }
# Turc (1961) temperature-radiation ET₀
"ecology.et0_turc" = { provider = "airspring", method = "science.et0_turc" }
# Hamon (1961) temperature-based PET
"ecology.et0_hamon" = { provider = "airspring", method = "science.et0_hamon" }
# Blaney-Criddle (1950) temperature PET
"ecology.et0_blaney_criddle" = { provider = "airspring", method = "science.et0_blaney_criddle" }
# Thornthwaite (1948) monthly PET
"ecology.thornthwaite" = { provider = "airspring", method = "science.thornthwaite" }

# ── Water balance & yield ──
# FAO-56 field-scale water balance
"ecology.water_balance" = { provider = "airspring", method = "science.water_balance" }
# Stewart (1977) yield response to water stress
"ecology.yield_response" = { provider = "airspring", method = "science.yield_response" }
# Full ecology pipeline: ET₀ → water balance → yield (single call)
"ecology.full_pipeline" = { provider = "airspring", method = "ecology.full_pipeline" }

# ── Soil physics ──
# 1D Richards equation (van Genuchten-Mualem, implicit Euler + Picard)
"ecology.richards_1d" = { provider = "airspring", method = "science.richards_1d" }
# SCS Curve Number runoff (USDA SCS 1972)
"ecology.scs_cn_runoff" = { provider = "airspring", method = "science.scs_cn_runoff" }
# Green-Ampt (1911) infiltration model
"ecology.green_ampt" = { provider = "airspring", method = "science.green_ampt_infiltration" }
# Topp equation (1980) TDR dielectric → VWC
"ecology.soil_moisture" = { provider = "airspring", method = "science.soil_moisture_topp" }
# Saxton-Rawls (2006) pedotransfer functions
"ecology.pedotransfer" = { provider = "airspring", method = "science.pedotransfer_saxton_rawls" }

# ── Crop & irrigation ──
# FAO-56 dual crop coefficient (Chapters 7+11)
"ecology.dual_kc" = { provider = "airspring", method = "science.dual_kc" }
# SoilWatch 10 sensor calibration (Topp polynomial)
"ecology.sensor_cal" = { provider = "airspring", method = "science.sensor_calibration" }
# Growing degree-days (GDD)
"ecology.gdd" = { provider = "airspring", method = "science.gdd" }

# ── Drought & climate indices ──
# Standardized Precipitation Index (McKee et al. 1993)
"ecology.spi_drought_index" = { provider = "airspring", method = "science.spi_drought_index" }
# Autocorrelation function for time series
"ecology.autocorrelation" = { provider = "airspring", method = "science.autocorrelation" }
# Gamma CDF (regularized incomplete gamma)
"ecology.gamma_cdf" = { provider = "airspring", method = "science.gamma_cdf" }

# ── Statistical inference ──
# Bootstrap confidence intervals (Efron 1979)
"ecology.bootstrap_ci" = { provider = "airspring", method = "science.bootstrap_ci" }
# Jackknife confidence intervals (Quenouille 1956)
"ecology.jackknife_ci" = { provider = "airspring", method = "science.jackknife_ci" }

# ── Biodiversity ──
# Shannon/Simpson/Chao1 alpha diversity
"ecology.shannon" = { provider = "airspring", method = "science.shannon_diversity" }
# Bray-Curtis beta diversity (dissimilarity)
"ecology.bray_curtis" = { provider = "airspring", method = "science.bray_curtis" }

# ── Geophysics coupling ──
# Anderson soil-geophysics coupling chain
"ecology.anderson" = { provider = "airspring", method = "science.anderson_coupling" }

# ------------------------------------------------------------------------------
# Game Science Domain (ludoSpring)
# Ludology: game mechanics, interaction design, procedural generation,
# accessibility scoring, engagement metrics, Tufte-on-games analysis.
# ludoSpring is a science spring — it studies games as systems and provides
# validated interaction models that benefit every primal's UI.
# Added: Phase 2 ludoSpring scaffold (Mar 10, 2026)
# ------------------------------------------------------------------------------

[domains.game]
provider = "ludospring"
capabilities = [
    "game",
    "ludology",
    "interaction_design",
    "procedural_generation",
    "accessibility_scoring",
    "engagement_metrics"
]

[translations.game]
# Tufte constraint analysis on game/application UIs
"game.analyze_ui" = { provider = "ludospring", method = "game.analyze_ui" }
# Flow state evaluation (Csikszentmihalyi model)
"game.evaluate_flow" = { provider = "ludospring", method = "game.evaluate_flow" }
# Fitts's law interaction cost
"game.fitts_cost" = { provider = "ludospring", method = "game.fitts_cost" }
# Engagement metrics from behavior snapshot
"game.engagement" = { provider = "ludospring", method = "game.engagement" }
# Procedural noise field generation
"game.generate_noise" = { provider = "ludospring", method = "game.generate_noise" }
# Wave function collapse step (constraint propagation)
"game.wfc_step" = { provider = "ludospring", method = "game.wfc_step" }
# Accessibility dimension scoring
"game.accessibility" = { provider = "ludospring", method = "game.accessibility" }
# Dynamic difficulty adjustment recommendation
"game.difficulty_adjustment" = { provider = "ludospring", method = "game.difficulty_adjustment" }

# ── ContinuousExecutor: game loop tick and analysis capabilities ──
# Used by game_engine_tick.toml (60Hz) and ludospring_analysis_loop.toml (10Hz)
"game.tick_logic" = { provider = "ludospring", method = "game.tick_logic" }
"game.tick_physics" = { provider = "ludospring", method = "game.tick_physics" }
"game.poll_telemetry" = { provider = "ludospring", method = "game.poll_telemetry" }

