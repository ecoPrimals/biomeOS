# ==============================================================================
# SOCKET PATH TEMPLATES
# ==============================================================================
# Socket paths are resolved dynamically using these templates.
# Variables: {primal}, {family_id}, {xdg_runtime}, {uid}

[socket_templates]
# Priority order (highest to lowest)
priority = [
    "{primal}_socket_env",        # $BEARDOG_SOCKET, $SONGBIRD_SOCKET, etc.
    "xdg_runtime",                # $XDG_RUNTIME_DIR/biomeos/{primal}-{family}.sock
    "run_user",                   # /run/user/{uid}/biomeos/{primal}-{family}.sock
    "android_data",               # /data/local/tmp/biomeos/{primal}-{family}.sock
    "tmp_fallback"                # /tmp/{primal}-{family}.sock
]

[socket_templates.patterns]
xdg_runtime = "{xdg_runtime}/biomeos/{primal}-{family_id}.sock"
run_user = "/run/user/{uid}/biomeos/{primal}-{family_id}.sock"
android_data = "/data/local/tmp/biomeos/{primal}-{family_id}.sock"
tmp_fallback = "/tmp/{primal}-{family_id}.sock"

# ==============================================================================
# NOTES
# ==============================================================================
# 
# 1. Dynamic Registration: Primals register their capabilities at startup via
#    the NeuralAPI. This config provides fallback mappings only.
#
# 2. Socket Discovery: Socket paths are discovered dynamically using the
#    SocketNucleation system. Templates here are for documentation.
#
# 3. Evolution: As we migrate to full capability-based discovery, the
#    hardcoded fallbacks in neural_router.rs will be removed.
#
# 4. Sovereignty: Each primal is autonomous. This config does not create
#    dependencies - it only documents the capability translation layer.
