# ------------------------------------------------------------------------------
# Storage Domain (NestGate)
# Persistence, versioning, atomic operations
# ------------------------------------------------------------------------------

[domains.storage]
provider = "nestgate"
capabilities = [
    "storage",
    "versioning",
    "persistence"
]

[translations.storage]
"storage.put" = { provider = "nestgate", method = "storage.store" }
"storage.get" = { provider = "nestgate", method = "storage.retrieve" }
"storage.store" = { provider = "nestgate", method = "storage.store" }
"storage.retrieve" = { provider = "nestgate", method = "storage.retrieve" }
"storage.delete" = { provider = "nestgate", method = "storage.delete" }
"storage.list" = { provider = "nestgate", method = "storage.list" }
# Streaming / large-object operations (NestGate Session 43h)
"storage.store_blob" = { provider = "nestgate", method = "store_blob" }
"storage.retrieve_blob" = { provider = "nestgate", method = "retrieve_blob" }
"storage.retrieve_range" = { provider = "nestgate", method = "retrieve_range" }
"storage.object.size" = { provider = "nestgate", method = "object.size" }
"storage.namespaces.list" = { provider = "nestgate", method = "namespaces.list" }
"storage.stats" = { provider = "nestgate", method = "stats" }

# ------------------------------------------------------------------------------
# Compute Domain (ToadStool)
# Execution, compute, parsing, transformation
# ------------------------------------------------------------------------------

[domains.compute]
provider = "toadstool"
capabilities = [
    "compute",
    "execution",
    "parsing",
    "hardware_learning"
]

[translations.compute]
"compute.execute" = { provider = "toadstool", method = "execute_workload" }
"compute.submit" = { provider = "toadstool", method = "submit_workload" }
"compute.stop" = { provider = "toadstool", method = "stop_workload" }
"compute.parse" = { provider = "toadstool", method = "parse" }
"compute.transform" = { provider = "toadstool", method = "transform" }

# Hardware learning — vendor-neutral GPU init observation, recipe distillation,
# and cross-GPU application. Provided by toadStool hw-learn crate.
# See: HWLEARN_SOVEREIGN_HARDWARE_LEARNING_HANDOFF_MAR11_2026.md
"compute.hardware.observe" = { provider = "toadstool", method = "hw_learn.observe" }
"compute.hardware.distill" = { provider = "toadstool", method = "hw_learn.distill" }
"compute.hardware.apply" = { provider = "toadstool", method = "hw_learn.apply" }
"compute.hardware.share" = { provider = "toadstool", method = "hw_learn.share_recipe" }
"compute.hardware.status" = { provider = "toadstool", method = "hw_learn.status" }

