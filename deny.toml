# SPDX-License-Identifier: AGPL-3.0-only
# biomeOS dependency policy — enforced by `cargo deny check`

[advisories]
vulnerability = "deny"
unmaintained = "warn"
yanked = "warn"
notice = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "AGPL-3.0-only",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-DFS-2016",
    "Zlib",
]
copyleft = "warn"

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"
deny = [
    # C-binding crates banned for ecoBin compliance
    { name = "openssl-sys", wrappers = [] },
    { name = "openssl", wrappers = [] },
    { name = "native-tls", wrappers = [] },
    { name = "ring", wrappers = [] },
    { name = "aws-lc-sys", wrappers = [] },
    { name = "aws-lc-rs", wrappers = [] },
    { name = "zstd-sys", wrappers = [] },
    { name = "dirs-sys", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
