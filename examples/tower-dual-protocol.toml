# biomeOS Tower Configuration - Dual Protocol Example
# 
# This example demonstrates tarpc + JSON-RPC protocol selection
# for fractal and isomorphic deployments

[tower]
family = "nat0"
concurrent_startup = true

# ═══════════════════════════════════════════════════════════════════
# OPTION 1: Production Deployment (tarpc - Type-Safe)
# ═══════════════════════════════════════════════════════════════════
# Use this for:
#   - Production environments
#   - High-performance requirements
#   - Rust ↔ Rust communication
#   - Security-critical paths

[[primals]]
binary = "./primals/beardog"
provides = ["Security", "Encryption", "Trust"]
requires = []
protocol = "tarpc"  # Type-safe, high-performance

[primals.env]
BEARDOG_FAMILY_SEED = "Nat0C/G/b4B7u06n0r14SuZXrp/IZ/38fZHh8aJQMVg="
BEARDOG_FAMILY_ID = "nat0"
BEARDOG_NODE_ID = "tower1"
RUST_LOG = "info"

[[primals]]
binary = "./primals/songbird"
provides = ["Discovery"]
requires = ["Security"]
protocol = "tarpc"  # Type-safe communication with BearDog

[primals.env]
SONGBIRD_FAMILY_ID = "nat0"
SONGBIRD_NODE_ID = "tower1"
SECURITY_ENDPOINT = "tarpc+unix:///tmp/beardog-nat0-tower1.sock"
RUST_LOG = "info"

# ═══════════════════════════════════════════════════════════════════
# OPTION 2: Development Deployment (JSON-RPC - Flexible)
# ═══════════════════════════════════════════════════════════════════
# Use this for:
#   - Development environments
#   - Debugging and testing
#   - Cross-language clients
#   - Easy monitoring

# [[primals]]
# binary = "./primals/beardog"
# provides = ["Security", "Encryption", "Trust"]
# requires = []
# protocol = "jsonrpc"  # Human-readable, debuggable
# 
# [primals.env]
# BEARDOG_FAMILY_SEED = "Nat0C/G/b4B7u06n0r14SuZXrp/IZ/38fZHh8aJQMVg="
# BEARDOG_FAMILY_ID = "nat0"
# BEARDOG_NODE_ID = "tower1"
# RUST_LOG = "info"
# 
# [[primals]]
# binary = "./primals/songbird"
# provides = ["Discovery"]
# requires = ["Security"]
# protocol = "jsonrpc"  # Flexible, easy debugging
# 
# [primals.env]
# SONGBIRD_FAMILY_ID = "nat0"
# SONGBIRD_NODE_ID = "tower1"
# SECURITY_ENDPOINT = "jsonrpc+unix:///tmp/beardog-nat0-tower1.sock"
# RUST_LOG = "info"

# ═══════════════════════════════════════════════════════════════════
# OPTION 3: Auto-Detect (Recommended for Flexibility)
# ═══════════════════════════════════════════════════════════════════
# Use this for:
#   - Mixed deployments
#   - Runtime flexibility
#   - Server auto-detects protocol

# [[primals]]
# binary = "./primals/beardog"
# provides = ["Security", "Encryption", "Trust"]
# requires = []
# # No protocol specified - BearDog accepts both tarpc and JSON-RPC
# 
# [primals.env]
# BEARDOG_FAMILY_SEED = "Nat0C/G/b4B7u06n0r14SuZXrp/IZ/38fZHh8aJQMVg="
# BEARDOG_FAMILY_ID = "nat0"
# BEARDOG_NODE_ID = "tower1"
# RUST_LOG = "info"
# 
# [[primals]]
# binary = "./primals/songbird"
# provides = ["Discovery"]
# requires = ["Security"]
# protocol = "tarpc"  # Client chooses protocol
# 
# [primals.env]
# SONGBIRD_FAMILY_ID = "nat0"
# SONGBIRD_NODE_ID = "tower1"
# SECURITY_ENDPOINT = "unix:///tmp/beardog-nat0-tower1.sock"  # Server auto-detects
# RUST_LOG = "info"

# ═══════════════════════════════════════════════════════════════════
# OPTION 4: Fractal Deployment (Mixed Protocols)
# ═══════════════════════════════════════════════════════════════════
# Use this for:
#   - Optimize per component
#   - Core primals: tarpc (performance)
#   - Edge primals: JSON-RPC (flexibility)

# [[primals]]
# binary = "./primals/beardog"
# provides = ["Security"]
# protocol = "tarpc"  # Core primal - performance critical
# 
# [primals.env]
# BEARDOG_FAMILY_ID = "nat0"
# BEARDOG_NODE_ID = "tower1"
# 
# [[primals]]
# binary = "./primals/songbird"
# provides = ["Discovery"]
# requires = ["Security"]
# protocol = "tarpc"  # Rust ↔ Rust - use tarpc
# 
# [primals.env]
# SONGBIRD_NODE_ID = "tower1"
# SECURITY_ENDPOINT = "tarpc+unix:///tmp/beardog-nat0-tower1.sock"
# 
# [[primals]]
# binary = "./primals/toadstool"
# provides = ["Workload"]
