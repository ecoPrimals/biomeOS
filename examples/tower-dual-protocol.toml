# [primals.env]
# TOADSTOOL_NODE_ID = "tower1"

# ═══════════════════════════════════════════════════════════════════
# Protocol Selection Guide
# ═══════════════════════════════════════════════════════════════════
#
# Protocol Field:
#   - "tarpc": Type-safe, high-performance (bincode serialization)
#   - "jsonrpc": Flexible, human-readable (JSON serialization)
#   - Omit: Auto-detect based on first bytes received
#
# Endpoint URL Schemes:
#   - "tarpc+unix:///path/to/socket" - Explicit tarpc over Unix socket
#   - "jsonrpc+unix:///path/to/socket" - Explicit JSON-RPC over Unix socket
#   - "unix:///path/to/socket" - Auto-detect protocol
#   - "http://host:port" - HTTP (legacy, not port-free)
#
# Environment Variables (alternative to protocol field):
#   IPC_PROTOCOL=tarpc    # or jsonrpc
#   SECURITY_PROTOCOL=tarpc
#   
# Performance Comparison:
#   tarpc:    0.05ms latency, 20,000 ops/s, 2MB memory
#   JSON-RPC: 0.2ms latency, 5,000 ops/s, 8MB memory
#   HTTP:     2ms latency, 500 ops/s, 15MB memory
#
# Security Considerations:
#   tarpc: Type safety prevents injection, less attack surface
#   JSON-RPC: Human-readable (easier auditing), schema validation
#
# Debugging:
#   tarpc: Binary protocol (requires tools like hexdump)
#   JSON-RPC: Human-readable (curl, nc, jq work perfectly)
#
# Cross-Language Support:
#   tarpc: Rust only (native)
#   JSON-RPC: Any language (Python, JS, Go, etc.)

[health]
interval_secs = 30
timeout_secs = 5
recovery_attempts = 3

