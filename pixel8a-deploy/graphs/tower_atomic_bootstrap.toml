# Tower Atomic Bootstrap Graph
# Used by biomeOS in Bootstrap Mode to create the ecosystem foundation
#
# This graph creates the Tower Atomic (BearDog + Songbird)
# which serves as generation 0 security foundation for all other primals
#
# ✅ STATUS: OPERATIONAL - Sovereign Onion Service Ready (Feb 6, 2026)
# BearDog provides:
#   - Full crypto suite including SHA3-256 for .onion address derivation
#   - Ed25519/X25519/ChaCha20-Poly1305 for onion key exchange
#   - TRUE PRIMAL pattern: All crypto delegated via JSON-RPC
# Songbird provides:
#   - HTTP/HTTPS with Pure Rust TLS 1.3
#   - Sovereign Onion Service (Pure Rust, no Arti)
#   - Mesh relay, hole punching, STUN for NAT traversal
#   - TRUE PRIMAL pattern: Network only, crypto via BearDog

[graph]
id = "tower_atomic_bootstrap"
description = "Genesis: Create Tower Atomic (ecosystem security foundation)"
coordination = "Sequential"  # BearDog must start before Songbird

# Phase 1: Germinate BearDog (Crypto Foundation)
[[nodes]]
id = "germinate_beardog"
output = "beardog_genesis"
# Capability Categories: Register BearDog as provider for these capability namespaces
# These are used by capability.call() to discover the right primal socket
capabilities = ["crypto", "tls_crypto", "genetic", "security", "beacon"]

[nodes.primal]
by_capability = "security"  # Discovers beardog binary via capability

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"  # Can be overridden by executor

[nodes.operation.environment]
RUST_LOG = "beardog_tunnel=info"  # Enable BearDog v0.18.0 enhanced debug logging (uses info! level)

[nodes.constraints]
timeout_ms = 30000  # 30s to start

# Capability Translation: BearDog's semantic → actual method mappings
# Note: BearDog methods already use semantic namespaces (crypto., tls., etc.)
# BearDog v0.14.0: 24 crypto methods (8 core + 8 ECDSA/RSA + 4 genetic + 4 TLS)
#
# === API EVOLUTION TRANSLATIONS ===
# These mappings enable Songbird (and other primals) to call BearDog with
# evolving method names. Neural API translates semantic → actual at runtime.
#
[nodes.capabilities_provided]
# Core Crypto Operations (10 methods)
"crypto.generate_keypair" = "crypto.x25519_generate_ephemeral"
"crypto.ecdh_derive" = "crypto.x25519_derive_secret"
"crypto.derive_secret" = "crypto.x25519_derive_secret"  # Alias for Songbird compatibility
"crypto.encrypt" = "crypto.chacha20_poly1305_encrypt"
"crypto.decrypt" = "crypto.chacha20_poly1305_decrypt"
"crypto.hash" = "crypto.blake3_hash"
"crypto.hmac" = "crypto.hmac_sha256"
"crypto.sign" = "crypto.sign_ed25519"
"crypto.verify" = "crypto.verify_ed25519"
"sha256" = "crypto.sha256"  # Direct SHA-256 hash
"sha384" = "crypto.sha384"  # Direct SHA-384 hash
"hash_for_cipher" = "crypto.hash_for_cipher"  # Cipher-aware hashing (SHA-256 or SHA-384)

# === SONGBIRD TLS DIRECT MODE TRANSLATIONS ===
# When Songbird calls BearDog in direct mode (not via capability.call),
# it uses these short method names. Neural API maps them to BearDog's actual methods.
# This enables API evolution without changing Songbird's internal method names.
"x25519_generate_ephemeral" = "crypto.x25519_generate_ephemeral"
"x25519_diffie_hellman" = "crypto.x25519_derive_secret"
"x25519_derive_secret" = "crypto.x25519_derive_secret"
"chacha20_poly1305_encrypt" = "crypto.chacha20_poly1305_encrypt"
"chacha20_poly1305_decrypt" = "crypto.chacha20_poly1305_decrypt"
"aes128_gcm_encrypt" = "crypto.aes128_gcm_encrypt"
"aes128_gcm_decrypt" = "crypto.aes128_gcm_decrypt"
"aes256_gcm_encrypt" = "crypto.aes256_gcm_encrypt"
"aes256_gcm_decrypt" = "crypto.aes256_gcm_decrypt"
"blake3_hash" = "crypto.blake3_hash"
"hmac_sha256" = "crypto.hmac_sha256"

# AES-GCM Operations (4 methods) - NEW: For TLS 1.3 cipher suite support!
"crypto.decrypt_aes_128_gcm" = "crypto.aes128_gcm_decrypt"
"crypto.encrypt_aes_128_gcm" = "crypto.aes128_gcm_encrypt"
"crypto.decrypt_aes_256_gcm" = "crypto.aes256_gcm_decrypt"
"crypto.encrypt_aes_256_gcm" = "crypto.aes256_gcm_encrypt"

# ECDSA Signature Algorithms (4 methods) - Phase 1 & 2 (96% HTTPS coverage)
"crypto.sign_ecdsa_p256" = "crypto.sign_ecdsa_secp256r1"
"crypto.verify_ecdsa_p256" = "crypto.verify_ecdsa_secp256r1"
"crypto.sign_ecdsa_p384" = "crypto.sign_ecdsa_secp384r1"
"crypto.verify_ecdsa_p384" = "crypto.verify_ecdsa_secp384r1"

# RSA Signature Algorithms (4 methods) - Phase 4 (legacy + modern)
"crypto.sign_rsa_pkcs1" = "crypto.sign_rsa_pkcs1_sha256"
"crypto.verify_rsa_pkcs1" = "crypto.verify_rsa_pkcs1_sha256"
"crypto.sign_rsa_pss" = "crypto.sign_rsa_pss_sha256"
"crypto.verify_rsa_pss" = "crypto.verify_rsa_pss_sha256"

# TLS Crypto Operations (6 methods) - Phase 8, 9 & 10 (Pure Rust HTTPS complete!)
"tls.derive_secrets" = "tls.derive_secrets"
"tls_crypto.derive_handshake_secrets" = "tls.derive_handshake_secrets"  # Songbird capability.call
"tls_crypto.derive_application_secrets" = "tls.derive_application_secrets"  # Songbird capability.call
"tls_crypto.compute_finished_verify_data" = "tls.compute_finished_verify_data"  # Songbird capability.call
"tls.derive_handshake_secrets" = "tls.derive_handshake_secrets"  # Phase 9: Handshake traffic keys (CRITICAL!)
"tls.derive_application_secrets" = "tls.derive_application_secrets"  # Phase 8: Application traffic keys

# === SONGBIRD TLS DIRECT MODE - TLS KEY DERIVATION ===
# Songbird's TLS layer calls these methods directly (without namespace prefix)
"derive_handshake_secrets" = "tls.derive_handshake_secrets"
"derive_application_secrets" = "tls.derive_application_secrets"
"compute_finished_verify_data" = "tls.compute_finished_verify_data"
"derive_secrets" = "tls.derive_secrets"

# Genetic Lineage Operations (2 methods) - BearDog genetic verification
"verify_lineage" = "genetic.verify_lineage"
"generate_lineage_proof" = "genetic.generate_lineage_proof"
"tls.compute_finished_verify_data" = "tls.compute_finished_verify_data"  # Phase 10: Client Finished message (THE FINAL PIECE!)
"tls.sign_handshake" = "tls.sign_handshake"
"tls.verify_certificate" = "tls.verify_certificate"

# === BEACON GENETICS TRANSLATIONS (Dark Forest) ===
# These enable biomeOS BeaconGeneticsManager to orchestrate meetings
# using BearDog's crypto primitives via capability.call()
#
# Beacon Core Operations (6 methods) - BearDog beacon primitives
"beacon.generate" = "beacon.generate"            # Generate new beacon seed
"beacon.get_id" = "beacon.get_id"                # Get public beacon ID
"beacon.get_seed" = "beacon.get_seed"            # Get beacon seed (for meeting exchange)
"beacon.encrypt" = "beacon.encrypt"              # Encrypt with beacon seed
"beacon.decrypt" = "beacon.decrypt"              # Decrypt with beacon seed
"beacon.try_decrypt" = "beacon.try_decrypt"      # Try decrypt, return success/failure

# Lineage-Based Encryption (for seed storage at rest)
"crypto.encrypt_with_lineage" = "crypto.encrypt_with_lineage_key"
"crypto.decrypt_with_lineage" = "crypto.decrypt_with_lineage_key"

# Seed Derivation
"crypto.derive_child_seed" = "crypto.derive_child_seed"

# Genetic Crypto Operations (4 methods) - Phase 5
"genetic.derive_key" = "genetic.derive_lineage_key"
"genetic.mix_entropy" = "genetic.mix_entropy"
"genetic.verify_lineage" = "genetic.verify_lineage"
"genetic.generate_proof" = "genetic.generate_lineage_proof"

# === SOVEREIGN ONION SERVICE TRANSLATIONS (Feb 6, 2026) ===
# These enable Songbird's Sovereign Onion Service to delegate crypto to BearDog
# Pattern: TRUE PRIMAL - all crypto operations via BearDog
#
# SHA3-256 for .onion address derivation (Tor v3 spec)
"crypto.sha3_256" = "crypto.sha3_256"
"onion.hash_checksum" = "crypto.sha3_256"  # Semantic alias for onion address

# Ed25519 for .onion identity keys
"onion.generate_identity" = "crypto.ed25519_generate_keypair"
"crypto.ed25519_generate_keypair" = "crypto.ed25519_generate_keypair"
"sign_ed25519" = "crypto.sign_ed25519"
"verify_ed25519" = "crypto.verify_ed25519"

# X25519 for onion session keys  
"onion.session_key" = "crypto.x25519_generate_ephemeral"
"onion.derive_shared" = "crypto.x25519_derive_secret"

# ChaCha20-Poly1305 for onion data encryption
"onion.encrypt" = "crypto.chacha20_poly1305_encrypt"
"onion.decrypt" = "crypto.chacha20_poly1305_decrypt"

# HMAC for HKDF key derivation
"onion.hkdf_extract" = "crypto.hmac_sha256"
"onion.hkdf_expand" = "crypto.hmac_sha256"

# BearDog-prefixed methods (direct Songbird calls)
"beardog.crypto.sha3_256" = "beardog.crypto.sha3_256"
"beardog.crypto.sign_ed25519" = "beardog.crypto.sign_ed25519"
"beardog.crypto.verify_ed25519" = "beardog.crypto.verify_ed25519"
"beardog.crypto.x25519_generate_ephemeral" = "beardog.crypto.x25519_generate_ephemeral"
"beardog.crypto.x25519_derive_secret" = "beardog.crypto.x25519_derive_secret"
"beardog.crypto.chacha20_poly1305_encrypt" = "beardog.crypto.chacha20_poly1305_encrypt"
"beardog.crypto.chacha20_poly1305_decrypt" = "beardog.crypto.chacha20_poly1305_decrypt"
"beardog.crypto.hmac_sha256" = "beardog.crypto.hmac_sha256"

# Parameter Mappings: Translate semantic param names to actual param names
# Format: "semantic.capability" = { "semantic_param" = "actual_param" }
[nodes.parameter_mappings]
"crypto.ecdh_derive" = { "private_key" = "our_secret", "public_key" = "their_public" }
# Note: ECDSA and RSA methods use semantic parameter names (data, signature, public_key)
# so no parameter mapping needed for those methods

# Phase 2: Germinate Songbird (Network + BTSP)
[[nodes]]
id = "germinate_songbird"
depends_on = ["germinate_beardog"]  # CRITICAL: Wait for BearDog
output = "songbird_genesis"
# Capability Categories: Register Songbird as provider for these capability namespaces
# Feb 6, 2026: Added mesh, onion, relay, stun, punch for Sovereign NAT Traversal
capabilities = ["http", "discovery", "secure_http", "mesh", "onion", "relay", "stun", "punch"]

[nodes.primal]
by_capability = "discovery"  # Discovers songbird binary via capability

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

# Environment variables for Songbird
[nodes.operation.environment]
NEURAL_API_SOCKET = "/tmp/neural-api.sock"  # For capability translation routing (must match Neural API socket)
BEARDOG_SOCKET = "/run/user/1000/biomeos/beardog.sock"  # Security provider (modern XDG path)
CRYPTO_PROVIDER_SOCKET = "/run/user/1000/biomeos/beardog.sock"  # For Sovereign Onion crypto delegation
SONGBIRD_SECURITY_PROVIDER = "beardog"  # Use discovery, not hardcoded path
SONGBIRD_ONION_ENABLED = "true"  # Enable Sovereign Onion Service
SONGBIRD_MESH_ENABLED = "true"   # Enable distributed mesh relay
BIOMEOS_BIND_ALL = "true"  # IPv6 dual-stack [::] — accepts both IPv4 and IPv6
RUST_LOG = "songbird_http_client=info,songbird_sovereign_onion=debug"  # Enable INFO logging

# Genetic bonding: Songbird inherits from BearDog
# BEARDOG_SOCKET will be injected by executor (nucleation)

[nodes.constraints]
timeout_ms = 30000  # 30s to start

# Capability Translation: Songbird's semantic → actual method mappings
# NOTE: Songbird v5.12.3+ uses semantic names directly (http.request, not http_request)
[nodes.capabilities_provided]
"http.request" = "http.request"  # Songbird exposes http.request (no translation needed)
"http.get" = "http.get"          # Future: not yet implemented in Songbird
"http.post" = "http.post"        # Future: not yet implemented in Songbird
"discovery.announce" = "announce_capabilities"  # Actual method: announce_capabilities
"discovery.query" = "discover_by_capability"    # Actual method: discover_by_capability

# === SOVEREIGN ONION SERVICE - NETWORK CAPABILITIES (Feb 6, 2026) ===
# Mesh relay for distributed NAT traversal
"mesh.status" = "mesh.status"
"mesh.find_path" = "mesh.find_path"
"mesh.announce" = "mesh.announce"
"mesh.peers" = "mesh.list_peers"
"mesh.health_check" = "mesh.health_check"

# Hole punch coordination
"punch.request" = "punch.request"
"punch.status" = "punch.status"

# STUN for NAT type detection
"stun.discover" = "stun.get_public_address"
"stun.detect_nat_type" = "stun.detect_nat_type"

# Relay capabilities
"relay.serve" = "relay.serve"
"relay.status" = "relay.status"
"relay.allocate" = "relay.allocate"

# Sovereign Onion Service endpoints (Pure Rust, BearDog crypto)
"onion.create_service" = "onion.create_service"
"onion.get_address" = "onion.get_address"
"onion.connect" = "onion.connect"
"onion.accept" = "onion.accept"
"onion.status" = "onion.status"

# ═══════════════════════════════════════════════════════════════════════════════
# OPTIONAL ECOSYSTEM PRIMALS (Registered at runtime when started)
# ═══════════════════════════════════════════════════════════════════════════════

# Squirrel AI Orchestration (optional - started separately)
[[nodes]]
id = "register_squirrel"
output = "squirrel_registered"
capabilities = ["ai", "inference", "learning"]

[nodes.primal]
by_capability = "ai"

[nodes.operation]
name = "register_only"

[nodes.operation.params]
family_id = "${FAMILY_ID}"

# Squirrel uses simple method names (no prefix needed)
[nodes.capabilities_provided]
"ai.query" = "query_ai"
"ai.list_providers" = "list_providers"
"ai.announce" = "announce_capabilities"
"ai.health" = "health"
"ai.metrics" = "metrics"
"ai.discover_peers" = "discover_peers"
"ai.ping" = "ping"
"ai.execute_tool" = "execute_tool"

# Toadstool Universal Compute (optional - started separately)
[[nodes]]
id = "register_toadstool"
output = "toadstool_registered"
capabilities = ["compute", "workload", "orchestration"]

[nodes.primal]
by_capability = "compute"

[nodes.operation]
name = "register_only"

[nodes.operation.params]
family_id = "${FAMILY_ID}"

# Toadstool uses toadstool. prefix for core, resources. for compute orchestration
[nodes.capabilities_provided]
# Core Toadstool methods
"compute.health" = "toadstool.health"
"compute.version" = "toadstool.version"
"compute.capabilities" = "toadstool.query_capabilities"
# Collaborative Intelligence - Resource Estimation
"compute.estimate" = "resources.estimate"
"compute.validate" = "resources.validate_availability"
"compute.optimize" = "resources.suggest_optimizations"
# AI Provider - Local Compute (future)
"ai.local_inference" = "resources.estimate"  # Estimate before running
"ai.local_execute" = "resources.validate_availability"  # Validate resources

# ═══════════════════════════════════════════════════════════════════════════════
# SOVEREIGN ONION SERVICE INITIALIZATION (Feb 6, 2026)
# ═══════════════════════════════════════════════════════════════════════════════

# Phase 2a: Initialize Sovereign Onion Service
# - Starts the .onion listener on Songbird
# - Initializes mesh with our onion as bootstrap
# - BearDog handles all crypto (Ed25519, X25519, ChaCha20)
[[nodes]]
id = "init_sovereign_onion"
depends_on = ["germinate_songbird"]
output = "onion_initialized"

[nodes.operation]
name = "rpc_call"
target = "songbird"  # Target the Songbird primal

# Call onion.start to create .onion identity
[nodes.operation.params]
method = "onion.start"
params = { port = 3492 }

[nodes.constraints]
timeout_ms = 30000  # 30s for identity generation

# Phase 2b: Initialize Beacon Mesh with Onion Bootstrap
[[nodes]]
id = "init_beacon_mesh"
depends_on = ["init_sovereign_onion"]
output = "mesh_initialized"

[nodes.operation]
name = "rpc_call"
target = "songbird"

[nodes.operation.params]
method = "mesh.init"
# node_id and bootstrap_onions injected by executor from environment/onion output
params = { node_id = "${NODE_ID}", bootstrap_onions = [] }

[nodes.constraints]
timeout_ms = 10000

# Phase 2c: Announce as Family Relay (optional - makes this node a relay for others)
[[nodes]]
id = "announce_relay"
depends_on = ["init_beacon_mesh"]
output = "relay_announced"

[nodes.operation]
name = "rpc_call"
target = "songbird"

[nodes.operation.params]
method = "mesh.announce"
params = { as_relay = true, capabilities = ["relay", "stun", "onion"] }

[nodes.constraints]
timeout_ms = 5000

# ═══════════════════════════════════════════════════════════════════════════════
# VALIDATION
# ═══════════════════════════════════════════════════════════════════════════════

# Phase 3: Validate Tower Atomic Health
[[nodes]]
id = "validate_tower"
depends_on = ["germinate_beardog", "germinate_songbird", "init_sovereign_onion"]
output = "tower_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_btsp_tunnel = true  # Verify they can establish BTSP tunnel
check_onion = true  # Verify onion service is running (NEW - Feb 6, 2026)
timeout_seconds = 10

[nodes.constraints]
timeout_ms = 15000  # 15s for validation

