# Multi-Tier STUN/Relay Configuration
# biomeOS Sovereignty-First NAT Traversal
#
# Architecture:
#   Tier 1: Genetic Lineage Relay - Zero external trust, family-only
#   Tier 2: Self-Hosted STUN - Your infrastructure, verified
#   Tier 3: Public STUN - International meet-up, address discovery only
#   Tier 4: Rendezvous (Future) - Gaming platforms, friends
#
# Privacy Model:
#   - Tier 3 (public STUN) sees: Your IP:port, timing
#   - Tier 3 does NOT see: Beacon content, capabilities, lineage
#   - Tier 2 (self-hosted) sees: Everything (your server)
#   - Tier 1 (lineage) sees: Family-encrypted data only

[general]
enabled = true
strategy = "sovereignty-first"  # Options: sovereignty-first, fastest-first, lineage-only
tier_timeout_secs = 5

# ═══════════════════════════════════════════════════════════════════════════
# TIER 1: Genetic Lineage Relay (Highest Trust)
# ═══════════════════════════════════════════════════════════════════════════
# Family members relay for each other. Zero external dependencies.
# Uses BirdSong encrypted beacons for coordination.

[lineage]
enabled = true
prefer_lineage = true
max_lineage_hops = 3              # parent → grandparent → great-grandparent
relay_offer_mode = "automatic"    # Offer relay to all descendants
relay_bandwidth_limit_mbps = 100  # Cap bandwidth for relay service
max_concurrent_relays = 10        # Max simultaneous relay connections

# ═══════════════════════════════════════════════════════════════════════════
# TIER 2: Self-Hosted STUN Servers (High Trust, Verified)
# ═══════════════════════════════════════════════════════════════════════════
# Your own infrastructure. Second verification after public discovery.
# Pure Rust ecoPrimals sovereign relay. No coturn, no external TURN.
# Dark Forest beacon rendezvous replaces TURN for symmetric NAT.

# Tower (this machine) as sovereign beacon relay
# STATUS: SOVEREIGN MODE (Feb 7, 2026) - Pure Rust, Dark Forest gated
# Relay: Tower offers Dark Forest rendezvous at /api/v1/rendezvous/beacon
# DNS: tower.nestgate.io → IPv6/IPv4 direct connection
[[user_provided]]
address = "192.0.2.10:3478"    # Tower LAN address (Songbird STUN)
protocol = "udp"
priority = 1                      # Highest priority
enabled = true
verified = true                   # Your own infrastructure
vetted = false                    # Not community vetted (personal)
comment = "Tower self-hosted STUN (LAN) - Songbird pure Rust"

# Tower public endpoint (via DNS)
[[user_provided]]
address = "tower.nestgate.io:3492"  # Tower via DNS (IPv6 direct)
protocol = "tcp"
priority = 2
enabled = true
verified = true
vetted = false
comment = "Tower DNS beacon - IPv6 dual-stack, Dark Forest gated"

# HPC basement server (future)
# [[user_provided]]
# address = "hpc.local:3478"
# protocol = "udp"
# priority = 3
# enabled = false
# verified = true
# vetted = false
# comment = "HPC basement STUN server"

# ═══════════════════════════════════════════════════════════════════════════
# TIER 3: Public STUN Servers (Medium Trust, Address Discovery)
# ═══════════════════════════════════════════════════════════════════════════
# "International meet-up at neutral ground"
# Used for address discovery only - no beacon content exposed.
# Privacy: These servers see your IP:port but nothing else.

[public_stun]
enabled = true                    # Enable for cross-NAT convenience
use_as_fallback_only = true       # Only use if Tier 1-2 fail
rotate_servers = true             # Rotate to prevent tracking
rotation_interval_secs = 3600     # Rotate every hour

# Sovereignty-first: community-operated and open-source STUN servers only.
# No corporate surveillance infrastructure (Google, Cloudflare, etc.).
[[public_stun.servers]]
address = "stun.nextcloud.com:3478"
protocol = "udp"
priority = 1
enabled = true
verified = false
vetted = true
comment = "Nextcloud community (open-source, privacy-focused)"

[[public_stun.servers]]
address = "stun.stunprotocol.org:3478"
protocol = "udp"
priority = 2
enabled = true
verified = false
vetted = true
comment = "stunprotocol.org - community maintained, open protocol"

[[public_stun.servers]]
address = "stun.sip.us:3478"
protocol = "udp"
priority = 3
enabled = true
verified = false
vetted = true
comment = "SIP.US community STUN"

[[public_stun.servers]]
address = "stun.services:3478"
protocol = "udp"
priority = 4
enabled = true
verified = false
vetted = false
comment = "Generic community STUN service"

# ═══════════════════════════════════════════════════════════════════════════
# TIER 4: Rendezvous (Future - Low Trust)
# ═══════════════════════════════════════════════════════════════════════════
# Piggyback on gaming platforms for friend connections.
# Useful for "friend gaming" scenarios where convenience > sovereignty.

[rendezvous]
enabled = false  # Future feature

[rendezvous.steam]
enabled = false
use_steam_relay = false
comment = "Future: Steam NAT traversal integration"

[rendezvous.discord]
enabled = false
use_discord_relay = false
comment = "Future: Discord voice infrastructure"

# ═══════════════════════════════════════════════════════════════════════════
# ADVANCED SETTINGS
# ═══════════════════════════════════════════════════════════════════════════

[advanced]
parallel_attempts = false         # Sequential (sovereignty-first)
monitor_quality = true            # Track connection quality
auto_upgrade_to_direct = true     # Upgrade relay → direct when possible
upgrade_latency_threshold_ms = 50
upgrade_packet_loss_threshold_percent = 5.0
log_stun_attempts = true
log_relay_usage = true

[advanced.privacy]
randomize_timing = true           # Prevent traffic analysis
use_dark_forest_gating = true     # All relay connections require Dark Forest verification
minimal_metadata = true           # Strip unnecessary headers
