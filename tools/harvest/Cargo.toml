[package]
name = "biomeos-harvest"
version = "0.1.0"
edition = "2021"
authors = ["biomeOS Team"]
description = "Modern Rust-based primal harvesting system - NUCLEUS evolution"
license = "AGPL-3.0-or-later"
rust-version = "1.87"

[[bin]]
name = "biomeos-harvest"
path = "src/main.rs"

[dependencies]
clap = { version = "4.4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"
walkdir = "2.4"
sha2 = "0.10"
chrono = { version = "0.4", features = ["serde"] }

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true

# Standalone crate: parent `tools/` is a different workspace; this table roots Cargo here.
[workspace]

