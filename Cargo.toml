[workspace]
resolver = "2"
members = [
    "crates/biomeos-core",
    "crates/biomeos-manifest",
    "crates/biomeos-system",
    "crates/biomeos-primal-sdk",
    "crates/biomeos-ui",
    "federation",
    "ui",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["biomeOS Team"]
license = "MIT"
repository = "https://github.com/biomeOS/biomeOS"
homepage = "https://biomeOS.org"
documentation = "https://docs.biomeOS.org"
description = "biomeOS ecosystem workspace"
keywords = ["biomeos", "distributed", "sovereignty", "primals"]
categories = ["os", "distributed-systems", "virtualization"]

[workspace.dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "std"] }
clap = { version = "4.0", features = ["derive"] }
axum = { version = "0.7", features = ["ws"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors"] }
reqwest = { version = "0.11", features = ["json"] }

# Async and futures
futures = "0.3"
async-trait = "0.1"

# Serialization
toml = "0.8"
bincode = "1.3"

# Utilities
itertools = "0.12"
once_cell = "1.19"
dashmap = "5.5"

# Networking
hyper = { version = "1.0", features = ["full"] }
tungstenite = "0.21"
tokio-tungstenite = "0.21"

# Configuration and environment
config = "0.14"
dotenvy = "0.15"

# Testing
mockall = "0.12"
tempfile = "3.8"
criterion = "0.5"

# Documentation
mdbook = "0.4"

# Additional dependencies
validator = "0.16"
dirs = "5.0"
libc = "0.2"
num_cpus = "1.16"
rand = "0.8"
sha2 = "0.10"
base64 = "0.21"
tokio-test = "0.4"
walkdir = "2.4"
rfd = "0.14"
image = { version = "0.24", features = ["png", "jpeg"] }
env_logger = "0.11"
regex = "1.10"

[package]
name = "biomeos"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description.workspace = true
keywords.workspace = true
categories.workspace = true

[dependencies]
# Workspace dependencies
tokio.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
uuid.workspace = true
chrono.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
clap.workspace = true
axum.workspace = true
tower.workspace = true
tower-http.workspace = true
reqwest.workspace = true
futures.workspace = true
async-trait.workspace = true
toml.workspace = true
bincode.workspace = true
itertools.workspace = true
once_cell.workspace = true
dashmap.workspace = true
hyper.workspace = true
tungstenite.workspace = true
tokio-tungstenite.workspace = true
config.workspace = true
dotenvy.workspace = true

# Local crates
biomeos-core = { path = "crates/biomeos-core" }
biomeos-primal-sdk = { path = "crates/biomeos-primal-sdk" }

[dev-dependencies]
mockall.workspace = true
tempfile.workspace = true
criterion.workspace = true

[[bin]]
name = "demo_live_universal_ui"
path = "src/bin/demo_live_universal_ui.rs"

[[bin]]
name = "mock_primal_server"
path = "src/bin/mock_primal_server.rs"

[[bin]]
name = "songbird_universal_ui_demo"
path = "src/bin/songbird_universal_ui_demo.rs"

[[bin]]
name = "ecosystem-integration-demo"
path = "src/bin/ecosystem_integration_demo.rs"

[[bin]]
name = "simple-ecosystem-demo"
path = "src/bin/simple_ecosystem_demo.rs"

[features]
default = ["full"]
full = ["ui", "federation", "monitoring", "ai"]
ui = []
federation = []
monitoring = []
ai = []

[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"
debug-assertions = true
overflow-checks = true
lto = false
panic = "unwind"
incremental = true
codegen-units = 256
rpath = false

[profile.release]
opt-level = 3
debug = false
split-debuginfo = "packed"
debug-assertions = false
overflow-checks = false
lto = true
panic = "abort"
incremental = false
codegen-units = 1
rpath = false

[profile.test]
opt-level = 0
debug = true
debug-assertions = true
overflow-checks = true
lto = false
panic = "unwind"
incremental = true
codegen-units = 256
rpath = false 
[[bin]]
name = "live-integration-demo"
path = "src/bin/live_integration_demo.rs"

