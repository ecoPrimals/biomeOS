apiVersion: biomeOS/v1
kind: Biome
metadata:
  name: velocity-webapp
  version: "2.3.1"
  team: frontend-velocity
  description: "High-performance web application stack"
  tags:
    - frontend
    - react
    - nextjs
    - production

services:
  frontend:
    primal: toadstool     # Compute for Node.js
    runtime: native
    command: ["npm", "start"]
    environment:
      NODE_ENV: "production"
      PORT: "3000"
      REACT_APP_API_URL: "https://api.velocity-webapp.com"
    resources:
      cpu: 2.0
      memory: 4294967296  # 4GB
    health_check:
      command: ["curl", "-f", "http://localhost:3000/health"]
      interval_secs: 30

  api-gateway:
    primal: songbird      # Service mesh routing
    runtime: native
    command: ["./gateway"]
    environment:
      UPSTREAM_SERVICES: "frontend,backend"
      RATE_LIMIT: "1000"
      CORS_ORIGIN: "*"
    resources:
      cpu: 1.0
      memory: 1073741824  # 1GB

  asset-storage:
    primal: nestgate      # Static file storage
    runtime: native
    command: ["./cdn-server"]
    environment:
      STORAGE_PATH: "/assets"
      CACHE_DURATION: "86400"
    resources:
      storage: 53687091200  # 50GB

  redis-cache:
    primal: nestgate      # Fast caching
    runtime: native
    command: ["redis-server", "--port", "6379"]
    environment:
      REDIS_MAXMEMORY: "2gb"
      REDIS_POLICY: "allkeys-lru"
    resources:
      memory: 2147483648   # 2GB

networking:
  load_balancing: true
  cdn_integration: true
  ssl_termination: true

scaling:
  min_replicas: 2
  max_replicas: 10
  target_cpu: 70
  target_memory: 80

security:
  network_policies: true
  resource_quotas: true
  pod_security_standards: "restricted" 