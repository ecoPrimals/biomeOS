apiVersion: biomeOS/v1
kind: Biome
metadata:
  name: tournament-platform
  version: "1.5.0"
  team: tournament-masters
  description: "High-performance gaming tournament infrastructure"
  tags:
    - gaming
    - tournament
    - multiplayer
    - realtime

services:
  matchmaking:
    primal: songbird      # Player coordination
    runtime: native
    command: ["./matchmaker"]
    environment:
      MAX_PLAYERS_PER_MATCH: "64"
      REGION: "us-west"
      SKILL_MATCHING: "enabled"
      QUEUE_TIMEOUT: "30"
    resources:
      cpu: 4.0
      memory: 4294967296   # 4GB
    health_check:
      command: ["./health-check"]
      interval_secs: 15

  physics-engine:
    primal: toadstool     # Real-time simulation
    runtime: native
    command: ["./physics-server"]
    environment:
      TICK_RATE: "128"
      SIMULATION_MODE: "deterministic"
      COLLISION_DETECTION: "broad-phase"
      PHYSICS_THREADS: "8"
    resources:
      cpu: 8.0
      memory: 8589934592   # 8GB
    health_check:
      command: ["./physics-health"]
      interval_secs: 10

  game-server-1:
    primal: toadstool     # Game instance 1
    runtime: native
    command: ["./game-server", "--instance-id=1"]
    environment:
      MAX_PLAYERS: "64"
      MAP_SIZE: "large"
      ANTI_CHEAT: "enabled"
      SPECTATOR_MODE: "enabled"
    resources:
      cpu: 6.0
      memory: 6442450944   # 6GB

  game-server-2:
    primal: toadstool     # Game instance 2
    runtime: native
    command: ["./game-server", "--instance-id=2"]
    environment:
      MAX_PLAYERS: "64"
      MAP_SIZE: "large"
      ANTI_CHEAT: "enabled"
      SPECTATOR_MODE: "enabled"
    resources:
      cpu: 6.0
      memory: 6442450944   # 6GB

  game-state:
    primal: nestgate      # Fast state storage
    runtime: native
    command: ["./state-server"]
    environment:
      PERSISTENCE_MODE: "memory+disk"
      SNAPSHOT_INTERVAL: "60"
      STATE_COMPRESSION: "lz4"
    resources:
      storage: 107374182400  # 100GB
      memory: 4294967296   # 4GB RAM for caching
      iops: 50000
      
  leaderboard:
    primal: nestgate      # Tournament data
    runtime: native
    command: ["./leaderboard"]
    environment:
      UPDATE_INTERVAL: "1s"
      RANKING_ALGORITHM: "elo"
      SEASONAL_RESET: "enabled"
    resources:
      cpu: 1.0
      memory: 1073741824   # 1GB
      storage: 10737418240  # 10GB

  stream-relay:
    primal: songbird      # Live streaming
    runtime: native
    command: ["./stream-relay"]
    environment:
      STREAM_QUALITY: "1080p60"
      ENCODING: "h264"
      BITRATE: "6000"
      CHAT_ENABLED: "true"
    resources:
      cpu: 4.0
      memory: 3221225472   # 3GB

  anti-cheat:
    primal: toadstool     # Cheat detection
    runtime: native
    command: ["./anti-cheat-engine"]
    environment:
      DETECTION_MODE: "real-time"
      ML_MODEL: "latest"
      REPORTING: "enabled"
    resources:
      cpu: 2.0
      memory: 2147483648   # 2GB

networking:
  low_latency: true
  anti_cheat: true
  ddos_protection: true
  global_load_balancing: true

scaling:
  auto_scaling: true
  min_game_servers: 2
  max_game_servers: 20
  scale_trigger: "queue_length"
  scale_threshold: 10

security:
  player_authentication: true
  data_encryption: true
  audit_logging: true
  abuse_reporting: true

monitoring:
  player_metrics: true
  performance_metrics: true
  cheat_detection_logs: true
  match_replays: true 