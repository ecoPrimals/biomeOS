apiVersion: biomeOS/v1
kind: Biome
metadata:
  name: llm-training-cluster
  version: "1.0.0"
  team: dl-research
  description: "Distributed AI training environment"
  tags:
    - ai
    - machine-learning
    - gpu
    - distributed

services:
  training-coordinator:
    primal: songbird      # Distributed coordination
    runtime: native
    command: ["python", "coordinator.py"]
    environment:
      CLUSTER_SIZE: "8"
      MODEL_TYPE: "transformer"
      DISTRIBUTED_BACKEND: "nccl"
      MASTER_ADDR: "localhost"
      MASTER_PORT: "12345"
    resources:
      cpu: 4.0
      memory: 17179869184  # 16GB
    health_check:
      command: ["python", "health_check.py"]
      interval_secs: 60

  gpu-trainer-1:
    primal: toadstool     # GPU compute
    runtime: gpu
    command: ["python", "train.py", "--node-id=1"]
    environment:
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
      NCCL_DEBUG: "INFO"
      PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:512"
    resources:
      cpu: 16.0
      memory: 68719476736  # 64GB
      gpu: 4
      gpu_memory: 171798691840  # 160GB total GPU memory

  gpu-trainer-2:
    primal: toadstool     # Additional GPU compute
    runtime: gpu
    command: ["python", "train.py", "--node-id=2"]
    environment:
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
      NCCL_DEBUG: "INFO"
    resources:
      cpu: 16.0
      memory: 68719476736  # 64GB
      gpu: 4
      gpu_memory: 171798691840  # 160GB total GPU memory

  data-lake:
    primal: nestgate      # Massive dataset storage
    runtime: native
    command: ["./data-server"]
    environment:
      DATASET_PATH: "/datasets"
      CHECKPOINT_PATH: "/checkpoints"
      COMPRESSION: "lz4"
      SHARDING: "enabled"
    resources:
      storage: 1099511627776  # 1TB
      iops: 10000
      
  model-registry:
    primal: nestgate      # Model versioning
    runtime: native
    command: ["./registry"]
    environment:
      MODELS_PATH: "/models"
      VERSIONING: "semantic"
      METADATA_STORE: "postgres"
    resources:
      storage: 549755813888  # 512GB
      cpu: 2.0
      memory: 4294967296   # 4GB

  tensorboard:
    primal: songbird      # Monitoring dashboard
    runtime: native
    command: ["tensorboard", "--logdir=/logs", "--host=0.0.0.0"]
    environment:
      TENSORBOARD_PORT: "6006"
    resources:
      cpu: 1.0
      memory: 2147483648   # 2GB

networking:
  high_bandwidth: true
  multi_node: true
  infiniband: true
  gpu_direct: true

scaling:
  gpu_scaling: true
  checkpoint_resume: true
  fault_tolerance: true

security:
  model_encryption: true
  access_control: "rbac"
  audit_logging: true 