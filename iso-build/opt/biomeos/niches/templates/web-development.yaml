niche:
  id: "web-development"
  name: "Web Development"
  description: "Full-stack web development environment with modern frameworks"
  category: "web_development"
  difficulty: "beginner"
  version: "1.0.0"
  author: "biomeOS Team"
  
  features:
    - "Node.js & npm ecosystem"
    - "React/Vue/Angular support"
    - "Database integration"
    - "Hot reload development"
    - "Package management"
    - "Testing frameworks"
    - "CI/CD pipeline ready"
  
  required_primals:
    - "toadstool"  # For compute/containers
    - "songbird"   # For networking
  
  optional_primals:
    - "nestgate"   # For storage if needed
    - "squirrel"   # For AI/MCP capabilities
    - "beardog"    # For security
  
  customization_options:
    - id: "framework"
      name: "Frontend Framework"
      description: "Choose your preferred frontend framework"
      type: "select"
      options:
        - "React"
        - "Vue"
        - "Angular"
        - "Svelte"
        - "Next.js"
        - "Nuxt.js"
      default: "React"
      required: true
      
    - id: "backend"
      name: "Backend Framework"
      description: "Choose your backend framework"
      type: "select"
      options:
        - "Express.js"
        - "FastAPI"
        - "Django"
        - "Laravel"
        - "Spring Boot"
        - "ASP.NET Core"
      default: "Express.js"
      required: true
      
    - id: "database"
      name: "Database System"
      description: "Choose your database system"
      type: "select"
      options:
        - "PostgreSQL"
        - "MySQL"
        - "MongoDB"
        - "Redis"
        - "SQLite"
      default: "PostgreSQL"
      required: false
      
    - id: "project_name"
      name: "Project Name"
      description: "Name of your web project"
      type: "text"
      default: "my-web-app"
      required: true
      validation_regex: "^[a-zA-Z0-9-_]+$"
      
    - id: "port"
      name: "Development Port"
      description: "Port for development server"
      type: "number"
      default: 3000
      required: true
      min: 1000
      max: 65535

  # Template manifest that gets customized based on options
  manifest_template: |
    metadata:
      version: "1.0.0"
      name: "{{project_name}}-biome"
      description: "{{framework}} web development environment"
      tags: ["web", "development", "{{framework}}", "{{backend}}"]
      
    primals:
      compute:
        primal_type: "toadstool"
        version: ">=1.0.0"
        name: "web-compute"
        required: true
        config:
          container_runtime: "podman"
          images:
            - "node:18-alpine"
            {{#if_eq backend "FastAPI"}}
            - "python:3.11-slim"
            {{/if_eq}}
            {{#if_eq backend "Django"}}
            - "python:3.11-slim"
            {{/if_eq}}
          resource_pools:
            cpu: 4
            memory: "8GB"
            storage: "100GB"
        networking:
          host: "0.0.0.0"
          port: {{port}}
        expose: ["web.frontend", "web.backend"]
        
             networking:
         primal_type: "songbird"
         version: ">=1.0.0"
         name: "web-network"
         required: true
         config:
           ssl: true
           reverse_proxy: true
           rate_limiting: true
         dependencies: ["compute"]
         
       {{#if database}}
       storage:
         primal_type: "nestgate"
         version: ">=1.0.0"
         name: "web-storage"
         required: false
         config:
           database_type: "{{database}}"
           backup_enabled: true
           replication: false
         dependencies: ["compute"]
       {{/if}}
      
    services:
      frontend:
        name: "{{project_name}}-frontend"
        description: "{{framework}} frontend application"
        primal: "compute"
        config:
          framework: "{{framework}}"
          build_tool: "vite"
          hot_reload: true
          
      backend:
        name: "{{project_name}}-backend"
        description: "{{backend}} backend API"
        primal: "compute"
        config:
          framework: "{{backend}}"
          api_version: "v1"
          cors_enabled: true
          
      {{#if database}}
      database:
        name: "{{project_name}}-db"
        description: "{{database}} database"
        primal: "storage"
        config:
          database_type: "{{database}}"
          schema_migrations: true
      {{/if}}
      
    workflows:
      development:
        name: "Development Workflow"
        steps:
          - name: "Setup Environment"
            type: "setup"
            config:
              install_dependencies: true
              setup_database: {{#if database}}true{{else}}false{{/if}}
              
          - name: "Start Development Server"
            type: "start"
            config:
              hot_reload: true
              watch_files: true
              
          - name: "Run Tests"
            type: "test"
            config:
              unit_tests: true
              integration_tests: true
              
      production:
        name: "Production Deployment"
        steps:
          - name: "Build Application"
            type: "build"
            config:
              minify: true
              optimize: true
              
          - name: "Deploy to Production"
            type: "deploy"
            config:
              health_checks: true
              rollback_enabled: true 