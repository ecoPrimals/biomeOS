[package]
name = "biomeos-showcase"
version = "0.1.0"
edition = "2021"
authors = ["ecoPrimals Team"]
description = "BiomeOS ecosystem showcase and demonstrations"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# BiomeOS dependencies (for real orchestration)
biomeos-core = { path = "../crates/biomeos-core" }
biomeos-types = { path = "../crates/biomeos-types" }
biomeos-manifest = { path = "../crates/biomeos-manifest" }

[[bin]]
name = "showcase"
path = "src/main.rs"

[[bin]]
name = "local-capabilities"
path = "src/bin/local_capabilities.rs"

[[bin]]
name = "single-primal"
path = "src/bin/single_primal.rs"

[[bin]]
name = "multi-primal"
path = "src/bin/multi_primal.rs"
