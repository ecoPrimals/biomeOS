niche:
  id: "federation-aware"
  name: "Federation-Aware Deployment"
  description: "Demonstrates federated deployment across proximity-first network topology"
  category: "federation"
  difficulty: "advanced"
  version: "1.0.0"
  author: "ecoPrimals Team"
  
  features:
    - "Multi-tower deployment"
    - "Proximity-first placement"
    - "BearDog security integration"
    - "Songbird orchestration"
    - "Network effects optimization"
    - "Sovereign team deployment"
    - "Gaming-grade encryption"
  
  required_primals:
    - "songbird"   # For federation coordination
    - "beardog"    # For security and networking
    - "toadstool"  # For compute execution
  
  optional_primals:
    - "nestgate"   # For federated storage
    - "squirrel"   # For AI coordination
  
  customization_options:
    - id: "project_name"
      name: "Project Name"
      description: "Name of your federated project"
      type: "text"
      default: "my-federation-project"
      required: true
      validation_regex: "^[a-zA-Z0-9-_]+$"
      
    - id: "deployment_strategy"
      name: "Deployment Strategy"
      description: "How to deploy across the federation"
      type: "select"
      options:
        - "optimal_placement"
        - "local_only"
        - "regional_preferred"
        - "global_distributed"
      default: "optimal_placement"
      required: true
      
    - id: "security_level"
      name: "Security Level"
      description: "BearDog security configuration"
      type: "select"
      options:
        - "standard"
        - "enhanced"
        - "maximum"
        - "gaming_optimized"
      default: "enhanced"
      required: true
      
    - id: "max_latency_ms"
      name: "Maximum Latency (ms)"
      description: "Maximum acceptable latency for federation"
      type: "number"
      default: 50
      required: true
      min: 1
      max: 1000
      
    - id: "enable_cross_tower"
      name: "Enable Cross-Tower Deployment"
      description: "Allow deployment across multiple towers"
      type: "boolean"
      default: true
      required: false
      
    - id: "resource_tier"
      name: "Resource Tier"
      description: "Resource allocation tier"
      type: "select"
      options:
        - "Edge (mobile/laptop)"
        - "Tower (basement HPC)"
        - "Gateway (regional)"
        - "Relay (global mesh)"
      default: "Tower (basement HPC)"
      required: true

  manifest_template: |
    metadata:
      version: "1.0.0"
      name: "{{project_name}}-federated"
      description: "Federated deployment of {{project_name}}"
      tags: ["federation", "distributed", "{{deployment_strategy}}"]
      
    # Federation configuration
    federation:
      deployment_strategy: "{{deployment_strategy}}"
      security_level: "{{security_level}}"
      max_latency_ms: {{max_latency_ms}}
      cross_tower_enabled: {{enable_cross_tower}}
      
    primals:
      # Songbird for federation coordination
      coordination:
        primal_type: "songbird"
        version: ">=1.0.0"
        name: "{{project_name}}-coordination"
        required: true
        config:
          federation_enabled: true
          discovery_protocols: ["mdns", "upnp", "beardog"]
          route_optimization: true
          proximity_first: true
          network_topology: "auto"
        networking:
          port: 8080
        expose: ["federation.coordination", "service.discovery"]
        
      # BearDog for security and networking
      security:
        primal_type: "beardog"
        version: ">=1.0.0"
        name: "{{project_name}}-security"
        required: true
        config:
          security_level: "{{security_level}}"
          encryption_overhead_ms: 0.1  # Gaming-grade
          tunnel_protocol: "BSTP"
          key_rotation: "automatic"
          threat_detection: true
          zero_trust: true
        dependencies: ["coordination"]
        
      # Toadstool for compute execution
      compute:
        primal_type: "toadstool"
        version: ">=1.0.0"
        name: "{{project_name}}-compute"
        required: true
        config:
          container_runtime: "podman"
          {{#if_eq resource_tier "Edge (mobile/laptop)"}}
          resource_pools:
            cpu: 2
            memory: "4GB"
            storage: "50GB"
          {{/if_eq}}
          {{#if_eq resource_tier "Tower (basement HPC)"}}
          resource_pools:
            cpu: 16
            memory: "64GB"
            storage: "500GB"
            gpu: 4
          {{/if_eq}}
          {{#if_eq resource_tier "Gateway (regional)"}}
          resource_pools:
            cpu: 8
            memory: "32GB"
            storage: "200GB"
          {{/if_eq}}
          {{#if_eq resource_tier "Relay (global mesh)"}}
          resource_pools:
            cpu: 4
            memory: "16GB"
            storage: "100GB"
          {{/if_eq}}
          federation_aware: true
          placement_hints: ["{{deployment_strategy}}"]
        dependencies: ["coordination", "security"]
        
      # Optional federated storage
      storage:
        primal_type: "nestgate"
        version: ">=1.0.0"
        name: "{{project_name}}-storage"
        required: false
        config:
          storage_type: "zfs"
          federation_enabled: true
          cross_tower_replication: {{enable_cross_tower}}
          backup_strategy: "distributed"
          encryption: "beardog_integrated"
        dependencies: ["coordination", "security"]
        
    services:
      # Main application service
      application:
        name: "{{project_name}}-app"
        description: "Main application service"
        primal: "compute"
        config:
          federation_aware: true
          placement_strategy: "{{deployment_strategy}}"
          security_integration: "beardog"
          
        placement:
          {{#if_eq deployment_strategy "local_only"}}
          prefer_nodes: ["local"]
          max_latency_ms: 1
          {{/if_eq}}
          {{#if_eq deployment_strategy "regional_preferred"}}
          prefer_nodes: ["regional"]
          max_latency_ms: 45
          {{/if_eq}}
          {{#if_eq deployment_strategy "global_distributed"}}
          prefer_nodes: ["global"]
          max_latency_ms: 250
          {{/if_eq}}
          {{#if_eq deployment_strategy "optimal_placement"}}
          prefer_nodes: ["auto"]
          max_latency_ms: {{max_latency_ms}}
          {{/if_eq}}
          
      # Coordination service
      coordinator:
        name: "{{project_name}}-coordinator"
        description: "Federation coordination service"
        primal: "coordination"
        config:
          discovery_enabled: true
          route_optimization: true
          network_events: true
          security_events: true
          
    workflows:
      # Federation setup workflow
      federation_setup:
        name: "Federation Setup"
        steps:
          - name: "Discovery Phase"
            type: "discovery"
            config:
              protocols: ["mdns", "upnp", "beardog"]
              timeout_seconds: 300
              
          - name: "Security Establishment"
            type: "security"
            config:
              beardog_integration: true
              session_establishment: true
              threat_assessment: true
              
          - name: "Optimal Placement"
            type: "placement"
            config:
              strategy: "{{deployment_strategy}}"
              latency_target: {{max_latency_ms}}
              resource_optimization: true
              
          - name: "Service Deployment"
            type: "deploy"
            config:
              federation_aware: true
              health_checks: true
              monitoring: true
              
      # Runtime coordination workflow
      runtime_coordination:
        name: "Runtime Coordination"
        steps:
          - name: "Network Monitoring"
            type: "monitor"
            config:
              latency_tracking: true
              threat_detection: true
              performance_optimization: true
              
          - name: "Dynamic Rebalancing"
            type: "rebalance"
            config:
              trigger_threshold: "performance_degradation"
              rebalance_interval: "50ms"
              
          - name: "Security Updates"
            type: "security_update"
            config:
              key_rotation: "automatic"
              threat_intelligence: true
              compliance_monitoring: true 