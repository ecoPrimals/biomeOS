# biomeOS BYOB Manifest: multi-tower-federation.biome.yaml
#
# Deploys a multi-tower Songbird federation for global P2P coordination.
#
# This manifest demonstrates BiomeOS's capability-based orchestration
# of multiple Songbird towers working together in a federated mesh.
#
# Version: 1.0
# Date: December 26, 2025
#
apiVersion: biomeos.io/v1alpha1
kind: BiomeManifest
metadata:
  name: multi-tower-federation
  description: "Global P2P mesh with multi-tower Songbird federation."
  tags: ["federation", "multi-tower", "p2p", "songbird", "global"]
  authors: ["biomeOS Team"]

spec:
  # Define the Songbird towers in the federation
  towers:
    - name: tower-sf
      location:
        city: "San Francisco"
        country: "US"
        coordinates:
          latitude: 37.7749
          longitude: -122.4194
      
      primal_type: discovery
      image: "songbird/orchestrator:latest"
      
      capabilities:
        - name: "discovery:local"
          description: "Local service discovery within tower"
        - name: "discovery:federated"
          description: "Federated discovery across towers"
        - name: "routing:cross-tower"
          description: "Route connections across towers"
      
      resources:
        cpu: "1000m"
        memory: "512Mi"
      
      networking:
        ports:
          - port: 3000
            protocol: "tcp"
            description: "Songbird API endpoint"
          - port: 5353
            protocol: "udp"
            description: "mDNS for local discovery"
          - port: 7000
            protocol: "tcp"
            description: "Federation endpoint"
      
      federation:
        enabled: true
        federate_with:
          - "tower-ny"
          - "tower-lon"
        sync_interval_seconds: 30
        ttl_seconds: 300

    - name: tower-ny
      location:
        city: "New York"
        country: "US"
        coordinates:
          latitude: 40.7128
          longitude: -74.0060
      
      primal_type: discovery
      image: "songbird/orchestrator:latest"
      
      capabilities:
        - name: "discovery:local"
        - name: "discovery:federated"
        - name: "routing:cross-tower"
      
      resources:
        cpu: "1000m"
        memory: "512Mi"
      
      networking:
        ports:
          - port: 3000
            protocol: "tcp"
          - port: 5353
            protocol: "udp"
          - port: 7000
            protocol: "tcp"
      
      federation:
        enabled: true
        federate_with:
          - "tower-sf"
          - "tower-lon"
        sync_interval_seconds: 30
        ttl_seconds: 300

    - name: tower-lon
      location:
        city: "London"
        country: "UK"
        coordinates:
          latitude: 51.5074
          longitude: -0.1278
      
      primal_type: discovery
      image: "songbird/orchestrator:latest"
      
      capabilities:
        - name: "discovery:local"
        - name: "discovery:federated"
        - name: "routing:cross-tower"
      
      resources:
        cpu: "1000m"
        memory: "512Mi"
      
      networking:
        ports:
          - port: 3000
            protocol: "tcp"
          - port: 5353
            protocol: "udp"
          - port: 7000
            protocol: "tcp"
      
      federation:
        enabled: true
        federate_with:
          - "tower-sf"
          - "tower-ny"
        sync_interval_seconds: 30
        ttl_seconds: 300

  # Define orchestration behavior
  orchestration:
    # Tower startup sequence
    startup_sequence:
      - service: tower-sf
        depends_on: []
        health_check:
          path: "/health"
          port: 3000
          interval_seconds: 5
          timeout_seconds: 2
      
      - service: tower-ny
        depends_on: []
        health_check:
          path: "/health"
          port: 3000
          interval_seconds: 5
          timeout_seconds: 2
      
      - service: tower-lon
        depends_on: []
        health_check:
          path: "/health"
          port: 3000
          interval_seconds: 5
          timeout_seconds: 2
    
    # Federation configuration
    federation:
      enabled: true
      
      # Discovery behavior
      discovery:
        scope: "federated"  # "local" or "federated"
        prefer_local: true   # Try local tower first
        fallback_to_federated: true
        
        # Geographic optimization
        geographic_optimization:
          enabled: true
          local_threshold_ms: 20
          regional_threshold_ms: 60
          global_threshold_ms: 120
      
      # Health monitoring
      health:
        tower_health_interval_seconds: 10
        federation_health_interval_seconds: 30
        unhealthy_threshold: 3
        
        # Tower failure behavior
        failure_handling:
          auto_failover: true
          migrate_nodes: true
          notify_federation: true
      
      # Load balancing
      load_balancing:
        enabled: true
        algorithm: "geographic-aware"  # "round-robin", "least-conn", "geographic-aware"
        max_nodes_per_tower: 1000

  # Environment-specific overrides
  environments:
    development:
      towers:
        - name: tower-sf
          resources:
            cpu: "250m"
            memory: "128Mi"
        - name: tower-ny
          resources:
            cpu: "250m"
            memory: "128Mi"
        - name: tower-lon
          resources:
            cpu: "250m"
            memory: "128Mi"
      
      federation:
        sync_interval_seconds: 60
    
    production:
      towers:
        - name: tower-sf
          resources:
            cpu: "2000m"
            memory: "2Gi"
        - name: tower-ny
          resources:
            cpu: "2000m"
            memory: "2Gi"
        - name: tower-lon
          resources:
            cpu: "2000m"
            memory: "2Gi"
      
      federation:
        sync_interval_seconds: 15
        health:
          tower_health_interval_seconds: 5
          unhealthy_threshold: 5
      
      load_balancing:
        max_nodes_per_tower: 10000

