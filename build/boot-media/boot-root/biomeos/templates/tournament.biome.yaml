apiVersion: biomeOS/v1
kind: Biome
metadata:
  name: gaming-biome
  description: "Gaming tournament template"
  version: "1.0.0"

services:
  game-server:
    primal: toadstool
    runtime: Native
    ports:
      - "7777:7777"
    resources:
      cpu: 8.0
      memory: 8589934592  # 8GB

  matchmaking:
    primal: songbird
    runtime: Native
    ports:
      - "8080:8080"
    resources:
      cpu: 4.0
      memory: 4294967296  # 4GB

  leaderboard:
    primal: nestgate
    runtime: Native
    resources:
      storage: 10737418240  # 10GB

networking:
  low_latency: true
  anti_cheat: true

scaling:
  auto_scaling: true
  min_game_servers: 2
  max_game_servers: 20
