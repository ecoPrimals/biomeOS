# biome.yaml - Enhanced with Crypto Lock Security
# Demonstrates biomeOS crypto lock system for sovereign control

metadata:
  version: "1.0.0"
  name: "sovereign-secure-biome" 
  description: "Fully secured biome with crypto locks and AI exception"
  tags: ["sovereign", "secure", "ai-enabled", "enterprise"]
  author: "biomeOS Team"
  created: "2025-01-15T10:00:00Z"

# Primals section with mandatory crypto locks (except AI APIs)
primals:
  
  # ===========================================
  # CORE PRIMALS - Crypto Lock Required
  # ===========================================
  
  compute:
    primal_type: "toadstool"
    version: ">=1.0.0"
    name: "primary-compute"
    required: true
    # CRYPTO LOCK REQUIRED
    crypto_lock:
      lock_type: "sovereign"
      proof_file: "/secure/toadstool.lock"
      capabilities: ["compute.*", "vm.*", "container.*"]
      restrictions:
        geographic: ["self-hosted"]
        audit_trail: true
    config:
      container_runtime: "podman"
      vm_engine: "qemu"
      resource_pools:
        cpu: 8
        memory: "16GB"
        storage: "500GB"
    networking:
      host: "0.0.0.0" 
      port: 8080

  orchestration:
    primal_type: "songbird"
    version: "^2.0.0"
    name: "service-mesh"
    required: true
    # CRYPTO LOCK REQUIRED
    crypto_lock:
      lock_type: "sovereign"
      proof_file: "/secure/songbird.lock"
      capabilities: ["orchestration.*", "service.*", "mesh.*"]
    config:
      service_discovery: true
      load_balancing: "round_robin"
      health_checks: true
    dependencies: ["compute"]

  storage:
    primal_type: "nestgate"
    version: ">=3.0.0" 
    name: "sovereign-nas"
    required: true
    # CRYPTO LOCK REQUIRED
    crypto_lock:
      lock_type: "sovereign"
      proof_file: "/secure/nestgate.lock"
      capabilities: ["storage.*", "zfs.*", "protocol.*"]
    config:
      zfs_pools:
        - name: "rpool"
          devices: ["/dev/sda", "/dev/sdb"]
          raid_level: "mirror"
      protocols: ["nfs", "smb", "s3"]
      encryption: "beardog"

  security:
    primal_type: "beardog"
    version: ">=2.0.0"
    name: "crypto-security"
    required: true
    # CRYPTO LOCK REQUIRED (self-validating)
    crypto_lock:
      lock_type: "sovereign"
      proof_file: "/secure/beardog.lock"
      capabilities: ["security.*", "encryption.*", "auth.*"]
    config:
      encryption_algorithms: ["ChaCha20-Poly1305", "AES-256-GCM"]
      key_management: "sovereign"
      authentication: "biometric+token"

  # ===========================================
  # AI PLATFORM - SPECIAL EXCEPTION
  # ===========================================
  
  ai_platform:
    primal_type: "squirrel"
    version: ">=1.5.0"
    name: "mcp-agents"
    required: false
    # SPECIAL AI API EXCEPTION - No crypto lock needed for individual AI APIs
    ai_api_exception: true
    config:
      mcp_protocol: "latest"
      plugin_system: true
      
      # Individual AI APIs - NO CRYPTO LOCK REQUIRED
      individual_ai_apis:
        - provider: "anthropic"
          models: ["claude-3-sonnet", "claude-3-haiku"]
          individual_use: true
          rate_limits:
            requests_per_minute: 60
            tokens_per_day: 100000
          safety_filters: true
          
        - provider: "openai"
          models: ["gpt-4", "gpt-3.5-turbo"]
          individual_use: true
          rate_limits:
            requests_per_minute: 60
            tokens_per_day: 100000
          safety_filters: true
          
        - provider: "google"
          models: ["gemini-pro"]
          individual_use: true
          rate_limits:
            requests_per_minute: 60
            tokens_per_day: 100000
          safety_filters: true
      
      # Enterprise AI features - CRYPTO LOCK REQUIRED
      enterprise_ai:
        crypto_lock_required: true
        crypto_lock:
          lock_type: "enterprise"
          license_key: "ENT-AI-2024-ABCD"
          proof_file: "/secure/enterprise-ai.lock"
          capabilities: ["ai.enterprise.*", "ai.training.*", "ai.custom.*"]
        features:
          - "custom_model_training"
          - "unlimited_api_access"
          - "priority_processing"
          - "advanced_analytics"
      
      sandboxing: "secure"
    dependencies: ["compute", "orchestration"]

  # ===========================================
  # EXTERNAL INTEGRATIONS - Crypto Locks Required
  # ===========================================
  
  kubernetes_integration:
    primal_type: "kubernetes/cluster-manager"
    version: ">=1.28.0"
    name: "k8s-cluster"
    required: false
    # CRYPTO LOCK REQUIRED for external orchestrator
    crypto_lock:
      lock_type: "sovereign"
      proof_file: "/secure/kubernetes.lock"
      capabilities: ["orchestration.external.*", "k8s.*"]
      restrictions:
        allowed_namespaces: ["biome-*", "sovereign-*"]
        resource_limits: true
    config:
      cluster_endpoint: "https://k8s.example.com"
      namespace_prefix: "biome-"
      rbac_enabled: true

  # ===========================================
  # COMMUNITY PRIMALS - Community Validation
  # ===========================================
  
  community_storage:
    primal_type: "community/distributed-storage"
    version: "^2.1.0"
    name: "community-storage"
    required: false
    # COMMUNITY CRYPTO LOCK
    crypto_lock:
      lock_type: "community"
      validators: ["storage-guild", "security-council", "tech-committee"]
      proof_file: "/secure/community-storage.lock"
      capabilities: ["storage.distributed.*"]
      restrictions:
        usage_limits: "reasonable"
        attribution_required: true
        community_approval: true
    config:
      node_count: 5
      replication_factor: 3

  # ===========================================
  # FUTURE PRIMALS - Ready for Crypto Locks
  # ===========================================
  
  network_mesh:
    primal_type: "mycelium"  # Future networking primal
    version: ">=1.0.0"
    name: "distributed-network"
    required: false
    # FUTURE CRYPTO LOCK (placeholder)
    crypto_lock:
      lock_type: "sovereign"
      proof_file: "/secure/mycelium.lock"
      capabilities: ["network.*", "mesh.*", "routing.*"]
    config:
      mesh_topology: "hyperbolic"
      routing_algorithm: "ant_colony"
      encryption: "quantum_resistant"

  # ===========================================
  # RESEARCH PRIMALS - Academic Locks
  # ===========================================
  
  quantum_simulator:
    primal_type: "research/quantum-sim"
    version: ">=0.1.0"
    name: "quantum-research"
    required: false
    # RESEARCH CRYPTO LOCK
    crypto_lock:
      lock_type: "research"
      institution: "Quantum Research Institute"
      proof_file: "/secure/quantum-research.lock"
      capabilities: ["quantum.*", "simulation.*"]
      restrictions:
        academic_use_only: true
        publication_required: true
        data_sharing: "anonymized"
    config:
      qubit_count: 64
      noise_model: "realistic"
      backends: ["qasm", "statevector"]

# Global configuration
networking:
  mode: "bridge"
  discovery:
    method: "dns"
    config:
      domain: "biome.local"
  # All external network access requires crypto validation
  external_access:
    crypto_lock_required: true

security:
  # BearDog handles all crypto lock validation
  crypto_lock_validator: "beardog"
  auth:
    method: "beardog_unified"
    config:
      biometric_required: true
      token_expiry: "24h"
  
  # AI API exception rules
  ai_api_exceptions:
    enabled: true
    individual_users_only: true
    rate_limiting: true
    safety_filters: true
    allowed_providers: ["anthropic", "openai", "google"]
  
  tls:
    enabled: true
    certificates:
      auto_generate: true
      ca: "biome_ca"

resources:
  cpu:
    max_cores: 16
  memory:
    max_mb: 32768
  storage:
    max_mb: 1048576  # 1TB
  network:
    max_bandwidth_mbps: 1000

# Extensions with crypto lock requirements
extensions:
  monitoring:
    enabled: true
    crypto_lock_required: false  # Basic monitoring allowed
    
  advanced_monitoring:
    enabled: false
    crypto_lock_required: true   # Advanced features locked
    crypto_lock:
      lock_type: "enterprise"
      capabilities: ["monitoring.advanced.*"]
  
  backup:
    enabled: true
    crypto_lock_required: true   # Backup always requires lock
    crypto_lock:
      lock_type: "sovereign"
      capabilities: ["backup.*", "recovery.*"]
  
  marketplace_access:
    enabled: false
    crypto_lock_required: true   # Marketplace access locked
    crypto_lock:
      lock_type: "community"
      validators: ["marketplace-council"]

# Audit configuration
audit:
  enabled: true
  crypto_lock_validation: true
  log_all_access_attempts: true
  retention_days: 365 