apiVersion: biomeOS/v1
kind: Biome
metadata:
  name: webapp-biome
  description: "Web application template"
  version: "1.0.0"

services:
  frontend:
    primal: toadstool
    runtime: Container
    image: node:18-alpine
    ports:
      - "3000:3000"
    resources:
      cpu: 2.0
      memory: 4294967296  # 4GB

  api-gateway:
    primal: songbird
    runtime: Native
    ports:
      - "8080:8080"
    resources:
      cpu: 1.0
      memory: 1073741824  # 1GB

  database:
    primal: nestgate
    runtime: Container
    image: postgres:15
    resources:
      cpu: 1.0
      memory: 2147483648  # 2GB
      storage: 53687091200  # 50GB

networking:
  load_balancing: true
  cdn_integration: true

scaling:
  min_replicas: 2
  max_replicas: 10
