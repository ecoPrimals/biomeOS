# Source of truth: biomeOS/graphs/ (runtime execution format with [[nodes]])
# Validation/structural variant: primalSpring/graphs/nucleus_complete.toml
# NUCLEUS Complete Deployment Graph
# =============================================================================
#
# NUCLEUS = Tower + Node + Nest = Complete biomeOS System
#
# Architecture:
#   Tower = BearDog + Songbird          (crypto + network)
#   Node  = Tower + Toadstool           (crypto + network + compute)
#   Nest  = Tower + NestGate            (crypto + network + storage)
#   NUCLEUS = BearDog + Songbird + Toadstool + NestGate + Squirrel
#
# biomeOS orchestrates NUCLEUS via the Neural API — its capability routing layer.
# The Neural API is how biomeOS interacts with biome niches (primals).
# It is NOT a separate service; it IS the biomeOS runtime.
#
# ✅ STATUS: February 11, 2026
#   - Tower Atomic: VALIDATED (BearDog A++ 100/100, Songbird A+)
#   - Node Atomic: READY (Toadstool A++ socket-standardized, barraCUDA 50 ops)
#   - Nest Atomic: READY (NestGate A+++ socket-only mode)
#   - AI Bridge: VALIDATED (Squirrel → Songbird → Cloud/Local AI)
#   - biomeOS Neural API: 124 capability translations, agent routing, relay-punch
#   - FULL NUCLEUS: READY FOR GRAPH-BASED DEPLOYMENT
#
# Socket Conventions (XDG-compliant):
#   ${XDG_RUNTIME_DIR}/biomeos/{primal}-{family_id}.sock
#   Example: /run/user/1000/biomeos/beardog-cf7e8729.sock
#
# Environment Configuration:
#   FAMILY_ID discovered from .family.seed (TRUE PRIMAL runtime discovery)
#   NODE_ID for mesh identification (e.g., "tower1", "gate2")
#   XDG_RUNTIME_DIR for socket directory (e.g., /run/user/1000)
#
# =============================================================================

[graph]
id = "nucleus_complete"
version = "2.0.0"
description = "Complete NUCLEUS: All 5 primals with Sovereign Onion + Mesh (biomeOS Neural API routes capabilities)"
coordination = "Sequential"

[graph.metadata]
genetics_tier = "nuclear"

# =============================================================================
# PHASE 1: TOWER ATOMIC (Crypto + Network Foundation)
# =============================================================================

# 1.1: Germinate BearDog (Security Foundation)
[[nodes]]
id = "tower_beardog"
output = "beardog_genesis"
capabilities = ["crypto", "tls_crypto", "genetic", "security", "beacon"]

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
RUST_LOG = "beardog=info"

[nodes.constraints]
timeout_ms = 30000

# Core crypto translations
[nodes.capabilities_provided]
# Core Crypto Operations
"crypto.generate_keypair" = "crypto.x25519_generate_ephemeral"
"crypto.ecdh_derive" = "crypto.x25519_derive_secret"
"crypto.derive_secret" = "crypto.x25519_derive_secret"
"crypto.encrypt" = "crypto.chacha20_poly1305_encrypt"
"crypto.decrypt" = "crypto.chacha20_poly1305_decrypt"
"crypto.hash" = "crypto.blake3_hash"
"crypto.hmac" = "crypto.hmac_sha256"
"crypto.sign" = "crypto.sign_ed25519"
"crypto.verify" = "crypto.verify_ed25519"
"sha256" = "crypto.sha256"
"sha384" = "crypto.sha384"
"hash_for_cipher" = "crypto.hash_for_cipher"

# Songbird TLS Direct Mode
"x25519_generate_ephemeral" = "crypto.x25519_generate_ephemeral"
"x25519_derive_secret" = "crypto.x25519_derive_secret"
"chacha20_poly1305_encrypt" = "crypto.chacha20_poly1305_encrypt"
"chacha20_poly1305_decrypt" = "crypto.chacha20_poly1305_decrypt"
"aes128_gcm_encrypt" = "crypto.aes128_gcm_encrypt"
"aes128_gcm_decrypt" = "crypto.aes128_gcm_decrypt"
"aes256_gcm_encrypt" = "crypto.aes256_gcm_encrypt"
"aes256_gcm_decrypt" = "crypto.aes256_gcm_decrypt"
"blake3_hash" = "crypto.blake3_hash"
"hmac_sha256" = "crypto.hmac_sha256"

# AES-GCM Operations
"crypto.decrypt_aes_128_gcm" = "crypto.aes128_gcm_decrypt"
"crypto.encrypt_aes_128_gcm" = "crypto.aes128_gcm_encrypt"
"crypto.decrypt_aes_256_gcm" = "crypto.aes256_gcm_decrypt"
"crypto.encrypt_aes_256_gcm" = "crypto.aes256_gcm_encrypt"

# ECDSA Signature Algorithms
"crypto.sign_ecdsa_p256" = "crypto.sign_ecdsa_secp256r1"
"crypto.verify_ecdsa_p256" = "crypto.verify_ecdsa_secp256r1"
"crypto.sign_ecdsa_p384" = "crypto.sign_ecdsa_secp384r1"
"crypto.verify_ecdsa_p384" = "crypto.verify_ecdsa_secp384r1"

# RSA Signature Algorithms
"crypto.sign_rsa_pkcs1" = "crypto.sign_rsa_pkcs1_sha256"
"crypto.verify_rsa_pkcs1" = "crypto.verify_rsa_pkcs1_sha256"
"crypto.sign_rsa_pss" = "crypto.sign_rsa_pss_sha256"
"crypto.verify_rsa_pss" = "crypto.verify_rsa_pss_sha256"

# TLS Key Derivation
"tls.derive_secrets" = "tls.derive_secrets"
"tls_crypto.derive_handshake_secrets" = "tls.derive_handshake_secrets"
"tls_crypto.derive_application_secrets" = "tls.derive_application_secrets"
"tls_crypto.compute_finished_verify_data" = "tls.compute_finished_verify_data"
"tls.derive_handshake_secrets" = "tls.derive_handshake_secrets"
"tls.derive_application_secrets" = "tls.derive_application_secrets"
"tls.compute_finished_verify_data" = "tls.compute_finished_verify_data"
"tls.sign_handshake" = "tls.sign_handshake"
"tls.verify_certificate" = "tls.verify_certificate"
"derive_handshake_secrets" = "tls.derive_handshake_secrets"
"derive_application_secrets" = "tls.derive_application_secrets"
"compute_finished_verify_data" = "tls.compute_finished_verify_data"
"derive_secrets" = "tls.derive_secrets"

# Genetic Lineage Operations
"verify_lineage" = "genetic.verify_lineage"
"generate_lineage_proof" = "genetic.generate_lineage_proof"
"genetic.derive_key" = "genetic.derive_lineage_key"
"genetic.mix_entropy" = "genetic.mix_entropy"
"genetic.verify_lineage" = "genetic.verify_lineage"
"genetic.generate_proof" = "genetic.generate_lineage_proof"

# Beacon Operations (Dark Forest)
"beacon.generate" = "beacon.generate"
"beacon.get_id" = "beacon.get_id"
"beacon.get_seed" = "beacon.get_seed"
"beacon.encrypt" = "beacon.encrypt"
"beacon.decrypt" = "beacon.decrypt"
"beacon.try_decrypt" = "beacon.try_decrypt"

# Lineage-Based Encryption
"crypto.encrypt_with_lineage" = "crypto.encrypt_with_lineage_key"
"crypto.decrypt_with_lineage" = "crypto.decrypt_with_lineage_key"
"crypto.derive_child_seed" = "crypto.derive_child_seed"

# Sovereign Onion Crypto
"crypto.sha3_256" = "crypto.sha3_256"
"crypto.ed25519_generate_keypair" = "crypto.ed25519_generate_keypair"
"sign_ed25519" = "crypto.sign_ed25519"
"verify_ed25519" = "crypto.verify_ed25519"

# Relay Authorization (Relay-Punch protocol)
"relay.authorize" = "relay.authorize"

[nodes.parameter_mappings]
"crypto.ecdh_derive" = { "private_key" = "our_secret", "public_key" = "their_public" }

# 1.2: Germinate Songbird (Network + Discovery + Mesh + Onion)
[[nodes]]
id = "tower_songbird"
depends_on = ["tower_beardog"]
output = "songbird_genesis"
capabilities = ["http", "discovery", "secure_http", "mesh", "onion", "relay", "stun", "punch"]

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
NEURAL_API_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/neural-api-${FAMILY_ID}.sock"
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
CRYPTO_PROVIDER_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SECURITY_PROVIDER = "beardog"
SONGBIRD_ONION_ENABLED = "true"
SONGBIRD_MESH_ENABLED = "true"
BIOMEOS_BIND_ALL = "true"
RUST_LOG = "songbird=info"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
# HTTP Operations
"http.request" = "http.request"
"http.get" = "http.get"
"http.post" = "http.post"
"discovery.announce" = "announce_capabilities"
"discovery.query" = "discover_by_capability"

# Mesh Relay
"mesh.status" = "mesh.status"
"mesh.find_path" = "mesh.find_path"
"mesh.announce" = "mesh.announce"
"mesh.peers" = "mesh.list_peers"
"mesh.health_check" = "mesh.health_check"

# Hole Punch Coordination (Relay-Punch protocol)
"punch.request" = "punch.request"
"punch.status" = "punch.status"
"punch.coordinate" = "punch.coordinate"

# STUN for NAT Detection
"stun.discover" = "stun.get_public_address"
"stun.detect_nat_type" = "stun.detect_nat_type"
"stun.probe_port_pattern" = "stun.probe_port_pattern"

# Relay Capabilities
"relay.serve" = "relay.serve"
"relay.status" = "relay.status"
"relay.allocate" = "relay.allocate"

# Sovereign Onion Service
"onion.create_service" = "onion.create_service"
"onion.get_address" = "onion.get_address"
"onion.connect" = "onion.connect"
"onion.accept" = "onion.accept"
"onion.status" = "onion.status"

# 1.3: Initialize Sovereign Onion Service
[[nodes]]
id = "init_sovereign_onion"
depends_on = ["tower_songbird"]
output = "onion_initialized"
fallback = "skip"  # Tor may not be available; NUCLEUS must tolerate this

[nodes.operation]
name = "rpc_call"
target = "songbird"

[nodes.operation.params]
method = "onion.start"
params = { port = 8080 }

[nodes.constraints]
timeout_ms = 30000

# 1.4: Initialize Beacon Mesh
[[nodes]]
id = "init_beacon_mesh"
depends_on = ["init_sovereign_onion"]
output = "mesh_initialized"

[nodes.operation]
name = "rpc_call"
target = "songbird"

[nodes.operation.params]
method = "mesh.init"
params = { node_id = "${NODE_ID}", bootstrap_onions = [] }

[nodes.constraints]
timeout_ms = 10000

# 1.5: Validate Tower Atomic
[[nodes]]
id = "tower_validate"
depends_on = ["tower_beardog", "tower_songbird", "init_sovereign_onion"]
output = "tower_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_onion = true
timeout_seconds = 10

[nodes.constraints]
timeout_ms = 15000

# =============================================================================
# PHASE 2: NODE ATOMIC (Add Compute)
# =============================================================================

# 2.1: Germinate Toadstool (Universal Compute)
[[nodes]]
id = "node_toadstool"
depends_on = ["tower_validate"]
output = "toadstool_genesis"
capabilities = ["compute", "workload", "orchestration", "ai_local"]

[nodes.primal]
by_capability = "compute"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
TOADSTOOL_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/toadstool-${FAMILY_ID}.sock"
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/songbird-${FAMILY_ID}.sock"
RUST_LOG = "toadstool=info"

[nodes.constraints]
timeout_ms = 45000  # GPU init may take time

[nodes.capabilities_provided]
"compute.health" = "toadstool.health"
"compute.version" = "toadstool.version"
"compute.capabilities" = "toadstool.query_capabilities"
"compute.estimate" = "resources.estimate"
"compute.validate" = "resources.validate_availability"
"compute.optimize" = "resources.suggest_optimizations"
"ai.local_inference" = "resources.estimate"

# 2.2: Validate Node Atomic
[[nodes]]
id = "node_validate"
depends_on = ["node_toadstool"]
output = "node_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_toadstool = true
timeout_seconds = 15

[nodes.constraints]
timeout_ms = 20000

# =============================================================================
# PHASE 3: NEST ATOMIC (Add Storage)
# =============================================================================

# 3.1: Germinate NestGate (Federated Storage)
[[nodes]]
id = "nest_nestgate"
depends_on = ["node_validate"]
output = "nestgate_genesis"
capabilities = ["storage", "provenance", "persistence"]

[nodes.primal]
by_capability = "storage"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"
provenance_enabled = true

[nodes.operation.environment]
NESTGATE_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/nestgate-${FAMILY_ID}.sock"
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/songbird-${FAMILY_ID}.sock"
RUST_LOG = "nestgate=info"

[nodes.constraints]
timeout_ms = 60000

[nodes.capabilities_provided]
"storage.store" = "store"
"storage.retrieve" = "retrieve"
"storage.stats" = "stats"
"storage.health" = "health_check"
"storage.store_blob" = "store_blob"
"storage.retrieve_range" = "retrieve_range"
"storage.object.size" = "object.size"
"storage.namespaces.list" = "namespaces.list"

# =============================================================================
# PHASE 3b: GPU COMPUTE (barraCuda + coralReef)
# =============================================================================

# 3b.1: Register barraCuda (GPU Math, Tensors, Statistics, Noise, Activation)
[[nodes]]
id = "register_barracuda"
depends_on = ["tower_validate"]
output = "barracuda_registered"
capabilities = ["math", "tensor", "stats", "noise", "activation", "linalg", "spectral", "rng"]

[nodes.primal]
by_capability = "math"

[nodes.operation]
name = "register_only"

[nodes.operation.params]
family_id = "${FAMILY_ID}"

[nodes.capabilities_provided]
"tensor.create" = "tensor.create"
"tensor.matmul" = "tensor.matmul"
"tensor.matmul_inline" = "tensor.matmul_inline"
"tensor.add" = "tensor.add"
"tensor.scale" = "tensor.scale"
"tensor.clamp" = "tensor.clamp"
"tensor.reduce" = "tensor.reduce"
"tensor.sigmoid" = "tensor.sigmoid"
"tensor.transpose" = "tensor.transpose"
"tensor.batch.submit" = "tensor.batch.submit"
"math.sigmoid" = "math.sigmoid"
"math.log2" = "math.log2"
"math.relu" = "math.relu"
"math.tanh" = "math.tanh"
"math.softmax" = "math.softmax"
"stats.mean" = "stats.mean"
"stats.std_dev" = "stats.std_dev"
"stats.weighted_mean" = "stats.weighted_mean"
"stats.variance" = "stats.variance"
"stats.median" = "stats.median"
"stats.correlation" = "stats.correlation"
"noise.perlin2d" = "noise.perlin2d"
"noise.perlin3d" = "noise.perlin3d"
"noise.simplex2d" = "noise.simplex2d"
"noise.simplex3d" = "noise.simplex3d"
"linalg.solve" = "linalg.solve"
"linalg.eigenvalues" = "linalg.eigenvalues"
"spectral.fft" = "spectral.fft"
"spectral.power_spectrum" = "spectral.power_spectrum"

# 3b.2: Register coralReef (Shader Compilation)
[[nodes]]
id = "register_coralreef"
depends_on = ["tower_validate"]
output = "coralreef_registered"
capabilities = ["shader", "wgsl", "spirv"]

[nodes.primal]
by_capability = "shader"

[nodes.operation]
name = "register_only"

[nodes.operation.params]
family_id = "${FAMILY_ID}"

[nodes.capabilities_provided]
"shader.compile.wgsl" = "shader.compile.wgsl"
"shader.compile.spirv" = "shader.compile.spirv"
"shader.validate" = "shader.validate"
"shader.optimize" = "shader.optimize"
"shader.list" = "shader.list"
"wgsl.parse" = "wgsl.parse"
"wgsl.validate" = "wgsl.validate"

# =============================================================================
# PHASE 4: AI ORCHESTRATION (Add AI Bridge)
# =============================================================================

# 4.1: Germinate Squirrel (AI Orchestration)
[[nodes]]
id = "germinate_squirrel"
depends_on = ["tower_validate"]
output = "squirrel_genesis"
capabilities = ["ai", "inference", "learning"]

[nodes.primal]
by_capability = "ai"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
CAPABILITY_REGISTRY_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/neural-api-${FAMILY_ID}.sock"
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/songbird-${FAMILY_ID}.sock"
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
OPENAI_API_KEY = "${OPENAI_API_KEY}"
RUST_LOG = "squirrel=info"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"ai.query" = "query_ai"
"ai.list_providers" = "list_providers"
"ai.announce" = "announce_capabilities"
"ai.health" = "health"
"ai.metrics" = "metrics"
"ai.discover_peers" = "discover_peers"
"ai.ping" = "ping"
"ai.execute_tool" = "execute_tool"

# =============================================================================
# PHASE 5: VALIDATE FULL NUCLEUS
# =============================================================================

# 5.1: Final NUCLEUS Validation
[[nodes]]
id = "nucleus_validate"
depends_on = ["nest_nestgate", "germinate_squirrel", "register_barracuda", "register_coralreef"]
output = "nucleus_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_toadstool = true
check_nestgate = true
check_squirrel = true
check_capability_routing = true
check_onion = true
timeout_seconds = 20

[nodes.constraints]
timeout_ms = 30000

# 5.2: Announce as Family Relay
[[nodes]]
id = "announce_relay"
depends_on = ["nucleus_validate"]
output = "relay_announced"

[nodes.operation]
name = "rpc_call"
target = "songbird"

[nodes.operation.params]
method = "mesh.announce"
params = { as_relay = true, capabilities = ["relay", "stun", "onion"] }

[nodes.constraints]
timeout_ms = 5000

# =============================================================================
# SUMMARY
# =============================================================================
#
# Deployment Order:
#   1. BearDog (crypto foundation)
#   2. Songbird (network, bonded to BearDog)
#   3. Sovereign Onion + Mesh init
#   4. [Tower Validated]
#   5. Toadstool (compute, uses Tower for security)
#   6. [Node Validated]
#   7. NestGate (storage, uses Tower for encryption)
#   8. Squirrel (AI routing, parallel with storage)
#   9. [NUCLEUS Validated]
#   10. Announce as relay
#
# Capabilities Exposed:
#   - crypto.* (40+ methods) → BearDog
#   - tls_crypto.* (6 methods) → BearDog
#   - beacon.* (6 methods) → BearDog
#   - genetic.* (4 methods) → BearDog
#   - http.* (3 methods) → Songbird
#   - discovery.* (2 methods) → Songbird
#   - mesh.* (5 methods) → Songbird
#   - onion.* (5 methods) → Songbird
#   - relay.* (3 methods) → Songbird
#   - stun.* (3 methods) → Songbird
#   - punch.* (3 methods) → Songbird
#   - compute.* (7 methods) → Toadstool
#   - tensor.* / math.* / stats.* / noise.* / linalg.* / spectral.* (33 methods) → barraCuda
#   - shader.* / wgsl.* (7 methods) → coralReef
#   - storage.* (8 methods, incl. streaming) → NestGate
#   - ai.* (8 methods) → Squirrel
#
# Environment Variables (Required):
#   FAMILY_ID - derived from .family.seed
#   XDG_RUNTIME_DIR - socket directory (e.g., /run/user/1000)
#   NODE_ID - mesh node identifier (e.g., tower1)
#
# Environment Variables (Optional):
#   ANTHROPIC_API_KEY - for Squirrel cloud AI
#   OPENAI_API_KEY - for Squirrel cloud AI
#
# =============================================================================
