# tower_genome.toml - TOWER Deployment (BearDog + Songbird)
# Universal genomeBin graph deployment
# Platform: Linux (x86_64), Android (aarch64), macOS (aarch64/x86_64)

[metadata]
name = "tower"
version = "0.1.0"
description = "Deploy TOWER (BearDog + Songbird) via genomeBin"
author = "biomeOS Core Team"

# Deploy BearDog (Security Foundation)
[[nodes]]
id = "deploy_beardog"
type = "genome.deploy"
description = "Deploy BearDog genomeBin"

[nodes.config]
genome = "beardog.genome"
target = "auto"  # Auto-detect architecture
wait_ready = true
healthcheck_timeout = 30

# Deploy Songbird (Discovery & Federation)
[[nodes]]
id = "deploy_songbird"
type = "genome.deploy"
description = "Deploy Songbird genomeBin"
depends_on = ["deploy_beardog"]

[nodes.config]
genome = "songbird.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30
requires = ["beardog"]  # Songbird requires BearDog

# Verify TOWER health
[[nodes]]
id = "verify_tower"
type = "health.check_atomic"
description = "Verify TOWER atomicity"
depends_on = ["deploy_songbird"]

[nodes.config]
primals = ["beardog", "songbird"]
timeout = 10
required_capabilities = ["security", "discovery"]

# Report deployment success
[[nodes]]
id = "report_success"
type = "report.deployment_success"
description = "Report TOWER deployment success"
depends_on = ["verify_tower"]

[nodes.config]
deployment = "tower"
primals = ["beardog", "songbird"]
notify = ["console", "log"]
