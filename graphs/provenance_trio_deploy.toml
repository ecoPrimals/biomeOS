# Provenance Trio Deployment Graph
# Deploys the RootPulse provenance stack: LoamSpine + rhizoCrypt + sweetGrass
# atop a running Tower Atomic (BearDog + Songbird).
#
# Startup order matters:
#   1. LoamSpine (permanence) — no dependencies beyond Tower
#   2. rhizoCrypt (ephemeral DAG) — optional dehydration to LoamSpine
#   3. sweetGrass (attribution) — optional anchoring to LoamSpine
#
# After deployment, use provenance_pipeline.toml or rootpulse_commit.toml
# to orchestrate the full commit workflow.
#
# Required: Tower (BearDog + Songbird)
# Optional: NestGate (content-addressed payload storage)

[graph]
id = "provenance_trio_deploy"
version = "1.0.0"
description = "RootPulse provenance trio: LoamSpine + rhizoCrypt + sweetGrass"

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 1: VERIFY TOWER FOUNDATION
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "verify-beardog"

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "beardog"
timeout_secs = 10

[[nodes]]
id = "verify-songbird"
depends_on = ["verify-beardog"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "songbird"
timeout_secs = 10

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 2: START LOAMSPINE (permanence)
# Must start first — rhizoCrypt and sweetGrass dehydrate/anchor to it
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "start-loamspine"
depends_on = ["verify-songbird"]

[nodes.operation]
name = "primal.launch"

[nodes.operation.environment]
LOAMSPINE_TARPC_PORT = "9001"
LOAMSPINE_JSONRPC_PORT = "8301"
LOAMSPINE_BIND_ADDRESS = "0.0.0.0"
LOAMSPINE_STORAGE_PATH = "${XDG_DATA_HOME}/biomeos/loamspine"
DISCOVERY_ENDPOINT = "http://127.0.0.1:8080"

[nodes.config]
primal_name = "loamspine"
mode = "server"

[[nodes]]
id = "health-loamspine"
depends_on = ["start-loamspine"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "loamspine"
timeout_secs = 10

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 3: START RHIZOCRYPT (ephemeral DAG)
# Connects to LoamSpine for dehydration, BearDog for signing
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "start-rhizocrypt"
depends_on = ["health-loamspine"]

[nodes.operation]
name = "primal.launch"

[nodes.operation.environment]
RHIZOCRYPT_RPC_PORT = "9400"
RHIZOCRYPT_RPC_HOST = "0.0.0.0"
RHIZOCRYPT_ENV = "production"
RHIZOCRYPT_DISCOVERY_ADAPTER = "http://127.0.0.1:8080"
PERMANENT_STORAGE_ENDPOINT = "http://127.0.0.1:8301"

[nodes.config]
primal_name = "rhizocrypt"
mode = "server"

[[nodes]]
id = "health-rhizocrypt"
depends_on = ["start-rhizocrypt"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "rhizocrypt"
timeout_secs = 10

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 4: START SWEETGRASS (attribution)
# Connects to LoamSpine for anchoring, BearDog for signing
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "start-sweetgrass"
depends_on = ["health-loamspine"]

[nodes.operation]
name = "primal.launch"

[nodes.operation.environment]
PRIMAL_NAME = "sweetgrass"
DISCOVERY_ADDRESS = "127.0.0.1:8080"
RUST_LOG = "info"

[nodes.config]
primal_name = "sweetgrass"
mode = "server"

[[nodes]]
id = "health-sweetgrass"
depends_on = ["start-sweetgrass"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "sweetgrass"
timeout_secs = 10

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 5: REGISTER ALL CAPABILITIES
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "register-loamspine-caps"
depends_on = ["health-loamspine"]
capabilities = ["permanent_storage", "linear_history", "spine", "certificate", "commit", "proof", "waypoint_anchoring"]

[nodes.operation]
name = "register_capabilities"

[nodes.config]
primal_name = "loamspine"

[[nodes]]
id = "register-rhizocrypt-caps"
depends_on = ["health-rhizocrypt"]
capabilities = ["ephemeral_workspace", "dag", "session", "merkle", "dehydration", "slice"]

[nodes.operation]
name = "register_capabilities"

[nodes.config]
primal_name = "rhizocrypt"

[[nodes]]
id = "register-sweetgrass-caps"
depends_on = ["health-sweetgrass"]
capabilities = ["attribution", "braid", "provenance", "contribution", "privacy"]

[nodes.operation]
name = "register_capabilities"

[nodes.config]
primal_name = "sweetgrass"
