# sweetGrass Deployment Graph
# Deploys sweetGrass (provenance and attribution primal) atop Tower Atomic
#
# sweetGrass provides W3C PROV-O provenance, semantic attribution, braids,
# contribution tracking, and reward calculation.
# Dual protocol: HTTP/JSON-RPC (8302) + tarpc (8091). Discovers via Songbird.
#
# Required: Tower (BearDog + Songbird)
# Optional: LoamSpine (anchoring), PostgreSQL or Sled (persistent storage)

[graph]
id = "sweetgrass_deploy"
version = "1.0.0"
description = "sweetGrass provenance and attribution primal deployment"

# PHASE 1: VERIFY TOWER FOUNDATION

[[nodes]]
id = "verify-tower"

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "beardog"
timeout_secs = 10

[[nodes]]
id = "verify-songbird"
depends_on = ["verify-tower"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "songbird"
timeout_secs = 10

# PHASE 2: START SWEETGRASS

[[nodes]]
id = "start-sweetgrass"
depends_on = ["verify-songbird"]

[nodes.operation]
name = "primal.launch"

[nodes.operation.environment]
PRIMAL_NAME = "sweetgrass"
DISCOVERY_ADDRESS = "127.0.0.1:8080"
RUST_LOG = "info"

[nodes.config]
primal_name = "sweetgrass"
mode = "server"

# PHASE 3: REGISTER CAPABILITIES

[[nodes]]
id = "register-capabilities"
depends_on = ["start-sweetgrass"]
capabilities = ["attribution", "braid", "provenance", "contribution", "privacy"]

[nodes.operation]
name = "register_capabilities"

[nodes.config]
primal_name = "sweetgrass"

# PHASE 4: VERIFY HEALTH

[[nodes]]
id = "verify-health"
depends_on = ["register-capabilities"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "sweetgrass"
timeout_secs = 5
