# Tower Atomic + Squirrel Bootstrap Graph
# Creates Tower Atomic (security) + Squirrel (AI orchestration)
#
# This is the minimal ecosystem for AI interactions

[graph]
id = "tower_squirrel_bootstrap"
description = "Tower Atomic + Squirrel (secure AI orchestration)"
coordination = "Sequential"

# Phase 1: Germinate BearDog
[[nodes]]
id = "germinate_beardog"
output = "beardog_ready"

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"

[nodes.constraints]
timeout_ms = 30000

# Phase 2: Germinate Songbird (depends on BearDog)
[[nodes]]
id = "germinate_songbird"
depends_on = ["germinate_beardog"]
output = "songbird_ready"

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"

[nodes.constraints]
timeout_ms = 30000

# Phase 3: Germinate Squirrel (depends on Tower Atomic)
[[nodes]]
id = "germinate_squirrel"
depends_on = ["germinate_beardog", "germinate_songbird"]
output = "squirrel_ready"

[nodes.primal]
by_capability = "ai"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"

# Environment variables for Squirrel
[nodes.operation.environment]
# API keys (should be substituted from actual secrets)
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
OPENAI_API_KEY = "${OPENAI_API_KEY}"

# Capability registry (Neural API)
CAPABILITY_REGISTRY_SOCKET = "/tmp/neural-api-nat0.sock"

[nodes.constraints]
timeout_ms = 30000

# Phase 4: Validate Stack
[[nodes]]
id = "validate_stack"
depends_on = ["germinate_beardog", "germinate_songbird", "germinate_squirrel"]
output = "stack_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_squirrel = true
check_ai_capabilities = true

[nodes.constraints]
timeout_ms = 20000

