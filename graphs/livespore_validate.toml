# LiveSpore Validation & Update Graph
#
# Deterministic validation protocol for USB spores that:
# 1. Validates system files via checksums (MD5/Blake3)
# 2. Updates outdated system files from plasmidBin
# 3. Preserves spore-specific personal data vault
#
# Architecture:
# ┌─────────────────────────────────────────────────────────┐
# │                    USB LiveSpore                        │
# ├────────────────────────┬────────────────────────────────┤
# │   SYSTEM (Validated)   │   VAULT (Spore-Specific)       │
# ├────────────────────────┼────────────────────────────────┤
# │ • primals/beardog      │ • vault/deployments/           │
# │ • primals/songbird     │ • vault/logs/                  │
# │ • deploy.sh            │ • vault/certs/                 │
# │ • .family.seed         │ • vault/workdata/              │
# │ • tower.toml           │ • vault/metrics/               │
# │ • graphs/*.toml        │ • vault/experience.json        │
# │ • .spore.json          │ • vault/federation_history.log │
# └────────────────────────┴────────────────────────────────┘
#
# Usage:
#   neural-api execute graphs/livespore_validate.toml \
#     --env SPORE_TARGET=/media/user/USB \
#     --env UPDATE_MODE=auto \
#     --env MANIFEST_URL=file://plasmidBin/manifest.toml
#
# Update Modes:
#   - check:  Validate only, report discrepancies
#   - auto:   Update outdated files automatically
#   - strict: Fail if any mismatch (CI/CD mode)
#
# Author: biomeOS Team
# Date: 2026-01-27

[graph]
id = "livespore-validate"
name = "LiveSpore Validation & Update"
version = "1.0.0"
description = "Deterministic validation and update protocol for USB spores"

[graph.metadata]
family_id = "${FAMILY_ID}"
author = "biomeOS"
created = "2026-01-27"
category = "deployment"

[graph.env]
SPORE_TARGET = "${SPORE_TARGET:-/media/user/USB}"
UPDATE_MODE = "${UPDATE_MODE:-check}"
MANIFEST_URL = "${MANIFEST_URL:-file://plasmidBin/manifest.toml}"
PRESERVE_VAULT = "${PRESERVE_VAULT:-true}"

# ============================================================================
# Phase 1: Discovery & Manifest Loading
# ============================================================================

[[graph.nodes]]
id = "discover-spore"
name = "Discover LiveSpore"
type = "capability"
capability = "biomeos.discover"
required = true
order = 10

[graph.nodes.params]
target_path = "${SPORE_TARGET}"
required_markers = [".family.seed", ".spore.json"]
# Returns: spore_root, node_id, family_id, spore_version

[[graph.nodes]]
id = "load-manifest"
name = "Load System Manifest"
type = "capability"
capability = "config.load_toml"
required = true
order = 20

[graph.nodes.params]
source = "${MANIFEST_URL}"
# Manifest contains checksums for all system files

[[graph.nodes]]
id = "load-spore-meta"
name = "Load Spore Metadata"
type = "capability"
capability = "config.load_json"
required = true
order = 25
depends_on = ["discover-spore"]

[graph.nodes.params]
source = "${SPORE_TARGET}/biomeOS/.spore.json"

# ============================================================================
# Phase 2: System File Validation
# ============================================================================

[[graph.nodes]]
id = "validate-beardog"
name = "Validate BearDog Binary"
type = "capability"
capability = "crypto.verify_checksum"
required = true
order = 100
depends_on = ["discover-spore", "load-manifest"]

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
file_path = "${SPORE_TARGET}/biomeOS/primals/beardog"
expected_checksum = "${manifest.system.beardog.blake3}"
algorithm = "blake3"
# Returns: valid (bool), actual_checksum, expected_checksum

[[graph.nodes]]
id = "validate-songbird"
name = "Validate Songbird Binary"
type = "capability"
capability = "crypto.verify_checksum"
required = true
order = 101
depends_on = ["discover-spore", "load-manifest"]

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
file_path = "${SPORE_TARGET}/biomeOS/primals/songbird"
expected_checksum = "${manifest.system.songbird.blake3}"
algorithm = "blake3"

[[graph.nodes]]
id = "validate-deploy-script"
name = "Validate Deploy Script"
type = "capability"
capability = "crypto.verify_checksum"
required = true
order = 102
depends_on = ["discover-spore", "load-manifest"]

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
file_path = "${SPORE_TARGET}/biomeOS/deploy.sh"
expected_checksum = "${manifest.system.deploy_script.blake3}"
algorithm = "blake3"

[[graph.nodes]]
id = "validate-seed-structure"
name = "Validate Seed Structure"
type = "capability"
capability = "genetic.verify_seed"
required = true
order = 103
depends_on = ["discover-spore"]

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
seed_path = "${SPORE_TARGET}/biomeOS/.family.seed"
expected_size = 64
# Validates: 64 bytes, genesis derivable, node_key valid

[[graph.nodes]]
id = "validate-graphs"
name = "Validate Deployment Graphs"
type = "capability"
capability = "filesystem.verify_directory"
required = true
order = 104
depends_on = ["discover-spore", "load-manifest"]

[graph.nodes.params]
directory = "${SPORE_TARGET}/biomeOS/graphs"
expected_files = "${manifest.system.graphs}"
checksum_algorithm = "blake3"

# ============================================================================
# Phase 3: Validation Report
# ============================================================================

[[graph.nodes]]
id = "generate-report"
name = "Generate Validation Report"
type = "capability"
capability = "biomeos.generate_report"
required = true
order = 200
depends_on = ["validate-beardog", "validate-songbird", "validate-deploy-script", "validate-seed-structure", "validate-graphs"]

[graph.nodes.params]
report_type = "validation"
include_checksums = true
include_recommendations = true
output_format = "json"
# Aggregates all validation results

# ============================================================================
# Phase 4: Updates (if UPDATE_MODE != check)
# ============================================================================

[[graph.nodes]]
id = "update-beardog"
name = "Update BearDog Binary"
type = "capability"
capability = "filesystem.copy_file"
required = false
order = 300
depends_on = ["generate-report"]
condition = "${UPDATE_MODE} != check && !${validate-beardog.valid}"

[graph.nodes.params]
source = "plasmidBin/primals/beardog/beardog-active"
target = "${SPORE_TARGET}/biomeOS/primals/beardog"
follow_symlinks = true
backup_existing = true
backup_suffix = ".bak"

[[graph.nodes]]
id = "update-songbird"
name = "Update Songbird Binary"
type = "capability"
capability = "filesystem.copy_file"
required = false
order = 301
depends_on = ["generate-report"]
condition = "${UPDATE_MODE} != check && !${validate-songbird.valid}"

[graph.nodes.params]
source = "plasmidBin/primals/songbird/songbird-active"
target = "${SPORE_TARGET}/biomeOS/primals/songbird"
follow_symlinks = true
backup_existing = true
backup_suffix = ".bak"

[[graph.nodes]]
id = "update-deploy-script"
name = "Update Deploy Script"
type = "capability"
capability = "filesystem.template_file"
required = false
order = 302
depends_on = ["generate-report", "load-spore-meta"]
condition = "${UPDATE_MODE} != check && !${validate-deploy-script.valid}"

[graph.nodes.params]
source_template = "templates/livespore_deploy.sh"
target = "${SPORE_TARGET}/biomeOS/deploy.sh"
substitutions = {
    "__FAMILY_ID__" = "${spore_meta.family_id}",
    "__NODE_ID__" = "${spore_meta.node_id}",
    "__SPORE_VERSION__" = "${manifest.version}"
}
permissions = "0755"

# ============================================================================
# Phase 5: Vault Initialization (Personal Data)
# ============================================================================

[[graph.nodes]]
id = "ensure-vault"
name = "Ensure Personal Data Vault"
type = "capability"
capability = "filesystem.create_directories"
required = true
order = 400
depends_on = ["discover-spore"]

[graph.nodes.params]
base_path = "${SPORE_TARGET}/biomeOS/vault"
directories = [
    "deployments",
    "logs",
    "certs",
    "workdata",
    "metrics",
    "federation",
]
permissions = "0755"

[[graph.nodes]]
id = "init-experience"
name = "Initialize Experience Tracker"
type = "capability"
capability = "config.ensure_json"
required = true
order = 410
depends_on = ["ensure-vault"]

[graph.nodes.params]
path = "${SPORE_TARGET}/biomeOS/vault/experience.json"
default_content = """
{
  "spore_id": "${spore_meta.node_id}",
  "created_at": "${spore_meta.created_at}",
  "deployments": [],
  "federation_events": [],
  "total_uptime_seconds": 0,
  "hosts_connected": [],
  "last_validation": null
}
"""

[[graph.nodes]]
id = "record-validation"
name = "Record Validation Event"
type = "capability"
capability = "config.append_json_array"
required = true
order = 420
depends_on = ["init-experience", "generate-report"]

[graph.nodes.params]
path = "${SPORE_TARGET}/biomeOS/vault/experience.json"
array_path = "deployments"
entry = {
    "timestamp" = "$(date -Iseconds)",
    "host" = "$(hostname)",
    "ip" = "$(hostname -I | awk '{print $1}')",
    "validation_result" = "${generate-report.summary}",
    "updates_applied" = "${generate-report.updates_count}",
    "mode" = "${UPDATE_MODE}"
}

# ============================================================================
# Phase 6: Final Verification
# ============================================================================

[[graph.nodes]]
id = "final-checksum"
name = "Generate Final System Checksum"
type = "capability"
capability = "crypto.hash_directory"
required = true
order = 500
depends_on = ["update-beardog", "update-songbird", "update-deploy-script"]

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
directory = "${SPORE_TARGET}/biomeOS"
include_patterns = [
    "primals/*",
    "deploy.sh",
    ".family.seed",
    "tower.toml",
    "graphs/*.toml"
]
exclude_patterns = [
    "vault/**",
    "*.log",
    "*.bak"
]
algorithm = "blake3"
# Returns: combined_hash representing entire system state

[[graph.nodes]]
id = "update-spore-meta"
name = "Update Spore Metadata"
type = "capability"
capability = "config.update_json"
required = true
order = 510
depends_on = ["final-checksum"]

[graph.nodes.params]
path = "${SPORE_TARGET}/biomeOS/.spore.json"
updates = {
    "last_validated" = "$(date -Iseconds)",
    "system_checksum" = "${final-checksum.hash}",
    "manifest_version" = "${manifest.version}",
    "validation_mode" = "${UPDATE_MODE}"
}

# ============================================================================
# Outputs
# ============================================================================

[graph.outputs]
spore_root = "${SPORE_TARGET}/biomeOS"
node_id = "${spore_meta.node_id}"
validation_result = "${generate-report.summary}"
system_checksum = "${final-checksum.hash}"
updates_applied = "${generate-report.updates_count}"
vault_path = "${SPORE_TARGET}/biomeOS/vault"

