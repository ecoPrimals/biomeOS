# =============================================================================
# Tower Atomic + Squirrel Deployment Graph - Neural API
# =============================================================================
#
# Extends Tower Atomic with AI orchestration capabilities
#
# Architecture:
#   Anthropic API (HTTPS - external, ionic bonding)
#     ↕
#   Songbird (HTTP/TLS gateway, discovery service)
#     ↕
#   BearDog (Pure Rust crypto operations)
#     ↕
#   Squirrel (AI orchestration, capability-based discovery)
#
# Capability-Based Discovery:
# - Squirrel discovers Songbird via SERVICE_MESH_ENDPOINT
# - Squirrel discovers BearDog via Songbird registry
# - Squirrel discovers AI providers via capability queries
# - Zero hardcoding (no ports, no paths, no model names)
#
# =============================================================================

[graph]
id = "tower_squirrel"
name = "tower_squirrel"
version = "2.0.0"
description = "Tower Atomic + Squirrel: Secure AI via capability-based discovery"
coordination = "Sequential"

# =============================================================================
# Phase 1: Deploy Tower Atomic (BearDog + Songbird)
# =============================================================================

[[nodes]]
id = "start-beardog"
primal = { by_capability = "security" }
output = "beardog_started"
capabilities = ["crypto.sign", "crypto.verify", "security.jwt", "security.hash"]

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "start-songbird"
primal = { by_capability = "discovery" }
output = "songbird_started"
depends_on = ["start-beardog"]
capabilities = ["http.post", "http.get", "http.request", "discovery.announce", "discovery.query", "security.verify"]

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"

[nodes.constraints]
timeout_ms = 30000

# =============================================================================
# Phase 2: Deploy Squirrel (AI Orchestration)
# =============================================================================
# Squirrel uses capability-based discovery:
# - Discovers Songbird (SERVICE_MESH_ENDPOINT)
# - Discovers BearDog via Songbird registry (security capability)
# - Discovers HTTP gateway via Songbird (http capability)
# - Discovers AI providers via Songbird (ai capability queries)

[[nodes]]
id = "start-squirrel"
primal = { by_capability = "ai" }
output = "squirrel_started"
depends_on = ["start-songbird"]
capabilities = ["ai.text_generation", "ai.routing", "tool.orchestration", "ai.query"]

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"
# Squirrel will auto-discover:
# - Songbird (for service discovery via capability registry)
# - BearDog (for security, via Songbird)
# - HTTP gateway (for external APIs, via Songbird's http.request capability)

[nodes.operation.environment]
# External AI API keys (for Tier 1 - External AI via HTTP delegation)
ANTHROPIC_API_KEY = "sk-ant-REDACTED"
# Neural API capability registry for event-driven discovery
CAPABILITY_REGISTRY_SOCKET = "/tmp/neural-api-nat0.sock"
# Note: AI_PROVIDER_SOCKETS should NOT be set - that's for local AI primals (Tier 2)

[nodes.constraints]
timeout_ms = 30000

# =============================================================================
# Phase 3: Validate End-to-End (Tower Atomic + Squirrel)
# =============================================================================

[[nodes]]
id = "validate-stack"
output = "stack_validated"
depends_on = ["start-beardog", "start-songbird", "start-squirrel"]

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_tower_atomic = true  # Verify BearDog + Songbird operational
check_discovery = true  # Verify Squirrel found Songbird
check_ai_ready = true  # Verify Squirrel can route AI requests
check_ionic_bonding = true  # Verify external API access via Tower

