# Bonding Model Test: Covalent Family Alpha
# Deploy complete NUCLEUS with covalent internal bonding (electron-sharing)

[graph]
id = "bonding-test-covalent-family-alpha"
name = "Bonding Test: Family Alpha (Covalent)"
version = "1.0.0"
description = "Deploy NUCLEUS Family Alpha with covalent bonding (shared family_seed, BirdSong mesh)"

[graph.metadata]
# Bonding Model Metadata (per NUCLEUS_BONDING_MODEL.md)
internal_bond_type = "covalent"  # All primals share electrons
default_interaction_bond = "covalent"  # Default for external
trust_model = "genetic_lineage"  # family_seed-based
test_scenario = "covalent_internal"
family_id = "family_alpha"
deployment_target = "local_test"

# Phase 0: Security Foundation (BearDog)
[[nodes]]
id = "launch_beardog_alpha"
node_type = "primal.launch"
description = "Launch BearDog (Security atomic) for Family Alpha"
[nodes.config]
primal_name = "beardog-server"
binary_path = "plasmidBin/primals/beardog-server"
family_id = "family_alpha"
socket_path = "/tmp/beardog-family_alpha.sock"
capabilities = ["security", "crypto", "identity", "trust", "jwt_generation"]
startup_timeout_seconds = 30
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/beardog-family_alpha.sock"
[[nodes.health_check]]
type = "json_rpc_ping"
method = "beardog.capabilities"

# Phase 1: Tower (Songbird - Electron/Discovery)
[[nodes]]
id = "launch_songbird_alpha"
node_type = "primal.launch"
description = "Launch Songbird (Tower atomic) - Electron for Family Alpha mesh"
depends_on = ["launch_beardog_alpha"]
[nodes.config]
primal_name = "songbird-orchestrator"
binary_path = "plasmidBin/primals/songbird-orchestrator"
family_id = "family_alpha"
socket_path = "/tmp/songbird-family_alpha.sock"
capabilities = ["discovery", "mesh", "coordination", "birdsong"]
security_provider = "/tmp/beardog-family_alpha.sock"
startup_timeout_seconds = 30
# Covalent bonding configuration
bonding_mode = "covalent"
electron_sharing = true
mesh_encryption = "birdsong_family_seed"
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/songbird-family_alpha.sock"
[[nodes.health_check]]
type = "json_rpc_ping"
method = "songbird.get_status"

# Phase 2: AI Coordination (Squirrel)
[[nodes]]
id = "launch_squirrel_alpha"
node_type = "primal.launch"
description = "Launch Squirrel (AI/MCP primal) for Family Alpha"
depends_on = ["launch_songbird_alpha"]
[nodes.config]
primal_name = "squirrel"
binary_path = "plasmidBin/primals/squirrel"
family_id = "family_alpha"
socket_path = "/tmp/squirrel-family_alpha.sock"
capabilities = ["ai", "mcp", "llm", "model_context_protocol"]
songbird_endpoint = "/tmp/songbird-family_alpha.sock"
startup_timeout_seconds = 30
# Covalent bonding: shares electrons with Songbird
bonding_mode = "covalent"
electron_sharing = true
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/squirrel-family_alpha.sock"

# Phase 3: Node (ToadStool - Proton/Compute)
[[nodes]]
id = "launch_toadstool_alpha"
node_type = "primal.launch"
description = "Launch ToadStool (Node atomic) - Proton for Family Alpha"
depends_on = ["launch_squirrel_alpha"]
[nodes.config]
primal_name = "toadstool"
binary_path = "plasmidBin/primals/toadstool"
family_id = "family_alpha"
socket_path = "/tmp/toadstool-family_alpha.sock"
capabilities = ["compute", "orchestration", "collaborative_intelligence"]
startup_timeout_seconds = 30
# Covalent bonding: shares compute resources within family
bonding_mode = "covalent"
resource_sharing = true
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/toadstool-family_alpha.sock"

# Phase 4: Nest (NestGate - Neutron/Storage)
[[nodes]]
id = "launch_nestgate_alpha"
node_type = "primal.launch"
description = "Launch NestGate (Nest atomic) - Neutron for Family Alpha"
depends_on = ["launch_toadstool_alpha"]
[nodes.config]
primal_name = "nestgate"
binary_path = "plasmidBin/primals/nestgate"
args = ["service", "start"]
family_id = "family_alpha"
socket_path = "/tmp/nestgate-family_alpha.sock"
security_provider = "/tmp/beardog-family_alpha.sock"
capabilities = ["storage", "persistence", "encryption"]
startup_timeout_seconds = 30
# Covalent bonding: shared encrypted storage within family
bonding_mode = "covalent"
storage_sharing = "encrypted_family_pool"
family_encryption = true
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/nestgate-family_alpha.sock"

# Phase 5: Verify Complete NUCLEUS
[[nodes]]
id = "verify_nucleus_alpha"
node_type = "health.check_all"
description = "Verify all Family Alpha NUCLEUS atomics are healthy"
depends_on = ["launch_beardog_alpha", "launch_songbird_alpha", "launch_squirrel_alpha", "launch_toadstool_alpha", "launch_nestgate_alpha"]
[nodes.config]
check_endpoints = [
    "/tmp/beardog-family_alpha.sock",
    "/tmp/songbird-family_alpha.sock",
    "/tmp/squirrel-family_alpha.sock",
    "/tmp/toadstool-family_alpha.sock",
    "/tmp/nestgate-family_alpha.sock"
]
timeout_seconds = 30
require_all_healthy = true

# Phase 6: Test Covalent Mesh Coordination
[[nodes]]
id = "test_covalent_mesh"
node_type = "log.info"
description = "Validate covalent bonding (electron sharing via BirdSong mesh)"
depends_on = ["verify_nucleus_alpha"]
[nodes.config]
message = "🟢 Family Alpha NUCLEUS deployed! Covalent bonding active: all primals share electrons via BirdSong encrypted mesh. Testing electron-sharing coordination..."

# Phase 7: Deployment Complete
[[nodes]]
id = "alpha_deployment_complete"
node_type = "log.info"
description = "Family Alpha deployment successful"
depends_on = ["test_covalent_mesh"]
[nodes.config]
message = "🏰 Family Alpha NUCLEUS Complete! Internal: COVALENT (electron-sharing mesh). 5/5 primals operational. Ready for bonding boundary tests! 🎉"

