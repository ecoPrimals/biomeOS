# Bonding Model Test: Ionic Interaction Between Families
# Test contract-based interaction between Family Alpha and Family Beta

[graph]
id = "bonding-test-ionic-interaction"
name = "Bonding Test: Ionic Cross-Family"
version = "1.0.0"
description = "Test ionic bonding: Family Alpha requests storage from Family Beta (contract-based, no electron sharing)"

[graph.metadata]
# Bonding Model Metadata (per NUCLEUS_BONDING_MODEL.md)
test_scenario = "ionic_cross_family"
interaction_bond_type = "ionic"
family_alpha = "family_alpha"  # Requester
family_beta = "family_beta"    # Provider
trust_model = "contractual"    # No shared family_seed
electron_behavior = "separate"  # Each keeps own electrons

# Prerequisites: Both families must be deployed
[[nodes]]
id = "verify_alpha_running"
node_type = "health.check_all"
description = "Verify Family Alpha NUCLEUS is operational"
[nodes.config]
check_endpoints = [
    "/tmp/beardog-family_alpha.sock",
    "/tmp/songbird-family_alpha.sock",
    "/tmp/nestgate-family_alpha.sock"
]
timeout_seconds = 30
require_all_healthy = true

[[nodes]]
id = "verify_beta_running"
node_type = "health.check_all"
description = "Verify Family Beta NUCLEUS is operational"
[nodes.config]
check_endpoints = [
    "/tmp/beardog-family_beta.sock",
    "/tmp/songbird-family_beta.sock",
    "/tmp/nestgate-family_beta.sock"
]
timeout_seconds = 30
require_all_healthy = true

# Test 1: Ionic Storage Request (Alpha → Beta)
[[nodes]]
id = "ionic_storage_request"
node_type = "ionic.contract_call"
description = "Family Alpha requests storage from Family Beta (ionic bonding)"
depends_on = ["verify_alpha_running", "verify_beta_running"]
[nodes.config]
from_family = "family_alpha"
to_family = "family_beta"
bond_type = "ionic"
maintains_electrons = true  # Each family keeps own electrons
interaction_type = "storage_request"

# Ionic bonding configuration
[nodes.config.contract]
provider = "family_beta_nestgate"
service_endpoint = "/tmp/nestgate-family_beta.sock"
auth_method = "api_credentials"  # NOT family_seed (different genetic lineages)
metering = true  # Track usage
request_type = "allocate_storage"
storage_size_mb = 100

# Electron behavior: NO sharing
[nodes.config.electron_behavior]
alpha_tower_endpoint = "/tmp/songbird-family_alpha.sock"
beta_tower_endpoint = "/tmp/songbird-family_beta.sock"
electron_sharing = false  # IONIC: each keeps own electrons
interaction_mode = "api_call"  # Electrostatic field interaction only

# Test 2: Validate Ionic Boundary
[[nodes]]
id = "validate_ionic_boundary"
node_type = "log.info"
description = "Confirm ionic bonding: no electron sharing, contract-based only"
depends_on = ["ionic_storage_request"]
[nodes.config]
message = "⚡ IONIC INTERACTION VALIDATED: Family Alpha → Family Beta storage request. Each family maintained own electrons (Towers). No family_seed sharing. Contract-based API interaction only. Bonding boundary respected! ✅"

# Test 3: Verify Family Separation
[[nodes]]
id = "verify_family_separation"
node_type = "verification"
description = "Ensure families remain genetically separate (no family_seed leak)"
depends_on = ["validate_ionic_boundary"]
[nodes.config]
check_type = "family_seed_isolation"
alpha_family_seed_hash = "${ALPHA_FAMILY_SEED_HASH}"
beta_family_seed_hash = "${BETA_FAMILY_SEED_HASH}"
expect_different = true
expect_no_mesh_sharing = true

# Test 4: Verify Electron Independence
[[nodes]]
id = "verify_electron_independence"
node_type = "verification"
description = "Confirm Towers (electrons) remained independent (no molecular orbital)"
depends_on = ["verify_family_separation"]
[nodes.config]
check_type = "electron_independence"
alpha_tower = "/tmp/songbird-family_alpha.sock"
beta_tower = "/tmp/songbird-family_beta.sock"
expect_separate_meshes = true
expect_no_shared_state = true

# Test Complete
[[nodes]]
id = "ionic_test_complete"
node_type = "log.info"
description = "Ionic bonding test complete"
depends_on = ["verify_electron_independence"]
[nodes.config]
message = "🎉 IONIC BONDING TEST COMPLETE! Family Alpha ↔ Family Beta interaction validated. Contract-based (no electron sharing). Electrostatic field interaction. Each family maintained own electrons. TRUE PRIMAL architecture validated! ⚛️"

