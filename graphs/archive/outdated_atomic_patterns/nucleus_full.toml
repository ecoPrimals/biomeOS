# NUCLEUS Full Deployment - All 3 Atomic Niches
# Tower + Node + Nest = Complete Infrastructure

id = "nucleus-full"
version = "1.0.0"
description = "Deploy complete NUCLEUS infrastructure with all 3 atomic niches: Tower (BearDog + Songbird), Node (Tower + Toadstool), Nest (Tower + NestGate)"

[graph]
id = "nucleus-full"
description = "Full NUCLEUS deployment with Tower, Node, and Nest atomics"
execution_mode = "parallel_where_possible"

# ==============================================================================
# TOWER ATOMIC: Security + Discovery Foundation
# ==============================================================================

[[nodes]]
id = "beardog"
node_type = "primal_start"
dependencies = []
[nodes.config]
binary = "plasmidBin/primals/beardog-server"
socket = "/tmp/beardog-${FAMILY_ID}-default.sock"
family_id = "${FAMILY_ID}"
jwt_secret = "${JWT_SECRET}"

[[nodes]]
id = "songbird"
node_type = "primal_start"
dependencies = ["beardog"]
[nodes.config]
binary = "plasmidBin/primals/songbird-orchestrator"
socket = "/run/user/${UID}/songbird-${FAMILY_ID}.sock"
family_id = "${FAMILY_ID}"
security_provider = "/tmp/beardog-${FAMILY_ID}-default.sock"

[[nodes]]
id = "verify-tower"
node_type = "verification"
dependencies = ["beardog", "songbird"]
[nodes.config]
check_sockets = true

# ==============================================================================
# NODE ATOMIC: Tower + Compute/GPU
# ==============================================================================

[[nodes]]
id = "toadstool"
node_type = "primal_start"
dependencies = ["verify-tower"]
[nodes.config]
binary = "plasmidBin/primals/toadstool"
socket = "/run/user/${UID}/toadstool-${FAMILY_ID}.sock"
family_id = "${FAMILY_ID}"

[[nodes]]
id = "verify-node"
node_type = "verification"
dependencies = ["toadstool"]
[nodes.config]
check_sockets = true

# ==============================================================================
# NEST ATOMIC: Tower + Persistence/Storage
# ==============================================================================

[[nodes]]
id = "nestgate"
node_type = "primal_start"
dependencies = ["verify-tower"]
[nodes.config]
binary = "plasmidBin/primals/nestgate"
args = ["service", "start"]
socket = "/run/user/${UID}/nestgate-${FAMILY_ID}.sock"
family_id = "${FAMILY_ID}"
security_provider = "/tmp/beardog-${FAMILY_ID}-default.sock"
jwt_secret = "${JWT_SECRET}"

[[nodes]]
id = "verify-nest"
node_type = "verification"
dependencies = ["nestgate"]
[nodes.config]
check_sockets = true

# ==============================================================================
# FINAL VERIFICATION: Complete NUCLEUS
# ==============================================================================

[[nodes]]
id = "verify-nucleus"
node_type = "verification"
dependencies = ["verify-tower", "verify-node", "verify-nest"]
[nodes.config]
check_sockets = true

