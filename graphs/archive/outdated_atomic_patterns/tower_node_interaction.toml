# 🤝 Tower ↔ Node Cross-Atomic Interaction Test
# Neural API graph for testing communication between atomics

[graph]
name = "tower_node_interaction"
version = "1.0.0"
description = "Test cross-atomic communication and resource coordination"

# Phase 1: Verify Tower Atomic
[[nodes]]
id = "verify_tower"
name = "Verify Tower Status"
capability = "system.verify"
implementation = "biomeOS"
parallel_group = 1

[nodes.params]
atomic_type = "tower"
primals = ["beardog", "songbird"]

[nodes.metrics]
expected_duration_ms = 500
criticality = "critical"

# Phase 2: Verify Node Atomic  
[[nodes]]
id = "verify_node"
name = "Verify Node Status"
capability = "system.verify"
implementation = "biomeOS"
parallel_group = 1

[nodes.params]
atomic_type = "node"
primals = ["beardog", "songbird", "toadstool"]

[nodes.metrics]
expected_duration_ms = 500
criticality = "critical"

# Phase 3: Test BearDog Cross-Atomic Encryption
[[nodes]]
id = "test_beardog_encryption"
name = "Test Cross-Atomic Encryption"
capability = "security.encryption"
implementation = "beardog"
parallel_group = 2
dependencies = ["verify_tower", "verify_node"]

[nodes.params]
operation = "cross_atomic_test"
source_atomic = "tower"
target_atomic = "node"
test_data = "parallel_evolution_test"

[nodes.metrics]
expected_duration_ms = 1000
criticality = "high"

# Phase 4: Test Songbird Cross-Atomic Discovery
[[nodes]]
id = "test_songbird_discovery"
name = "Test Cross-Atomic Discovery"
capability = "discovery.federation"
implementation = "songbird"
parallel_group = 2
dependencies = ["verify_tower", "verify_node"]

[nodes.params]
operation = "cross_atomic_discovery"
discover_from = "tower"
discover_to = "node"

[nodes.metrics]
expected_duration_ms = 1000
criticality = "high"

# Phase 5: Test ToadStool Resource Estimation
[[nodes]]
id = "test_toadstool_resources"
name = "Test ToadStool Resource Coordination"
capability = "compute.estimate"
implementation = "toadstool"
parallel_group = 3
dependencies = ["verify_node"]

[nodes.params]
operation = "resource_estimation"
target_graph = "tower_node_interaction"
coordination_level = "cross_atomic"

[nodes.metrics]
expected_duration_ms = 500
criticality = "medium"

# Phase 6: AI Analysis of Interaction
[[nodes]]
id = "ai_analyze_interaction"
name = "AI Analysis of Cross-Atomic Behavior"
capability = "ai.analyze"
implementation = "squirrel"
parallel_group = 4
dependencies = ["test_beardog_encryption", "test_songbird_discovery", "test_toadstool_resources"]

[nodes.params]
analysis_type = "cross_atomic_interaction"
metrics_sources = ["test_beardog_encryption", "test_songbird_discovery", "test_toadstool_resources"]
learning_mode = "enabled"

[nodes.metrics]
expected_duration_ms = 1000
criticality = "medium"

# Phase 7: Generate Interaction Report
[[nodes]]
id = "generate_report"
name = "Generate Interaction Report"
capability = "system.report"
implementation = "biomeOS"
parallel_group = 5
dependencies = ["ai_analyze_interaction"]

[nodes.params]
report_type = "cross_atomic_interaction"
include_ai_suggestions = true
output_format = "markdown"

[nodes.metrics]
expected_duration_ms = 500
criticality = "low"

# Execution metadata
[execution]
timeout_ms = 20000
parallel_execution = true
collect_metrics = true
learning_enabled = true
generate_visualization = true

[execution.success_criteria]
min_nodes_completed = 7
allow_graceful_degradation = true  # AI analysis optional
critical_nodes = ["verify_tower", "verify_node"]

