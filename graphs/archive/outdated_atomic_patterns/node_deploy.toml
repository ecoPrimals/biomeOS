# =============================================================================
# Compute Node Deployment Graph - Neural API Evolution
# =============================================================================
#
# This graph deploys a complete compute node:
# - ToadStool (universal compute platform)
# - Songbird (for workload discovery, optional)
# - Squirrel (AI optimization, optional)
#
# Deep Debt Principles:
# - Capability-based discovery (zero hardcoding!)
# - Minimal dependencies (compute can run standalone)
# - Optional coordination (Songbird spawned if needed)
# - XDG-compliant paths (no /tmp!)
#
# Note: ToadStool currently has TCP hardcoding issue (127.0.0.1:9944)
#       This graph will work once Unix socket support is added!
#
# Created: January 10, 2026
# Status: Neural API Evolution - Ready (awaiting ToadStool Unix socket)
#
# =============================================================================

[graph]
name = "node_deploy"
version = "2.0.0"
description = "Deploy compute node with universal workload execution"
coordination = "Sequential"

# =============================================================================
# Phase 1: Start Compute Engine (ToadStool)
# =============================================================================
#
# ToadStool provides:
# - Universal compute (native, WASM, container, GPU)
# - Workload scheduling and execution
# - Resource management (CPU, memory, GPU)
# - Multi-runtime support
#
# =============================================================================

[[nodes]]
id = "start-toadstool"
primal = { by_capability = "compute" }
output = "toadstool_started"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "compute"
family_id = "nat0"
resource_type = "hybrid"  # cpu|gpu|wasm|container|hybrid
max_concurrent = 4

[nodes.constraints]
timeout_ms = 60000

[nodes.constraints.retry]
max_attempts = 3
backoff_ms = 2000

# =============================================================================
# Phase 2: Verify Compute Capabilities
# =============================================================================

[[nodes]]
id = "verify-toadstool-health"
primal = { by_capability = "compute" }
output = "compute_health"

[nodes.operation]
name = "health"

[nodes.operation.params]

[nodes.constraints]
timeout_ms = 10000

[[nodes]]
id = "query-toadstool-capabilities"
primal = { by_capability = "compute" }
output = "compute_capabilities"

[nodes.operation]
name = "query_capabilities"

[nodes.operation.params]

[nodes.constraints]
timeout_ms = 10000

# =============================================================================
# Phase 3: Test Workload Submission
# =============================================================================

[[nodes]]
id = "test-submit-workload"
primal = { by_capability = "compute" }
output = "workload_submitted"

[nodes.operation]
name = "submit_workload"

[nodes.operation.params]
workload = {
    id = "test-node-deploy",
    type = "native",
    command = "echo",
    args = ["compute node operational"],
    resources = {
        cpu_cores = 1,
        memory_mb = 256
    }
}

[nodes.constraints]
timeout_ms = 30000

[[nodes]]
id = "query-workload-status"
primal = { by_capability = "compute" }
output = "workload_status"

[nodes.operation]
name = "query_status"

[nodes.operation.params]
workload_id = "test-node-deploy"

[nodes.constraints]
timeout_ms = 10000

# =============================================================================
# Phase 4: Optional - Start Coordination Services
# =============================================================================
#
# These are OPTIONAL - compute node can run standalone!
# Only start if multi-node coordination is needed.
#
# =============================================================================

# Note: Commented out for minimal deployment
# Uncomment if coordination is needed

# [[nodes]]
# id = "start-songbird"
# primal = { by_capability = "discovery" }
# output = "songbird_started"
#
# [nodes.operation]
# name = "start"
#
# [nodes.operation.params]
# mode = "daemon"
# family_id = "nat0"
#
# [nodes.constraints]
# timeout_ms = 30000

# =============================================================================
# Phase 5: Optional - Enable AI Optimization
# =============================================================================

# Note: Commented out for minimal deployment
# Uncomment if AI workload optimization is needed

# [[nodes]]
# id = "start-squirrel"
# primal = { by_capability = "ai" }
# output = "squirrel_started"
#
# [nodes.operation]
# name = "start"
#
# [nodes.operation.params]
# mode = "daemon"
# family_id = "nat0"
#
# [nodes.constraints]
# timeout_ms = 30000

# =============================================================================
# Phase 6: Final Verification
# =============================================================================

[[nodes]]
id = "verify-node-operational"
primal = { by_capability = "compute" }
output = "node_status"

[nodes.operation]
name = "health"

[nodes.operation.params]

[nodes.constraints]
timeout_ms = 10000

# =============================================================================
# Dependencies (Explicit Ordering for Sequential Execution)
# =============================================================================

# Phase 1 → Phase 2 (Start → Verify)
[[edges]]
from = "start-toadstool"
to = "verify-toadstool-health"

[[edges]]
from = "verify-toadstool-health"
to = "query-toadstool-capabilities"

# Phase 2 → Phase 3 (Verify → Test)
[[edges]]
from = "query-toadstool-capabilities"
to = "test-submit-workload"

[[edges]]
from = "test-submit-workload"
to = "query-workload-status"

# Phase 3 → Phase 6 (Test → Final verification)
[[edges]]
from = "query-workload-status"
to = "verify-node-operational"

# If coordination services are enabled:
# [[edges]]
# from = "verify-node-operational"
# to = "start-songbird"
#
# [[edges]]
# from = "start-songbird"
# to = "start-squirrel"

# =============================================================================
# Expected Metrics Collection
# =============================================================================
#
# Neural API will collect:
# - ToadStool startup time (baseline for compute nodes)
# - Capability query time (runtime introspection)
# - Workload submission latency
# - Workload execution time
# - Health check latency
#
# These metrics enable:
# - Performance optimization (identify slow operations)
# - Resource allocation tuning
# - Workload scheduling optimization
# - Predictive capacity planning
#
# =============================================================================

# =============================================================================
# Usage
# =============================================================================
#
# Deploy compute node:
#   biomeos deploy-niche niches/compute-node.toml
#   (Uses this graph automatically via default = true)
#
# Deploy with coordination:
#   1. Uncomment coordination services sections (Phase 4, 5)
#   2. Uncomment corresponding edges
#   3. Deploy: biomeos deploy-niche niches/compute-node.toml
#
# Expected output (minimal):
#   ✅ Phase 1: ToadStool started (PID: xxxx)
#   ✅ Phase 2: Health check passed
#   ✅ Phase 2: Capabilities: compute, workload, scheduling, native, wasm
#   ✅ Phase 3: Test workload submitted (ID: test-node-deploy)
#   ✅ Phase 3: Workload status: completed
#   ✅ Phase 6: Compute node operational!
#
# Total time: ~5-10 seconds (minimal deployment)
#
# Expected output (with coordination):
#   ✅ Phase 1: ToadStool started
#   ✅ Phase 2: Capabilities verified
#   ✅ Phase 3: Test workload passed
#   ✅ Phase 4: Songbird started (coordination enabled)
#   ✅ Phase 5: Squirrel started (AI optimization enabled)
#   ✅ Phase 6: Compute node operational with full coordination!
#
# Total time: ~15-20 seconds (full deployment)
#
# =============================================================================

# =============================================================================
# Known Issues
# =============================================================================
#
# 🚨 ToadStool TCP Hardcoding Issue (BLOCKING):
#
# Current Status:
#   ToadStool JSON-RPC server uses hardcoded TCP endpoint 127.0.0.1:9944
#   (File: ecoPrimals/phase1/toadstool/crates/server/src/jsonrpc_server.rs)
#
# Impact:
#   ❌ Cannot spawn multiple ToadStool instances on same machine
#   ❌ Cannot use Unix sockets (biomeOS standard)
#   ❌ Cannot distribute across multiple machines
#   ❌ Cannot coordinate via Songbird
#
# Resolution:
#   This graph will work fully once ToadStool implements:
#   1. Real Unix socket support (biomeOS standard)
#   2. Dynamic port allocation (if TCP still needed)
#   3. Songbird coordination for endpoint discovery
#
# Workaround:
#   Graph execution will fail at Phase 1 until Unix socket is added.
#   See: TOADSTOOL_DEEP_DEBT_ISSUE.md for details.
#
# Handed off to ToadStool team: 2026-01-10
#
# =============================================================================

