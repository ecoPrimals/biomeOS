# NUCLEUS Ecosystem - TRUE PRIMAL Deployment
# Following Neural API principles: Deploy ecosystems, not isolated primals
#
# This graph defines NUCLEUS as a composed ecosystem where:
# - Primals self-start with environment variables (NO hardcoding!)
# - biomeOS discovers via Unix socket scanning (runtime discovery)
# - Atomics EMERGE from discovered capabilities
# - Each primal only knows itself

[metadata]
name = "NUCLEUS Ecosystem"
description = "Complete NUCLEUS: Tower + Node + Nest + AI + Visualization"
version = "2.0.0"
architecture = "TRUE_PRIMAL"
estimated_time_seconds = 30

[graph]
name = "nucleus_ecosystem"
description = "Ecosystem deployment with capability-based discovery"
execution_mode = "DAG"  # Dependency-aware parallel execution

# Environment template (expanded at runtime)
[environment]
FAMILY_ID = "${FAMILY_ID:-nat0}"
UID = "${UID}"
RUNTIME_DIR = "/run/user/${UID}"
SOCKET_DIR = "${RUNTIME_DIR}"
LOG_DIR = "/tmp"

# Wave 1: Security Foundation (BearDog first, then Songbird)
[[nodes]]
id = "beardog"
name = "BearDog Security Primal"
type = "primal"
binary = "plasmidBin/primals/beardog"
description = "Cryptographic identity, encryption, trust verification"

[nodes.environment]
BEARDOG_FAMILY = "${FAMILY_ID}"
BEARDOG_SOCKET = "${SOCKET_DIR}/beardog-${FAMILY_ID}.sock"
BEARDOG_LOG_LEVEL = "info"

[nodes.health_check]
type = "unix_socket"
path = "${SOCKET_DIR}/beardog-${FAMILY_ID}.sock"
timeout_seconds = 10
retry_count = 3

[[nodes.dependencies]]
# No dependencies - BearDog is foundation

[[nodes]]
id = "songbird"
name = "Songbird Discovery Primal"  
type = "primal"
binary = "plasmidBin/primals/songbird-orchestrator"
description = "P2P discovery, federation, capability registry"

[nodes.environment]
SONGBIRD_FAMILY_ID = "${FAMILY_ID}"
SONGBIRD_NODE_ID = "${FAMILY_ID}"
SONGBIRD_SOCKET = "${SOCKET_DIR}/songbird-${FAMILY_ID}.sock"
SONGBIRD_LOG_LEVEL = "info"
# Songbird will discover BearDog via socket scanning (NO hardcoding!)

[nodes.health_check]
type = "unix_socket"
path = "${SOCKET_DIR}/songbird-${FAMILY_ID}.sock"
timeout_seconds = 10
retry_count = 3

[[nodes.dependencies]]
depends_on = ["beardog"]  # Needs BearDog for genetic lineage
wait_for_health = true

# Wave 2: Core Capabilities (Parallel - both depend on Tower)
[[nodes]]
id = "toadstool"
name = "Toadstool Compute Primal"
type = "primal"
binary = "plasmidBin/primals/toadstool"
description = "Compute orchestration, GPU, containers, neural graphs"

[nodes.environment]
TOADSTOOL_FAMILY = "${FAMILY_ID}"
TOADSTOOL_SOCKET = "${SOCKET_DIR}/toadstool-${FAMILY_ID}.sock"
TOADSTOOL_LOG_LEVEL = "info"
# Toadstool will discover Songbird via socket scanning

[nodes.health_check]
type = "unix_socket"
path = "${SOCKET_DIR}/toadstool-${FAMILY_ID}.sock"
timeout_seconds = 15
retry_count = 3

[[nodes.dependencies]]
depends_on = ["songbird"]  # Registers with Songbird for discovery
wait_for_health = true

[[nodes]]
id = "nestgate"
name = "NestGate Storage Primal"
type = "primal"
binary = "plasmidBin/primals/nestgate"
description = "Sovereign storage, provenance, encryption, compression"

[nodes.environment]
NESTGATE_FAMILY = "${FAMILY_ID}"
NESTGATE_SOCKET = "${SOCKET_DIR}/nestgate-${FAMILY_ID}.sock"
NESTGATE_JWT_SECRET = "${JWT_SECRET:-TEMP_DEV_SECRET_CHANGE_IN_PRODUCTION}"
NESTGATE_LOG_LEVEL = "info"
# NestGate will discover BearDog + Songbird via scanning

[nodes.health_check]
type = "unix_socket"
path = "${SOCKET_DIR}/nestgate-${FAMILY_ID}.sock"
timeout_seconds = 15
retry_count = 3

[[nodes.dependencies]]
depends_on = ["beardog", "songbird"]  # Needs security + discovery
wait_for_health = true

# Wave 3: Intelligence & Interaction (Parallel)
[[nodes]]
id = "squirrel"
name = "Squirrel AI Coordinator"
type = "primal"
binary = "plasmidBin/primals/squirrel"
description = "AI coordination, MCP server, system optimization"

[nodes.environment]
SQUIRREL_FAMILY = "${FAMILY_ID}"
SQUIRREL_SOCKET = "/tmp/squirrel-squirrel.sock"  # Current location
SQUIRREL_LOG_LEVEL = "info"
# Squirrel will discover Songbird via socket scanning
# TODO: Squirrel team to fix HTTP hardcoding (see SQUIRREL_DEEP_DEBT_JAN14.md)

[nodes.health_check]
type = "unix_socket"
path = "/tmp/squirrel-squirrel.sock"
timeout_seconds = 10
retry_count = 3

[[nodes.dependencies]]
depends_on = ["songbird"]  # Registers capabilities with discovery
wait_for_health = true

[[nodes]]
id = "petaltongue"
name = "PetalTongue Visualization"
type = "primal"
binary = "plasmidBin/primals/petaltongue"
description = "Real-time proprioception, multi-modal UI, topology visualization"

[nodes.environment]
PETALTONGUE_FAMILY = "${FAMILY_ID}"
PETALTONGUE_LOG_LEVEL = "info"
# PetalTongue discovers ALL primals via Songbird (NO hardcoding!)
# Expects biomeOS to expose /api/v1/discover endpoint

[nodes.health_check]
type = "process"  # PetalTongue may not expose socket
timeout_seconds = 10

[[nodes.dependencies]]
depends_on = ["songbird", "toadstool", "nestgate", "squirrel"]
# Needs full ecosystem to visualize
wait_for_health = false  # Optional component

# Coordination Layer (biomeOS discovers and validates)
[[nodes]]
id = "discover_ecosystem"
name = "Discover Ecosystem via Songbird"
type = "coordination"
method = "discover_all_primals"
description = "Scan sockets, verify with BearDog, build capability map"

[nodes.params]
family_id = "${FAMILY_ID}"
socket_dir = "${SOCKET_DIR}"
discovery_timeout_seconds = 5

[[nodes.dependencies]]
depends_on = ["beardog", "songbird", "toadstool", "nestgate", "squirrel"]
# After all primals are running

[[nodes]]
id = "verify_atomics"
name = "Verify Atomic Emergence"
type = "coordination"
method = "verify_atomic_composition"
description = "Confirm Tower, Node, Nest atomics emerged from discovery"

[nodes.params]
expected_atomics = ["tower", "node", "nest"]
# Tower = BearDog + Songbird (discovered)
# Node = Tower + Toadstool (discovered)
# Nest = Tower + NestGate (discovered)

[[nodes.dependencies]]
depends_on = ["discover_ecosystem"]

[[nodes]]
id = "enable_visualization"
name = "Enable Real-Time Visualization"
type = "coordination"
method = "expose_topology_api"
description = "Start /api/v1/topology, /discover, /health for petalTongue"

[nodes.params]
bind_address = "127.0.0.1"
bind_port = 8080
enable_sse = true
enable_websocket = true

[[nodes.dependencies]]
depends_on = ["verify_atomics", "petaltongue"]
wait_for_health = false

# Success Criteria
[success]
description = "Full NUCLEUS ecosystem operational with AI and visualization"

# Required primals (must be running)
required_primals = ["beardog", "songbird", "toadstool", "nestgate"]

# Optional primals (enhance capabilities)
optional_primals = ["squirrel", "petaltongue"]

# Atomic emergence (must be discoverable)
required_atomics = ["tower", "node", "nest"]

# Capabilities (must be registered with Songbird)
required_capabilities = [
    "security",      # BearDog
    "discovery",     # Songbird
    "compute",       # Toadstool
    "storage",       # NestGate
]

optional_capabilities = [
    "ai",           # Squirrel
    "visualization", # PetalTongue
]

# Health checks (all must pass)
all_sockets_exist = true
all_primals_responsive = true
songbird_registry_populated = true

# TRUE PRIMAL compliance
no_hardcoded_endpoints = true
capability_based_discovery = true
runtime_composition = true

# Notes for Neural API Executor
[executor_notes]
deployment_strategy = "DAG with parallel waves"
wave_1 = ["beardog", "songbird"]  # Foundation (sequential)
wave_2 = ["toadstool", "nestgate"]  # Capabilities (parallel)
wave_3 = ["squirrel", "petaltongue"]  # Intelligence (parallel)

# Rollback strategy
rollback_on_failure = true
cleanup_sockets = true
kill_child_processes = true

# Metrics to collect (Phase 2)
collect_startup_times = true
collect_socket_creation_times = true
collect_discovery_latency = true
track_dependency_violations = true

# Future: Pathway learning (Phase 3)
learn_optimal_parallelism = true
suggest_prewarming = true
detect_bottlenecks = true

