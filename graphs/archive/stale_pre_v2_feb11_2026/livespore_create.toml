# LiveSpore Creation Graph
#
# Creates a new LiveSpore on removable media (USB/SD) with proper genetic lineage.
#
# Architecture:
# 1. Discover target media via biomeos-spore
# 2. Create directory structure on media
# 3. Generate or derive family seed (BearDog genetics)
# 4. Copy primal binaries from plasmidBin
# 5. Create deployment config
# 6. Bootstrap Tower Atomic on new spore
#
# Lineage Options:
# - genesis: Create new family (independent lineage)
# - sibling: Derive from existing parent seed (genetic relation)
# - clone: Copy exact seed (discouraged - no unique identity)
#
# Usage:
#   neural-api execute graphs/livespore_create.toml \
#     --env SPORE_TARGET=/media/user/USB_DRIVE \
#     --env LINEAGE_MODE=sibling \
#     --env PARENT_SEED_PATH=/media/parent/.family.seed \
#     --env NODE_ID=spore-beta
#
# Author: biomeOS Team
# Date: 2026-01-27

[graph]
id = "livespore-create"
name = "LiveSpore Creation"
version = "1.0.0"
description = "Create a new LiveSpore deployment on removable media with genetic lineage"

[graph.metadata]
family_id = "${FAMILY_ID}"
author = "biomeOS"
created = "2026-01-27"
category = "deployment"

# Environment variables (with defaults)
[graph.env]
SPORE_TARGET = "${SPORE_TARGET:-/tmp/test-spore}"
LINEAGE_MODE = "${LINEAGE_MODE:-genesis}"
PARENT_SEED_PATH = "${PARENT_SEED_PATH:-}"
NODE_ID = "${NODE_ID:-spore-genesis}"
DEPLOYMENT_BATCH = "${DEPLOYMENT_BATCH:-$(date +%Y%m%d)}"

# ============================================================================
# Phase 1: Validation & Preparation
# ============================================================================

[[graph.nodes]]
id = "validate-target"
name = "Validate Target Media"
type = "capability"
capability = "biomeos.validate"
required = true
order = 10

[graph.nodes.config]
action = "validate_writable_path"

[graph.nodes.params]
target_path = "${SPORE_TARGET}"
min_space_mb = 500
create_if_missing = false

[[graph.nodes]]
id = "validate-lineage-mode"
name = "Validate Lineage Configuration"
type = "capability"
capability = "biomeos.validate"
required = true
order = 20

[graph.nodes.config]
action = "validate_lineage_mode"

[graph.nodes.params]
mode = "${LINEAGE_MODE}"
parent_seed_path = "${PARENT_SEED_PATH}"
# sibling mode requires parent_seed_path
# genesis mode ignores parent_seed_path
# clone mode (discouraged) requires parent_seed_path

# ============================================================================
# Phase 2: Directory Structure
# ============================================================================

[[graph.nodes]]
id = "create-structure"
name = "Create Spore Directory Structure"
type = "capability"
capability = "filesystem.create_directories"
required = true
order = 100
depends_on = ["validate-target", "validate-lineage-mode"]

[graph.nodes.params]
base_path = "${SPORE_TARGET}/biomeOS"
directories = [
    "config",
    "graphs",
    "logs",
    "certs",
    "secrets",
    "primals",
    "metrics",
]
permissions = "0755"

# ============================================================================
# Phase 3: Genetic Lineage (via BearDog)
# ============================================================================
#
# SEED STRUCTURE (64 bytes):
#   [0-31]  genesis_seed  - Shared family root (for Dark Forest broadcast)
#   [32-63] node_key      - HKDF(genesis, node_id) - Unique node identity
#
# This enables:
#   - Broadcast: All family members derive SAME key from bytes 0-31
#   - Identity:  Each node has UNIQUE key in bytes 32-63
#   - Lineage:   Verifiable by checking node_key derivation
#

[[graph.nodes]]
id = "generate-genesis"
name = "Generate Genesis Seed (32 bytes)"
type = "capability"
capability = "crypto.generate_random"
required = true
order = 200
depends_on = ["create-structure"]
# Only for genesis mode - siblings inherit from parent

[graph.nodes.config]
primal = "beardog"
skip_if = "${LINEAGE_MODE} != genesis"

[graph.nodes.params]
length = 32
output_path = "${SPORE_TARGET}/biomeOS/.genesis.seed"

[[graph.nodes]]
id = "copy-parent-genesis"
name = "Copy Genesis from Parent (sibling mode)"
type = "capability"
capability = "filesystem.copy_file"
required = true
order = 200
depends_on = ["create-structure"]
# Only for sibling mode

[graph.nodes.config]
skip_if = "${LINEAGE_MODE} == genesis"

[graph.nodes.params]
# Parent's genesis is first 32 bytes of their .family.seed
source = "${PARENT_SEED_PATH}"
target = "${SPORE_TARGET}/biomeOS/.genesis.seed"
bytes_offset = 0
bytes_length = 32

[[graph.nodes]]
id = "derive-node-key"
name = "Derive Node Identity Key"
type = "capability"
capability = "crypto.blake3_keyed_hash"
required = true
order = 210
depends_on = ["generate-genesis", "copy-parent-genesis"]

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
# Derive unique node key: Blake3(genesis || "node-identity:" || node_id)
key_source = "${SPORE_TARGET}/biomeOS/.genesis.seed"
context = "node-identity-v1:${NODE_ID}"
output_path = "${SPORE_TARGET}/biomeOS/.node.key"

[[graph.nodes]]
id = "combine-seed"
name = "Combine Genesis + Node Key (64 bytes)"
type = "capability"
capability = "filesystem.concatenate"
required = true
order = 220
depends_on = ["derive-node-key"]

[graph.nodes.params]
files = [
    "${SPORE_TARGET}/biomeOS/.genesis.seed",
    "${SPORE_TARGET}/biomeOS/.node.key"
]
output = "${SPORE_TARGET}/biomeOS/.family.seed"
cleanup_sources = true  # Remove .genesis.seed and .node.key after combining

[[graph.nodes]]
id = "verify-seed"
name = "Verify Family Seed (64 bytes)"
type = "capability"
capability = "genetic.verify_seed"
required = true
order = 230
depends_on = ["combine-seed"]

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
seed_path = "${SPORE_TARGET}/biomeOS/.family.seed"
expected_size = 64
# BearDog verifies:
# - File exists and is 64 bytes
# - First 32 bytes can derive broadcast key (deterministic via Blake3)
# - Last 32 bytes are valid node identity key
# - Permissions are secure (0600)

# ============================================================================
# Phase 4: Binary Deployment
# ============================================================================

[[graph.nodes]]
id = "copy-beardog"
name = "Copy BearDog Binary"
type = "capability"
capability = "filesystem.copy_file"
required = true
order = 300
depends_on = ["create-structure"]

[graph.nodes.params]
# Use active symlink to get latest versioned binary
source = "plasmidBin/primals/beardog/beardog-active"
target = "${SPORE_TARGET}/biomeOS/primals/beardog"
follow_symlinks = true
set_executable = true

[[graph.nodes]]
id = "copy-songbird"
name = "Copy Songbird Binary"
type = "capability"
capability = "filesystem.copy_file"
required = true
order = 301
depends_on = ["create-structure"]

[graph.nodes.params]
source = "plasmidBin/primals/songbird/songbird-active"
target = "${SPORE_TARGET}/biomeOS/primals/songbird"
follow_symlinks = true
set_executable = true

[[graph.nodes]]
id = "copy-graphs"
name = "Copy Deployment Graphs"
type = "capability"
capability = "filesystem.copy_files"
required = true
order = 310
depends_on = ["create-structure"]

[graph.nodes.params]
source_dir = "graphs"
target_dir = "${SPORE_TARGET}/biomeOS/graphs"
glob = "*.toml"
exclude = ["livespore_create.toml"]  # Don't copy ourselves

# ============================================================================
# Phase 5: Configuration
# ============================================================================

[[graph.nodes]]
id = "create-spore-config"
name = "Create Spore Configuration"
type = "capability"
capability = "config.write_toml"
required = true
order = 400
depends_on = ["verify-seed", "copy-beardog", "copy-songbird"]

[graph.nodes.params]
output_path = "${SPORE_TARGET}/biomeOS/.spore.json"
template = """
{
  "version": "1.0.0",
  "node_id": "${NODE_ID}",
  "lineage_mode": "${LINEAGE_MODE}",
  "created_at": "$(date -Iseconds)",
  "deployment_batch": "${DEPLOYMENT_BATCH}",
  "spore_type": "live",
  "capabilities": ["tower_atomic", "neural_api"]
}
"""

[[graph.nodes]]
id = "create-tower-config"
name = "Create Tower Configuration"
type = "capability"
capability = "config.write_toml"
required = true
order = 410
depends_on = ["create-spore-config"]

[graph.nodes.params]
output_path = "${SPORE_TARGET}/biomeOS/tower.toml"
template = """
# Tower Atomic Configuration
# Generated by livespore_create graph

[tower]
node_id = "${NODE_ID}"
family_id = "${FAMILY_ID}"
deployment_mode = "live_spore"

[tower.sockets]
beardog = "/tmp/beardog-${NODE_ID}.sock"
songbird = "/tmp/songbird-${NODE_ID}.sock"
neural_api = "/tmp/neural-api-${NODE_ID}.sock"

[tower.security]
require_btsp = true
allow_federation = true
lineage_verification = "genetic"

[tower.federation]
# Trust settings for genetic lineage verification
trust_siblings = true
trust_level = "limited"
require_seed_verification = true
"""

[[graph.nodes]]
id = "create-deploy-script"
name = "Create Deployment Script"
type = "capability"
capability = "filesystem.write_file"
required = true
order = 420
depends_on = ["create-tower-config"]

[graph.nodes.params]
output_path = "${SPORE_TARGET}/biomeOS/deploy.sh"
permissions = "0755"
# Deploy script copies from standardized template and substitutes variables
source_template = "templates/livespore_deploy.sh"
substitutions = {
    "__FAMILY_ID__" = "1894e909e454",
    "__NODE_ID__" = "${NODE_ID}",
    "__SPORE_VERSION__" = "1.0.0"
}

# ============================================================================
# Phase 6: Lineage Registration (if sibling)
# ============================================================================

[[graph.nodes]]
id = "register-lineage"
name = "Register Lineage with Parent (if sibling)"
type = "capability"
capability = "genetic.register_sibling"
required = false
order = 500
depends_on = ["create-deploy-script"]
# Only executes if LINEAGE_MODE=sibling
condition = "${LINEAGE_MODE} == sibling"

[graph.nodes.config]
primal = "beardog"

[graph.nodes.params]
parent_seed_path = "${PARENT_SEED_PATH}"
child_seed_path = "${SPORE_TARGET}/biomeOS/.family.seed"
node_id = "${NODE_ID}"
# BearDog:
# 1. Reads both seeds
# 2. Verifies child is derived from parent (HKDF check)
# 3. Registers the relationship in lineage chain

# ============================================================================
# Phase 7: Verification
# ============================================================================

[[graph.nodes]]
id = "final-verification"
name = "Final Spore Verification"
type = "capability"
capability = "biomeos.verify"
required = true
order = 600
depends_on = ["create-deploy-script"]

[graph.nodes.params]
spore_root = "${SPORE_TARGET}/biomeOS"
required_files = [
    ".family.seed",
    ".spore.json",
    "tower.toml",
    "deploy.sh",
    "primals/beardog",
    "primals/songbird",
]
required_dirs = [
    "graphs",
    "logs",
    "config",
]

# Output summary
[graph.outputs]
spore_root = "${SPORE_TARGET}/biomeOS"
seed_path = "${SPORE_TARGET}/biomeOS/.family.seed"
node_id = "${NODE_ID}"
lineage_mode = "${LINEAGE_MODE}"
deploy_script = "${SPORE_TARGET}/biomeOS/deploy.sh"

