# Compute Node Shutdown Graph

[graph]
name = "node_shutdown"
version = "1.0.0"
description = "Graceful shutdown of compute node"
coordination_pattern = "sequential"

[[nodes]]
id = "drain-workloads"
primal = { by_capability = "universal-compute" }

[nodes.operation]
name = "drain"
[nodes.operation.params]
timeout_seconds = 300

[nodes.constraints]
timeout_ms = 320000

[[nodes]]
id = "shutdown-toadstool"
primal = { by_capability = "universal-compute" }
operation = { name = "shutdown" }

[nodes.constraints]
timeout_ms = 30000

[[edges]]
from = "drain-workloads"
to = "shutdown-toadstool"
