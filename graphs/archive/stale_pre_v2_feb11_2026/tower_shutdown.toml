# =============================================================================
# Tower Shutdown Graph
# =============================================================================
#
# Gracefully shutdown all tower components
#
# =============================================================================

[graph]
name = "tower-shutdown"
description = "Gracefully shutdown tower components"
version = "1.0.0"
coordination = "Sequential"

[[nodes]]
id = "drain-tunnels"
primal = { by_capability = "discovery" }
operation = { name = "drain_tunnels" }
output = "tunnels_drained"

[nodes.constraints]
timeout_ms = 10000

[[nodes]]
id = "stop-songbird"
primal = { by_capability = "discovery" }
operation = { name = "stop" }
output = "songbird_stopped"

[nodes.constraints]
timeout_ms = 5000

[[nodes]]
id = "stop-beardog"
primal = { by_capability = "encryption" }
operation = { name = "stop" }
output = "beardog_stopped"

[nodes.constraints]
timeout_ms = 5000

[[edges]]
from = "drain-tunnels"
to = "stop-songbird"

[[edges]]
from = "stop-songbird"
to = "stop-beardog"

