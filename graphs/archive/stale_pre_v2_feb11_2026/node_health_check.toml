# Compute Node Health Check Graph

[graph]
name = "node_health_check"
version = "1.0.0"
description = "Health check for compute node"
coordination_pattern = "parallel"

[[nodes]]
id = "check-toadstool"
primal = { by_capability = "universal-compute" }
operation = { name = "health_check" }
parallel_group = 1

[nodes.constraints]
timeout_ms = 10000
