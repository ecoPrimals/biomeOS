# nucleus_genome.toml - NUCLEUS Deployment (All 6 Primals + biomeOS)
# Universal genomeBin graph deployment
# Platform: Linux (x86_64), Android (aarch64), macOS (aarch64/x86_64)

[metadata]
name = "nucleus"
version = "0.2.0"
description = "Deploy complete NUCLEUS (biomeOS + 5 primals) via genomeBin"
author = "biomeOS Core Team"

# Deploy biomeOS (Orchestrator)
[[nodes]]
id = "deploy_biomeos"
type = "genome.deploy"
description = "Deploy biomeOS genomeBin orchestrator"

[nodes.config]
genome = "biomeos.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30

# Deploy BearDog (Security Foundation)
[[nodes]]
id = "deploy_beardog"
type = "genome.deploy"
description = "Deploy BearDog genomeBin"

[nodes.config]
genome = "beardog.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30

# Deploy Songbird (Discovery & Federation)
[[nodes]]
id = "deploy_songbird"
type = "genome.deploy"
description = "Deploy Songbird genomeBin"
depends_on = ["deploy_beardog"]

[nodes.config]
genome = "songbird.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30
requires = ["beardog"]

# Deploy Squirrel (AI Coordination)
[[nodes]]
id = "deploy_squirrel"
type = "genome.deploy"
description = "Deploy Squirrel genomeBin"
depends_on = ["deploy_beardog"]

[nodes.config]
genome = "squirrel.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30
requires = ["beardog"]

# Deploy Toadstool (GPU Compute)
[[nodes]]
id = "deploy_toadstool"
type = "genome.deploy"
description = "Deploy Toadstool genomeBin"
depends_on = ["deploy_beardog"]

[nodes.config]
genome = "toadstool.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30
requires = ["beardog"]

# Deploy NestGate (Storage & Persistence)
[[nodes]]
id = "deploy_nestgate"
type = "genome.deploy"
description = "Deploy NestGate genomeBin"
depends_on = ["deploy_beardog"]

[nodes.config]
genome = "nestgate.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30
requires = ["beardog"]

# Verify NUCLEUS health
[[nodes]]
id = "verify_nucleus"
type = "health.check_atomic"
description = "Verify NUCLEUS atomicity"
depends_on = [
    "deploy_beardog",
    "deploy_songbird",
    "deploy_squirrel",
    "deploy_toadstool",
    "deploy_nestgate"
]

[nodes.config]
primals = ["beardog", "songbird", "squirrel", "toadstool", "nestgate"]
timeout = 15
required_capabilities = ["security", "discovery", "ai", "compute", "storage"]

# Verify lineage
[[nodes]]
id = "verify_lineage"
type = "lineage.verify_siblings"
description = "Verify primal lineage"
depends_on = ["verify_nucleus"]

[nodes.config]
primals = ["beardog", "songbird", "squirrel", "toadstool", "nestgate"]
verify_family_id = true

# Report deployment success
[[nodes]]
id = "report_success"
type = "report.deployment_success"
description = "Report NUCLEUS deployment success"
depends_on = ["verify_lineage"]

[nodes.config]
deployment = "nucleus"
primals = ["biomeos", "beardog", "songbird", "squirrel", "toadstool", "nestgate"]
notify = ["console", "log"]
full_ecosystem = true
