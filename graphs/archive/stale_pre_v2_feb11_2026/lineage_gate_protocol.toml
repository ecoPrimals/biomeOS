# Lineage Gate Protocol Graph
#
# Implements the Family Beacon + Lineage Gate architecture for
# cryptographic verification of genetic family membership.
#
# Flow:
#   1. generate_challenge - Create nonce for challenge
#   2. request_proof - Ask peer to generate lineage proof
#   3. verify_proof - Verify peer's proof with our seed
#   4. derive_session - Derive shared session key (if verified)
#
# Usage:
#   neural-api execute lineage_gate_protocol \
#     --env PEER_SOCKET=/tmp/beardog-1894e909e454-node-beta.sock \
#     --env OUR_SEED_B64=<base64_seed>
#

[graph]
id = "lineage_gate_protocol"
description = "Cryptographic verification of genetic lineage before federation"
coordination = "Sequential"

# Step 1: Generate challenge nonce
[[nodes]]
id = "generate_challenge"
output = "challenge"

[nodes.action]
type = "command"
command = "openssl"
args = ["rand", "-hex", "32"]

# Step 2: Request lineage proof from peer
[[nodes]]
id = "request_proof"
depends_on = ["generate_challenge"]
output = "peer_proof"

[nodes.primal]
socket = "{{ context.env.PEER_SOCKET }}"

[nodes.operation]
name = "genetic.generate_lineage_proof"

[nodes.operation.params]
our_family_id = "{{ context.env.PEER_FAMILY_ID }}"
peer_family_id = "{{ context.env.OUR_FAMILY_ID }}"
lineage_seed = "{{ context.env.PEER_SEED_B64 }}"

# Step 3: Verify peer's proof with our seed
[[nodes]]
id = "verify_proof"
depends_on = ["request_proof"]
output = "verification_result"

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "genetic.verify_lineage"

[nodes.operation.params]
our_family_id = "{{ context.env.OUR_FAMILY_ID }}"
peer_family_id = "{{ context.env.PEER_FAMILY_ID }}"
lineage_proof = "{{ nodes.request_proof.output.proof }}"
lineage_seed = "{{ context.env.OUR_SEED_B64 }}"

# Step 4: Derive session key (only if verification passed)
[[nodes]]
id = "derive_session"
depends_on = ["verify_proof"]
output = "session"
condition = "{{ nodes.verify_proof.output.valid == true }}"

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "genetic.derive_lineage_key"

[nodes.operation.params]
our_family_id = "{{ context.env.OUR_FAMILY_ID }}"
peer_family_id = "{{ context.env.PEER_FAMILY_ID }}"
context = "session-{{ nodes.generate_challenge.output }}"
lineage_seed = "{{ context.env.OUR_SEED_B64 }}"

# Metadata
[metadata]
version = "1.0.0"
author = "biomeOS"
created = "2026-01-27"
purpose = "Lineage gate verification before federation"
security_level = "family_verified"
enclave_ready = true

