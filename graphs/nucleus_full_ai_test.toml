# =============================================================================
# NUCLEUS Full AI Integration Test Graph
# =============================================================================
#
# Comprehensive test of all three NUCLEUS atomic configurations with AI:
# 1. Tower Atomic: BearDog + Songbird (security + discovery foundation)
# 2. Node Atomic: + Toadstool (local compute with 4070 GPU)
# 3. Nest Atomic: + NestGate (model persistence from HuggingFace)
# 4. Squirrel AI: Multi-provider AI coordination (local + online)
#
# Test Scenarios:
# - Local AI inference (Llama via 4070)
# - Online AI query (Anthropic/OpenAI via API keys)
# - Model persistence to NestGate
# - Cross-primal capability.call routing
#
# Hardware: RTX 4070 12GB VRAM
# API Keys: ../../testing-secrets/api-keys.toml
#
# Created: January 29, 2026
# Status: Phase 2 Integration Testing
#
# =============================================================================

[graph]
id = "nucleus_full_ai_test"
name = "NUCLEUS Full AI Integration Test"
version = "1.0.0"
description = "Complete NUCLEUS deployment with Squirrel AI testing (Tower + Node + Nest + AI)"
coordination = "Sequential"

# =============================================================================
# PHASE 1: TOWER ATOMIC (Security Foundation)
# BearDog → Songbird
# =============================================================================

[[nodes]]
id = "deploy_tower_beardog"
output = "beardog_ready"
capabilities = ["crypto", "tls_crypto", "genetic", "security"]

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
RUST_LOG = "beardog=info"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
# Core crypto
"crypto.generate_keypair" = "crypto.x25519_generate_ephemeral"
"crypto.ecdh_derive" = "crypto.x25519_derive_secret"
"crypto.encrypt" = "crypto.chacha20_poly1305_encrypt"
"crypto.decrypt" = "crypto.chacha20_poly1305_decrypt"
"crypto.hash" = "crypto.blake3_hash"
"crypto.sign" = "crypto.sign_ed25519"
"crypto.verify" = "crypto.verify_ed25519"

[[nodes]]
id = "deploy_tower_songbird"
depends_on = ["deploy_tower_beardog"]
output = "songbird_ready"
capabilities = ["http", "discovery", "secure_http", "federation"]

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "/run/user/${UID}/biomeos/beardog.sock"
SONGBIRD_SECURITY_PROVIDER = "beardog"
RUST_LOG = "songbird=info"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"http.request" = "http.request"
"http.get" = "http.get"
"http.post" = "http.post"
"discovery.announce" = "announce_capabilities"
"discovery.query" = "discover_by_capability"

# Health check Tower
[[nodes]]
id = "verify_tower_health"
depends_on = ["deploy_tower_beardog", "deploy_tower_songbird"]
output = "tower_healthy"

[nodes.operation]
name = "health.check_atomic"

[nodes.operation.params]
atomic_type = "tower"
components = ["beardog", "songbird"]

[nodes.constraints]
timeout_ms = 10000

# =============================================================================
# PHASE 2: NODE ATOMIC (Local Compute with 4070 GPU)
# Tower + Toadstool
# =============================================================================

[[nodes]]
id = "deploy_node_toadstool"
depends_on = ["verify_tower_health"]
output = "toadstool_ready"
capabilities = ["compute", "workload", "orchestration", "ai_local", "gpu"]

[nodes.primal]
by_capability = "compute"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "gpu-server"  # Use GPU mode for 4070
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
RUST_LOG = "toadstool=info"
CUDA_VISIBLE_DEVICES = "0"  # RTX 4070
GPU_MEMORY_FRACTION = "0.9"  # Use 90% of 12GB

[nodes.constraints]
timeout_ms = 45000  # GPU initialization takes longer

[nodes.capabilities_provided]
"compute.schedule" = "schedule_workload"
"compute.estimate" = "estimate_resources"
"ai.local_inference" = "run_inference"
"gpu.allocate" = "allocate_gpu_memory"
"gpu.query" = "query_gpu_status"

# Health check Node
[[nodes]]
id = "verify_node_health"
depends_on = ["deploy_node_toadstool"]
output = "node_healthy"

[nodes.operation]
name = "health.check_atomic"

[nodes.operation.params]
atomic_type = "node"
components = ["beardog", "songbird", "toadstool"]

[nodes.constraints]
timeout_ms = 10000

# GPU capability verification
[[nodes]]
id = "verify_gpu_capabilities"
depends_on = ["verify_node_health"]
output = "gpu_verified"

[nodes.operation]
name = "compute.query_gpu"

[nodes.operation.params]
check_cuda = true
min_vram_gb = 10  # Verify 4070's 12GB

[nodes.constraints]
timeout_ms = 5000

# =============================================================================
# PHASE 3: NEST ATOMIC (Model Persistence)
# Tower + NestGate
# =============================================================================

[[nodes]]
id = "deploy_nest_nestgate"
depends_on = ["verify_tower_health"]
output = "nestgate_ready"
capabilities = ["storage", "persistence", "provenance", "cache"]

[nodes.primal]
by_capability = "storage"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "model-cache"  # Optimized for AI model storage
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
RUST_LOG = "nestgate=info"
STORAGE_PATH = "/var/lib/biomeos/nestgate/models"
CACHE_SIZE_GB = "50"  # Reserve 50GB for model cache

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"storage.store" = "store"
"storage.retrieve" = "retrieve"
"storage.list" = "list"
"model.cache" = "cache_model"
"model.load" = "load_cached_model"

# Health check Nest
[[nodes]]
id = "verify_nest_health"
depends_on = ["deploy_nest_nestgate"]
output = "nest_healthy"

[nodes.operation]
name = "health.check_atomic"

[nodes.operation.params]
atomic_type = "nest"
components = ["beardog", "songbird", "nestgate"]

[nodes.constraints]
timeout_ms = 10000

# =============================================================================
# PHASE 4: SQUIRREL AI (Multi-Provider AI Coordinator)
# Tower + Node + Nest + Squirrel
# =============================================================================

[[nodes]]
id = "deploy_squirrel_ai"
depends_on = ["verify_node_health", "verify_nest_health"]
output = "squirrel_ready"
capabilities = ["ai", "ai_online", "ai_local", "mcp", "reasoning"]

[nodes.primal]
by_capability = "ai"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "mcp-server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
# API keys from testing-secrets
ANTHROPIC_API_KEY_FILE = "/home/eastgate/Development/ecoPrimals/testing-secrets/api-keys.toml"
OPENAI_API_KEY_FILE = "/home/eastgate/Development/ecoPrimals/testing-secrets/api-keys.toml"
HUGGINGFACE_TOKEN_FILE = "/home/eastgate/Development/ecoPrimals/testing-secrets/api-keys.toml"

# Local model configuration
LOCAL_MODEL_PROVIDER = "toadstool"  # Use Toadstool for local inference
MODEL_CACHE_PROVIDER = "nestgate"    # Use NestGate for model persistence

RUST_LOG = "squirrel=info"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"ai.chat" = "chat_completion"
"ai.query" = "query"
"ai.reason" = "reason_about"
"ai.local" = "local_inference"
"ai.online" = "online_query"
"model.list" = "list_models"
"model.select" = "select_best_model"

# Health check Squirrel
[[nodes]]
id = "verify_squirrel_health"
depends_on = ["deploy_squirrel_ai"]
output = "squirrel_healthy"

[nodes.operation]
name = "health.check"

[nodes.operation.params]
primal = "squirrel"
check_providers = ["anthropic", "openai", "local"]

[nodes.constraints]
timeout_ms = 10000

# =============================================================================
# PHASE 5: AI CAPABILITY TESTS
# =============================================================================

# Test 1: Local AI inference via Toadstool (4070 GPU)
[[nodes]]
id = "test_local_ai"
depends_on = ["verify_squirrel_health", "verify_gpu_capabilities"]
output = "local_ai_result"

[nodes.operation]
name = "ai.local_inference"

[nodes.operation.params]
prompt = "What are the key principles of biomeOS architecture?"
model = "llama-3-8b"  # Or whatever model is available locally
max_tokens = 150
temperature = 0.7

[nodes.constraints]
timeout_ms = 30000  # GPU inference can take time

# Test 2: Online AI query via Anthropic
[[nodes]]
id = "test_anthropic_ai"
depends_on = ["verify_squirrel_health"]
output = "anthropic_result"

[nodes.operation]
name = "ai.online_query"

[nodes.operation.params]
provider = "anthropic"
model = "claude-3-5-sonnet-20241022"
prompt = "Explain the concept of capability-based discovery in 2 sentences."
max_tokens = 100

[nodes.constraints]
timeout_ms = 15000

# Test 3: Model caching to NestGate
[[nodes]]
id = "test_model_cache"
depends_on = ["verify_nest_health"]
output = "model_cached"

[nodes.operation]
name = "model.cache"

[nodes.operation.params]
model_name = "meta-llama/Llama-3.2-1B"  # Small model for testing
source = "huggingface"
cache_location = "nestgate"

[nodes.constraints]
timeout_ms = 120000  # Model download can take time

# Test 4: Cross-capability routing test
[[nodes]]
id = "test_capability_routing"
depends_on = ["test_local_ai", "test_anthropic_ai"]
output = "routing_verified"

[nodes.operation]
name = "ai.query"

[nodes.operation.params]
# Let Squirrel decide: local vs online based on load/availability
prompt = "What is 2+2?"
prefer_local = true  # Try local first, fallback to online

[nodes.constraints]
timeout_ms = 20000

# =============================================================================
# PHASE 6: VERIFICATION & REPORTING
# =============================================================================

[[nodes]]
id = "verify_all_capabilities"
depends_on = [
    "test_local_ai",
    "test_anthropic_ai",
    "test_model_cache",
    "test_capability_routing"
]
output = "all_tests_complete"

[nodes.operation]
name = "report.test_results"

[nodes.operation.params]
tests_run = [
    "tower_atomic_health",
    "node_atomic_health",
    "nest_atomic_health",
    "squirrel_ai_health",
    "local_ai_inference",
    "anthropic_query",
    "model_caching",
    "capability_routing"
]

[[nodes]]
id = "deployment_summary"
depends_on = ["verify_all_capabilities"]
output = "deployment_complete"

[nodes.operation]
name = "report.deployment_success"

[nodes.operation.params]
atomics_deployed = ["tower", "node", "nest"]
primals_active = ["beardog", "songbird", "toadstool", "nestgate", "squirrel"]
capabilities_tested = [
    "crypto",
    "discovery",
    "compute",
    "storage",
    "ai_local",
    "ai_online",
    "model_cache"
]
