[graph]
id = "node_atomic_test"
version = "1.0"
description = "Node atomic deployment for primal interaction testing"

[graph.metadata]
family_id = "test"
node_id = "test-node"
deployment_type = "node"  # Node atomic (compute layer)

# Node Atomic: ToadStool (compute) + NestGate (storage)
# With BearDog (security) and Songbird (comms) for complete NUCLEUS

[[nodes]]
id = "beardog"
type = "primal.launch"
binary = "beardog-server"
socket_path = "/tmp/beardog-test.sock"
env = { BEARDOG_FAMILY_ID = "test", BEARDOG_NODE_ID = "test-node" }

[[nodes]]
id = "songbird"
type = "primal.launch"
binary = "songbird-orchestrator"
socket_path = "/tmp/songbird-test.sock"
env = { SONGBIRD_FAMILY_ID = "test", SONGBIRD_NODE_ID = "test-node" }
depends_on = ["beardog"]

[[nodes]]
id = "nestgate"
type = "primal.launch"
binary = "nestgate"
socket_path = "/tmp/nestgate-test.sock"
env = { NESTGATE_FAMILY_ID = "test", NESTGATE_NODE_ID = "test-node" }
depends_on = ["beardog", "songbird"]

[[nodes]]
id = "toadstool"
type = "primal.launch"
binary = "toadstool-server"
socket_path = "/tmp/toadstool-test.sock"
env = { TOADSTOOL_FAMILY_ID = "test", TOADSTOOL_NODE_ID = "test-node" }
depends_on = ["beardog", "songbird", "nestgate"]

[[nodes]]
id = "health_check"
type = "test.health_check"
targets = ["beardog", "songbird", "nestgate", "toadstool"]
depends_on = ["toadstool"]
