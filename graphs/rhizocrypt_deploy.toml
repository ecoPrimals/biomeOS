# rhizoCrypt Deployment Graph
# Deploys rhizoCrypt (ephemeral DAG engine) atop Tower Atomic
#
# rhizoCrypt provides content-addressed DAGs, sessions, Merkle proofs,
# dehydration (commit to LoamSpine), and slice management.
# Protocol: tarpc (9400). Discovers via Songbird.
#
# Required: Tower (BearDog + Songbird)
# Optional: LoamSpine (dehydration target), NestGate (payload storage)

[graph]
id = "rhizocrypt_deploy"
version = "1.0.0"
description = "rhizoCrypt ephemeral DAG engine deployment"

# PHASE 1: VERIFY TOWER FOUNDATION

[[nodes]]
id = "verify-tower"

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "beardog"
timeout_secs = 10

[[nodes]]
id = "verify-songbird"
depends_on = ["verify-tower"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "songbird"
timeout_secs = 10

# PHASE 2: START RHIZOCRYPT

[[nodes]]
id = "start-rhizocrypt"
depends_on = ["verify-songbird"]

[nodes.operation]
name = "primal.launch"

[nodes.operation.environment]
RHIZOCRYPT_RPC_PORT = "9400"
RHIZOCRYPT_RPC_HOST = "0.0.0.0"
RHIZOCRYPT_ENV = "production"
RHIZOCRYPT_DISCOVERY_ADAPTER = "http://127.0.0.1:8080"

[nodes.config]
primal_name = "rhizocrypt"
mode = "server"

# PHASE 3: REGISTER CAPABILITIES

[[nodes]]
id = "register-capabilities"
depends_on = ["start-rhizocrypt"]
capabilities = ["ephemeral_workspace", "dag", "session", "merkle", "dehydration", "slice"]

[nodes.operation]
name = "register_capabilities"

[nodes.config]
primal_name = "rhizocrypt"

# PHASE 4: VERIFY HEALTH

[[nodes]]
id = "verify-health"
depends_on = ["register-capabilities"]

[nodes.operation]
name = "health_check"

[nodes.config]
primal_name = "rhizocrypt"
timeout_secs = 5
