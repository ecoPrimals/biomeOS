# node_genome.toml - NODE Deployment (TOWER + GPU Compute)
# Universal genomeBin graph deployment
# Platform: Linux (x86_64), Android (aarch64), macOS (aarch64/x86_64)

[metadata]
name = "node"
version = "0.1.0"
description = "Deploy NODE (TOWER + Toadstool) via genomeBin"
author = "biomeOS Core Team"

# Deploy BearDog (Security Foundation)
[[nodes]]
id = "deploy_beardog"
type = "genome.deploy"
description = "Deploy BearDog genomeBin"

[nodes.config]
genome = "beardog.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30

# Deploy Songbird (Discovery & Federation)
[[nodes]]
id = "deploy_songbird"
type = "genome.deploy"
description = "Deploy Songbird genomeBin"
depends_on = ["deploy_beardog"]

[nodes.config]
genome = "songbird.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30
requires = ["beardog"]

# Deploy Toadstool (GPU Compute)
[[nodes]]
id = "deploy_toadstool"
type = "genome.deploy"
description = "Deploy Toadstool genomeBin"
depends_on = ["deploy_songbird"]

[nodes.config]
genome = "toadstool.genome"
target = "auto"
wait_ready = true
healthcheck_timeout = 30
requires = ["beardog", "songbird"]

# Detect GPU capabilities
[[nodes]]
id = "detect_gpu"
type = "hardware.detect_gpu"
description = "Detect GPU capabilities"
depends_on = ["deploy_toadstool"]

[nodes.config]
check_cuda = true
check_rocm = true
check_vulkan = true
check_metal = true

# Verify NODE health
[[nodes]]
id = "verify_node"
type = "health.check_atomic"
description = "Verify NODE atomicity"
depends_on = ["detect_gpu"]

[nodes.config]
primals = ["beardog", "songbird", "toadstool"]
timeout = 15
required_capabilities = ["security", "discovery", "compute"]

# Test GPU compute
[[nodes]]
id = "test_gpu_compute"
type = "test.gpu_compute"
description = "Test GPU compute capability"
depends_on = ["verify_node"]

[nodes.config]
test_inference = true
test_parallel = true
timeout = 60

# Report deployment success
[[nodes]]
id = "report_success"
type = "report.deployment_success"
description = "Report NODE deployment success"
depends_on = ["test_gpu_compute"]

[nodes.config]
deployment = "node"
primals = ["beardog", "songbird", "toadstool"]
notify = ["console", "log"]
gpu_info = true
