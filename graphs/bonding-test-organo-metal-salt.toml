# Bonding Model Test: Organo-Metal-Salt Complex
# Test multi-modal interaction: Covalent basement ↔ Ionic cloud ↔ Metallic data center

[graph]
id = "bonding-test-organo-metal-salt"
name = "Bonding Test: Organo-Metal-Salt Complex"
version = "1.0.0"
description = "Test organo-metal-salt complex: Multi-modal interactions (covalent local + ionic external + metallic integration)"

[graph.metadata]
# Bonding Model Metadata (per NUCLEUS_BONDING_MODEL.md Section 3)
test_scenario = "organo_metal_salt_complex"
local_bond = "covalent"  # Family Alpha internal
remote_bond_1 = "ionic"  # Family Alpha → Cloud API
remote_bond_2 = "metallic"  # Family Alpha → Data center integration
interaction_complexity = "multi_modal"
chemistry_analogy = "organo_metallic_complex"

# Prerequisites: Family Alpha running (basement cluster, covalent internal)
[[nodes]]
id = "verify_alpha_running"
node_type = "health.check_all"
description = "Verify Family Alpha (basement cluster) is operational"
[nodes.config]
check_endpoints = [
    "/tmp/beardog-family_alpha.sock",
    "/tmp/songbird-family_alpha.sock",
    "/tmp/toadstool-family_alpha.sock",
    "/tmp/nestgate-family_alpha.sock"
]
timeout_seconds = 30
require_all_healthy = true

# Log: Basement (Covalent) Internal State
[[nodes]]
id = "log_basement_covalent"
node_type = "log.info"
description = "Confirm basement cluster internal covalent bonding"
depends_on = ["verify_alpha_running"]
[nodes.config]
message = "🟢 BASEMENT (Family Alpha): Internal bonding = COVALENT. 5 nodes sharing electrons via BirdSong mesh. Shared family_seed. Collaborative compute/storage."

# Test 1: IONIC Interaction (Basement → Cloud GPU)
[[nodes]]
id = "ionic_cloud_gpu_request"
node_type = "ionic.contract_call"
description = "Basement requests GPU hours from cloud (ionic bonding)"
depends_on = ["log_basement_covalent"]
[nodes.config]
from = "family_alpha_basement"
to = "cloud_gpu_provider"
bond_type = "ionic"
maintains_electrons = true  # Basement keeps own electrons

# Ionic contract (per NUCLEUS_BONDING_MODEL.md Section 2.1)
[nodes.config.contract]
provider = "simulated_cloud_gpu"
service_type = "gpu_hours"
auth_method = "api_key"  # Not family_seed
metering = true
sla = "99.9_percent"
billing = "per_hour"
request_quantity = 100

# Electron behavior: Separate
[nodes.config.electron_behavior]
basement_tower = "/tmp/songbird-family_alpha.sock"
cloud_tower = "https://api.cloud.com/discovery"  # Cloud keeps own electrons
electron_sharing = false
interaction_mode = "api_call"

# Test 2: METALLIC Integration (Basement Node → Data Center Cluster)
[[nodes]]
id = "metallic_datacenter_join"
node_type = "metallic.cluster_join"
description = "Basement ToadStool joins data center electron sea (metallic bonding)"
depends_on = ["ionic_cloud_gpu_request"]
[nodes.config]
from = "family_alpha_toadstool"
to = "datacenter_cluster"
bond_type = "metallic"
join_electron_sea = true  # Basement Tower contributes to data center pool

# Metallic integration (per NUCLEUS_BONDING_MODEL.md Section 2.3)
[nodes.config.integration]
cluster_type = "datacenter"
cluster_coordinator = "simulated_datacenter_orchestrator"
specialization_enabled = true
node_role = "preprocessing"  # Basement node specializes
electron_contribution = true  # Basement Tower joins electron sea

# Electron behavior: Joins sea
[nodes.config.electron_behavior]
basement_tower = "/tmp/songbird-family_alpha.sock"
datacenter_electron_sea = "simulated_datacenter_electron_pool"
electron_sharing = true  # Metallic: contributes to global pool
delocalized = true  # Not tied to specific NUCLEUS

# Test 3: COVALENT Internal (Basement nodes coordinate despite external connections)
[[nodes]]
id = "covalent_internal_coordination"
node_type = "verification"
description = "Verify basement nodes still coordinate via covalent bonding (internal)"
depends_on = ["metallic_datacenter_join"]
[nodes.config]
check_type = "covalent_mesh_integrity"
family_id = "family_alpha"
expect_mesh_active = true
expect_electron_sharing = true
expect_birdsong_encrypted = true

# Despite external ionic/metallic connections:
[nodes.config.validation]
expect_internal_covalent = true  # Basement nodes still share electrons internally
expect_family_seed_intact = true  # Genetic lineage maintained
expect_collaborative_compute = true

# Test 4: Validate Multi-Modal Interaction (Organo-Metal-Salt)
[[nodes]]
id = "validate_organo_metal_salt"
node_type = "verification"
description = "Confirm multi-modal bonding: Covalent (local) + Ionic (cloud) + Metallic (datacenter)"
depends_on = ["covalent_internal_coordination"]
[nodes.config]
check_type = "multi_modal_bonding"

# Validate three simultaneous bonding modes
[nodes.config.bonding_modes]
internal = "covalent"  # Basement nodes share electrons
external_cloud = "ionic"  # Cloud GPU contract (no electron sharing)
external_datacenter = "metallic"  # Datacenter integration (electron sea)

# Validate organo-metal-salt characteristics (per NUCLEUS_BONDING_MODEL.md Section 3.2)
[nodes.config.validation]
expect_internal_covalent = true
expect_external_ionic = true
expect_external_metallic = true
expect_simultaneous = true  # All three active at once
expect_electron_partitioning = true  # Electrons intelligently partitioned

# Test 5: Verify Electron Partitioning
[[nodes]]
id = "verify_electron_partitioning"
node_type = "verification"
description = "Confirm Tower (electrons) correctly partitioned across bonding modes"
depends_on = ["validate_organo_metal_salt"]
[nodes.config]
check_type = "electron_partitioning"

# Electron distribution (per NUCLEUS_BONDING_MODEL.md)
[nodes.config.electron_distribution]
basement_mesh_electrons = "shared_molecular_orbital"  # Covalent internal
cloud_api_electrons = "separate_atomic_orbital"  # Ionic external
datacenter_sea_electrons = "delocalized_sea"  # Metallic external

# Test Complete
[[nodes]]
id = "organo_metal_salt_complete"
node_type = "log.info"
description = "Organo-metal-salt test complete"
depends_on = ["verify_electron_partitioning"]
[nodes.config]
message = "🌟 ORGANO-METAL-SALT COMPLEX TEST COMPLETE! Basement (Covalent) simultaneously interacted with Cloud (Ionic) and Data Center (Metallic). Multi-modal bonding validated. Electrons correctly partitioned. TRUE PRIMAL architecture supports complex interactions! ⚛️🎉"

