# Source of truth: biomeOS/graphs/ (runtime execution format with [[nodes]])
# Validation/structural variant: primalSpring/graphs/spring_deploy/wetspring_deploy.toml
# =============================================================================
# wetSpring Deploy Graph
# =============================================================================
#
# Deploys wetSpring as a NUCLEUS science primal atop Node Atomic:
#   Tower (BearDog + Songbird) → ToadStool (GPU compute) → wetSpring (science)
#
# wetSpring registers 9 science capabilities covering:
#   - Biodiversity (Shannon, Simpson, Chao1, Bray-Curtis, Pielou)
#   - Phylogenetics (Felsenstein, HMM, alignment)
#   - Anderson QS coupling (GPU spectral on ToadStool)
#   - QS Biofilm modeling (4 scenarios)
#   - NCBI data routing (via NestGate or sovereign HTTP)
#   - Full pipeline (diversity → QS → analysis)
#   - Brain module (observe, attention, urgency)
#   - Metrics snapshot
#
# Cross-spring shader evolution:
#   - hotSpring DF64 precision → GPU diversity ops
#   - neuralSpring GEMM → drug repurposing NMF
#   - airSpring hydrology → soil QS models
#   - groundSpring tolerances → validation backbone
#
# STATUS: Experimental (Mar 8, 2026)
# Requires: Tower Atomic (BearDog + Songbird)
# Optional: ToadStool (GPU offload), NestGate (data caching)
#
# Usage:
#   biomeos deploy graphs/wetspring_deploy.toml
#
# =============================================================================

[graph]
id = "wetspring_deploy"
description = "wetSpring life-science primal atop Node Atomic"
coordination = "Sequential"

# =============================================================================
# Phase 1: Tower Atomic (security + network foundation)
# =============================================================================

[[nodes]]
id = "germinate_beardog"
output = "beardog_genesis"
capabilities = ["crypto", "tls_crypto", "genetic", "security"]

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"crypto.generate_keypair" = "crypto.x25519_generate_ephemeral"
"crypto.encrypt" = "crypto.chacha20_poly1305_encrypt"
"crypto.hash" = "crypto.blake3_hash"
"crypto.sign" = "crypto.sign_ed25519"

[[nodes]]
id = "germinate_songbird"
depends_on = ["germinate_beardog"]
output = "songbird_genesis"
capabilities = ["http", "discovery", "secure_http", "tls"]

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SECURITY_PROVIDER = "beardog"

[nodes.constraints]
timeout_ms = 30000

[nodes.capabilities_provided]
"network.http_request" = "http.request"
"network.tls_connect" = "tls.connect"
"discovery.announce" = "announce_capabilities"
"discovery.query" = "discover_by_capability"

# =============================================================================
# Phase 2: ToadStool (GPU/CPU compute — optional but recommended)
# =============================================================================

[[nodes]]
id = "germinate_toadstool"
depends_on = ["germinate_beardog", "germinate_songbird"]
output = "toadstool_genesis"
capabilities = ["compute", "workload"]

[nodes.primal]
by_capability = "compute"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/songbird-${FAMILY_ID}.sock"

[nodes.constraints]
timeout_ms = 45000

[nodes.capabilities_provided]
"compute.health" = "toadstool.health"
"compute.execute" = "toadstool.execute"
"compute.capabilities" = "toadstool.query_capabilities"

# =============================================================================
# Phase 3: wetSpring (life-science primal)
# =============================================================================

[[nodes]]
id = "germinate_wetspring"
depends_on = ["germinate_beardog", "germinate_songbird"]
output = "wetspring_genesis"
capabilities = ["science", "biodiversity", "metagenomics", "spectral", "phylogenetics", "qs_biofilm", "drug_repurposing"]

[nodes.primal]
by_capability = "science"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BIOMEOS_SOCKET_DIR = "${XDG_RUNTIME_DIR}/biomeos"
FAMILY_ID = "${FAMILY_ID}"
SONGBIRD_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/songbird-${FAMILY_ID}.sock"

[nodes.constraints]
timeout_ms = 15000

[nodes.capabilities_provided]
# Science domain
"science.diversity" = "science.diversity"
"science.anderson" = "science.anderson"
"science.qs_model" = "science.qs_model"
"science.ncbi_fetch" = "science.ncbi_fetch"
"science.full_pipeline" = "science.full_pipeline"
# Brain module
"brain.observe" = "brain.observe"
"brain.attention" = "brain.attention"
"brain.urgency" = "brain.urgency"
# Metrics
"metrics.snapshot" = "metrics.snapshot"

# =============================================================================
# Phase 4: Validate wetSpring Atomic
# =============================================================================

[[nodes]]
id = "validate_wetspring_atomic"
depends_on = ["germinate_beardog", "germinate_songbird", "germinate_wetspring"]
output = "wetspring_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_wetspring = true
timeout_seconds = 15

[nodes.constraints]
timeout_ms = 20000
