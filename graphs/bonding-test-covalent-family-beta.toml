# Bonding Model Test: Covalent Family Beta
# Deploy independent NUCLEUS with different family_seed (separate genetic lineage)

[graph]
id = "bonding-test-covalent-family-beta"
name = "Bonding Test: Family Beta (Covalent + Ionic)"
version = "1.0.0"
description = "Deploy NUCLEUS Family Beta with covalent internal bonding (separate from Alpha)"

[graph.metadata]
# Bonding Model Metadata (per NUCLEUS_BONDING_MODEL.md)
internal_bond_type = "covalent"  # All primals share electrons
default_interaction_bond = "ionic"  # External interactions use ionic (contract-based)
trust_model = "genetic_lineage"  # Different family_seed from Alpha
test_scenario = "covalent_internal_ionic_external"
family_id = "family_beta"
deployment_target = "local_test"

# Phase 0: Security Foundation (BearDog)
[[nodes]]
id = "launch_beardog_beta"
node_type = "primal.launch"
description = "Launch BearDog (Security atomic) for Family Beta"
[nodes.config]
primal_name = "beardog-server"
binary_path = "plasmidBin/primals/beardog-server"
family_id = "family_beta"
socket_path = "/tmp/beardog-family_beta.sock"
capabilities = ["security", "crypto", "identity", "trust", "jwt_generation"]
startup_timeout_seconds = 30
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/beardog-family_beta.sock"
[[nodes.health_check]]
type = "json_rpc_ping"
method = "beardog.capabilities"

# Phase 1: Tower (Songbird - Electron/Discovery)
[[nodes]]
id = "launch_songbird_beta"
node_type = "primal.launch"
description = "Launch Songbird (Tower atomic) - Electron for Family Beta mesh"
depends_on = ["launch_beardog_beta"]
[nodes.config]
primal_name = "songbird-orchestrator"
binary_path = "plasmidBin/primals/songbird-orchestrator"
family_id = "family_beta"
socket_path = "/tmp/songbird-family_beta.sock"
capabilities = ["discovery", "mesh", "coordination", "birdsong"]
security_provider = "/tmp/beardog-family_beta.sock"
startup_timeout_seconds = 30
# Covalent bonding internally, ionic externally
bonding_mode = "covalent"
electron_sharing = true
mesh_encryption = "birdsong_family_seed"
external_interaction_mode = "ionic"  # No electron sharing with other families
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/songbird-family_beta.sock"
[[nodes.health_check]]
type = "json_rpc_ping"
method = "songbird.get_status"

# Phase 2: AI Coordination (Squirrel)
[[nodes]]
id = "launch_squirrel_beta"
node_type = "primal.launch"
description = "Launch Squirrel (AI/MCP primal) for Family Beta"
depends_on = ["launch_songbird_beta"]
[nodes.config]
primal_name = "squirrel"
binary_path = "plasmidBin/primals/squirrel"
family_id = "family_beta"
socket_path = "/tmp/squirrel-family_beta.sock"
capabilities = ["ai", "mcp", "llm", "model_context_protocol"]
songbird_endpoint = "/tmp/songbird-family_beta.sock"
startup_timeout_seconds = 30
# Covalent bonding: shares electrons with Family Beta Songbird
bonding_mode = "covalent"
electron_sharing = true
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/squirrel-family_beta.sock"

# Phase 3: Node (ToadStool - Proton/Compute)
[[nodes]]
id = "launch_toadstool_beta"
node_type = "primal.launch"
description = "Launch ToadStool (Node atomic) - Proton for Family Beta"
depends_on = ["launch_squirrel_beta"]
[nodes.config]
primal_name = "toadstool"
binary_path = "plasmidBin/primals/toadstool"
family_id = "family_beta"
socket_path = "/tmp/toadstool-family_beta.sock"
capabilities = ["compute", "orchestration", "collaborative_intelligence"]
startup_timeout_seconds = 30
# Covalent bonding: shares compute resources within Family Beta
bonding_mode = "covalent"
resource_sharing = true
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/toadstool-family_beta.sock"

# Phase 4: Nest (NestGate - Neutron/Storage)
[[nodes]]
id = "launch_nestgate_beta"
node_type = "primal.launch"
description = "Launch NestGate (Nest atomic) - Neutron for Family Beta"
depends_on = ["launch_toadstool_beta"]
[nodes.config]
primal_name = "nestgate"
binary_path = "plasmidBin/primals/nestgate"
args = ["service", "start"]
family_id = "family_beta"
socket_path = "/tmp/nestgate-family_beta.sock"
security_provider = "/tmp/beardog-family_beta.sock"
capabilities = ["storage", "persistence", "encryption"]
startup_timeout_seconds = 30
# Covalent bonding: shared encrypted storage within Family Beta
bonding_mode = "covalent"
storage_sharing = "encrypted_family_pool"
family_encryption = true
# Ionic external: can provide storage as a service to other families
external_storage_mode = "ionic"  # Contract-based API for external access
[[nodes.health_check]]
type = "socket_exists"
path = "/tmp/nestgate-family_beta.sock"

# Phase 5: Verify Complete NUCLEUS
[[nodes]]
id = "verify_nucleus_beta"
node_type = "health.check_all"
description = "Verify all Family Beta NUCLEUS atomics are healthy"
depends_on = ["launch_beardog_beta", "launch_songbird_beta", "launch_squirrel_beta", "launch_toadstool_beta", "launch_nestgate_beta"]
[nodes.config]
check_endpoints = [
    "/tmp/beardog-family_beta.sock",
    "/tmp/songbird-family_beta.sock",
    "/tmp/squirrel-family_beta.sock",
    "/tmp/toadstool-family_beta.sock",
    "/tmp/nestgate-family_beta.sock"
]
timeout_seconds = 30
require_all_healthy = true

# Phase 6: Test Covalent Internal / Ionic External Boundary
[[nodes]]
id = "test_bonding_boundary"
node_type = "log.info"
description = "Validate covalent internal + ionic external bonding boundary"
depends_on = ["verify_nucleus_beta"]
[nodes.config]
message = "🔵 Family Beta NUCLEUS deployed! Internal: COVALENT (electron-sharing). External: IONIC (contract-based, no electron sharing with other families). Testing bonding boundary..."

# Phase 7: Deployment Complete
[[nodes]]
id = "beta_deployment_complete"
node_type = "log.info"
description = "Family Beta deployment successful"
depends_on = ["test_bonding_boundary"]
[nodes.config]
message = "🏰 Family Beta NUCLEUS Complete! Internal: COVALENT (electron-sharing mesh). External: IONIC (separate from Alpha). 5/5 primals operational. Ready for cross-family tests! 🎉"

