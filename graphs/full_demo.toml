# Full System Demo - Tower + Node + UI Atomic
# Demonstrates complete primal interactions (BearDog, Songbird, Toadstool, Squirrel, petalTongue)

id = "full-demo"
version = "1.0.0"
description = "Complete biomeOS demo: Tower + Node + UI Atomic (no NestGate)"

[graph]
id = "full-demo-deploy"
description = "Deploy Tower + Node + UI Atomic"
execution_mode = "parallel_where_possible"

# Phase 1: Deploy Tower (Security + Discovery)
[[nodes]]
id = "start-beardog"
node_type = "primal_start"
dependencies = []
[nodes.config]
primal_name = "beardog"
binary_path = "plasmidBin/primals/beardog-server"
socket_path = "/tmp/beardog-${FAMILY_ID}-default.sock"
log_path = "/tmp/primals/beardog-${FAMILY_ID}.log"
env = { "BEARDOG_FAMILY_ID" = "${FAMILY_ID}", "BEARDOG_SOCKET_PATH" = "/tmp/beardog-${FAMILY_ID}-default.sock", "BEARDOG_JWT_SECRET" = "${JWT_SECRET}" }

[[nodes]]
id = "start-songbird"
node_type = "primal_start"
dependencies = ["start-beardog"]
[nodes.config]
primal_name = "songbird"
binary_path = "plasmidBin/primals/songbird-orchestrator"
socket_path = "/tmp/songbird-${FAMILY_ID}.sock"
log_path = "/tmp/primals/songbird-${FAMILY_ID}.log"
env = { "SONGBIRD_FAMILY_ID" = "${FAMILY_ID}", "SONGBIRD_SOCKET_PATH" = "/tmp/songbird-${FAMILY_ID}.sock", "SONGBIRD_SECURITY_PROVIDER" = "/tmp/beardog-${FAMILY_ID}-default.sock" }

# Phase 2: Deploy Node (Compute)
[[nodes]]
id = "start-toadstool"
node_type = "primal_start"
dependencies = ["start-songbird"]
[nodes.config]
primal_name = "toadstool"
binary_path = "plasmidBin/primals/toadstool"
socket_path = "/tmp/toadstool-${FAMILY_ID}.sock"
log_path = "/tmp/primals/toadstool-${FAMILY_ID}.log"
env = { "TOADSTOOL_FAMILY_ID" = "${FAMILY_ID}", "TOADSTOOL_SOCKET_PATH" = "/tmp/toadstool-${FAMILY_ID}.sock" }

# Phase 3: Deploy UI Atomic (AI + Visualization)
[[nodes]]
id = "start-squirrel"
node_type = "primal_start"
dependencies = ["start-songbird"]
[nodes.config]
primal_name = "squirrel"
binary_path = "plasmidBin/primals/squirrel"
socket_path = "/tmp/squirrel-${FAMILY_ID}.sock"
log_path = "/tmp/primals/squirrel-${FAMILY_ID}.log"
env = { "SQUIRREL_FAMILY_ID" = "${FAMILY_ID}", "SQUIRREL_SOCKET_PATH" = "/tmp/squirrel-${FAMILY_ID}.sock", "SONGBIRD_SOCKET" = "/tmp/songbird-${FAMILY_ID}.sock", "BEARDOG_SOCKET" = "/tmp/beardog-${FAMILY_ID}-default.sock" }

[[nodes]]
id = "start-petaltongue"
node_type = "primal_start"
dependencies = ["start-songbird", "start-toadstool"]
[nodes.config]
primal_name = "petaltongue"
binary_path = "plasmidBin/primals/petaltongue"
socket_path = "/tmp/petaltongue-${FAMILY_ID}.sock"
log_path = "/tmp/primals/petaltongue-${FAMILY_ID}.log"
env = { "PETALTONGUE_FAMILY_ID" = "${FAMILY_ID}", "PETALTONGUE_SOCKET_PATH" = "/tmp/petaltongue-${FAMILY_ID}.sock", "TOADSTOOL_SOCKET" = "/tmp/toadstool-${FAMILY_ID}.sock", "SONGBIRD_SOCKET" = "/tmp/songbird-${FAMILY_ID}.sock" }

# Phase 4: Verify all primals
[[nodes]]
id = "verify-deployment"
node_type = "verification"
dependencies = ["start-toadstool", "start-squirrel", "start-petaltongue"]
[nodes.config]
primal_sockets = [
    "/tmp/beardog-${FAMILY_ID}-default.sock",
    "/tmp/songbird-${FAMILY_ID}.sock",
    "/tmp/toadstool-${FAMILY_ID}.sock",
    "/tmp/squirrel-${FAMILY_ID}.sock",
    "/tmp/petaltongue-${FAMILY_ID}.sock"
]

