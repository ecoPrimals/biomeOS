# UI Niche Shutdown Graph

[graph]
id = "ui_shutdown"
name = "UI Niche Shutdown"
description = "Graceful shutdown of petalTongue and biomeOS"
version = "1.0.0"
coordination_pattern = "Sequential"

# Node 1: Stop petalTongue first
[[nodes]]
id = "stop_petaltongue"
description = "Gracefully stop petalTongue UI"

[nodes.primal_selector]
type = "ByCapability"
capability = "ui.desktop-interface"

[nodes.operation]
type = "Stop"

[nodes.operation.params]
graceful = true
timeout_seconds = 10

# Node 2: Stop biomeOS
[[nodes]]
id = "stop_biomeos"
description = "Gracefully stop biomeOS"
depends_on = ["stop_petaltongue"]

[nodes.primal_selector]
type = "ByCapability"
capability = "topology.provider"

[nodes.operation]
type = "Stop"

[nodes.operation.params]
graceful = true
timeout_seconds = 10

