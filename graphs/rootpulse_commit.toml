# RootPulse Commit Workflow
# Orchestrates the provenance trio: rhizoCrypt → BearDog → NestGate → LoamSpine → sweetGrass
#
# Temporal collapse: ephemeral DAG session is dehydrated to permanent linear history
# with cryptographic signing, content storage, and semantic attribution.
#
# Required: Tower (BearDog + Songbird) + rhizoCrypt + NestGate + LoamSpine
# Optional: sweetGrass (attribution)
#
# Prerequisites:
#   A LoamSpine spine must already exist (created via rootpulse_branch or spine.create).
#   An active rhizoCrypt DAG session must exist (created via dag.session.create).
#
# Required input variables:
#   ${SESSION_ID}  — rhizoCrypt DAG session ID (string)
#   ${SPINE_ID}    — LoamSpine spine ID (string)
#   ${FAMILY_ID}   — ecoPrimals family ID (string)
#   ${AGENT_DID}   — committer DID, e.g. did:key:z6Mk... (string)
#
# Method names validated against primalSpring capability_registry.toml (May 7, 2026).

[graph]
id = "rootpulse_commit"
description = "RootPulse commit: dehydrate ephemeral session to permanent history with attribution"
coordination = "Sequential"

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 1: HEALTH CHECKS
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "check_rhizocrypt"
output = "rhizocrypt_healthy"
capabilities = ["dag"]

[nodes.operation]
name = "rpc_call"
target = "rhizocrypt"

[nodes.operation.params]
method = "health"
params = {}

[nodes.constraints]
timeout_ms = 5000

[[nodes]]
id = "check_loamspine"
output = "loamspine_healthy"
capabilities = ["permanent_storage"]

[nodes.operation]
name = "rpc_call"
target = "loamspine"

[nodes.operation.params]
method = "health"
params = {}

[nodes.constraints]
timeout_ms = 5000

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 2: DEHYDRATE (rhizoCrypt)
# Compute Merkle root, extract frontier, produce DehydrationSummary.
# Method: dag.dehydration.trigger (rhizoCrypt)
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "dehydrate_session"
depends_on = ["check_rhizocrypt"]
output = "dehydration_summary"
capabilities = ["dehydration"]

[nodes.operation]
name = "capability_call"

[nodes.operation.params]
capability = "dag.dehydration.trigger"
params = { session_id = "${SESSION_ID}" }

[nodes.constraints]
timeout_ms = 30000

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 3: SIGN (BearDog)
# Cryptographically sign the dehydration summary.
# Method: crypto.sign (BearDog)
# Param: `message` (base64-encoded payload), NOT `data`.
# Returns: { signature, public_key }
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "sign_commit"
depends_on = ["dehydrate_session"]
output = "signed_summary"
capabilities = ["crypto"]

[nodes.operation]
name = "capability_call"

[nodes.operation.params]
capability = "crypto.sign"
params = { message = "${DEHYDRATION_SUMMARY}" }

[nodes.constraints]
timeout_ms = 10000

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 4: STORE CONTENT (NestGate)
# Persist payload content to content-addressed storage.
# Method: storage.store (NestGate)
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "store_content"
depends_on = ["sign_commit"]
output = "content_stored"
capabilities = ["storage"]

[nodes.operation]
name = "rpc_call"
target = "nestgate"

[nodes.operation.params]
method = "storage.store"
params = { key = "rootpulse:commit:${SESSION_ID}", value = "${SIGNED_SUMMARY}", family_id = "${FAMILY_ID}" }

[nodes.constraints]
timeout_ms = 30000

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 5: COMMIT TO PERMANENT HISTORY (LoamSpine)
# Append to linear immutable history.
# Method: session.commit (LoamSpine) — NOT commit.session.
# Params: spine_id, session_id, session_hash, committer (DID string).
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "commit_permanent"
depends_on = ["store_content", "check_loamspine"]
output = "commit_ref"
capabilities = ["permanent_storage"]

[nodes.operation]
name = "capability_call"

[nodes.operation.params]
capability = "session.commit"
params = { spine_id = "${SPINE_ID}", session_id = "${SESSION_ID}", session_hash = "${CONTENT_STORED}", committer = "${AGENT_DID}" }

[nodes.constraints]
timeout_ms = 30000

# ═══════════════════════════════════════════════════════════════════════════════
# PHASE 6: ATTRIBUTE (sweetGrass) — optional
# Create provenance braid for semantic attribution.
# Method: braid.create (sweetGrass) — NOT provenance.create_braid.
# Params: data_hash, source, description, mime_type, size.
# ═══════════════════════════════════════════════════════════════════════════════

[[nodes]]
id = "create_attribution"
depends_on = ["commit_permanent"]
output = "braid_ref"
capabilities = ["attribution"]

[nodes.operation]
name = "capability_call"

[nodes.operation.params]
capability = "braid.create"
params = { data_hash = "${COMMIT_REF}", source = "rootpulse:commit", description = "RootPulse commit attribution for session ${SESSION_ID}", mime_type = "application/json", size = 0 }

[nodes.constraints]
timeout_ms = 15000
