# Tower Atomic Bootstrap Graph
# Used by biomeOS in Bootstrap Mode to create the ecosystem foundation
#
# This graph creates the Tower Atomic (BearDog + Songbird)
# which serves as generation 0 security foundation for all other primals

[graph]
id = "tower_atomic_bootstrap"
description = "Genesis: Create Tower Atomic (ecosystem security foundation)"
coordination = "Sequential"  # BearDog must start before Songbird

# Phase 1: Germinate BearDog (Crypto Foundation)
[[nodes]]
id = "germinate_beardog"
output = "beardog_genesis"

[nodes.primal]
by_capability = "security"  # Discovers beardog binary via capability

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"  # Can be overridden by executor

[nodes.constraints]
timeout_ms = 30000  # 30s to start

# Capability Translation: BearDog's semantic → actual method mappings
# Note: BearDog methods already use semantic namespaces (crypto., tls., etc.)
# BearDog v0.9.0: 23 crypto methods (8 core + 8 ECDSA/RSA + 4 genetic + 3 TLS)
[nodes.capabilities_provided]
# Core Crypto Operations (8 methods)
"crypto.generate_keypair" = "crypto.x25519_generate_ephemeral"
"crypto.ecdh_derive" = "crypto.x25519_derive_secret"
"crypto.encrypt" = "crypto.chacha20_poly1305_encrypt"
"crypto.decrypt" = "crypto.chacha20_poly1305_decrypt"
"crypto.hash" = "crypto.blake3_hash"
"crypto.hmac" = "crypto.hmac_sha256"
"crypto.sign" = "crypto.sign_ed25519"
"crypto.verify" = "crypto.verify_ed25519"

# ECDSA Signature Algorithms (4 methods) - Phase 1 & 2 (96% HTTPS coverage)
"crypto.sign_ecdsa_p256" = "crypto.sign_ecdsa_secp256r1"
"crypto.verify_ecdsa_p256" = "crypto.verify_ecdsa_secp256r1"
"crypto.sign_ecdsa_p384" = "crypto.sign_ecdsa_secp384r1"
"crypto.verify_ecdsa_p384" = "crypto.verify_ecdsa_secp384r1"

# RSA Signature Algorithms (4 methods) - Phase 4 (legacy + modern)
"crypto.sign_rsa_pkcs1" = "crypto.sign_rsa_pkcs1_sha256"
"crypto.verify_rsa_pkcs1" = "crypto.verify_rsa_pkcs1_sha256"
"crypto.sign_rsa_pss" = "crypto.sign_rsa_pss_sha256"
"crypto.verify_rsa_pss" = "crypto.verify_rsa_pss_sha256"

# TLS Crypto Operations (3 methods)
"tls.derive_secrets" = "tls.derive_secrets"
"tls.sign_handshake" = "tls.sign_handshake"
"tls.verify_certificate" = "tls.verify_certificate"

# Genetic Crypto Operations (4 methods) - Phase 5
"genetic.derive_key" = "genetic.derive_lineage_key"
"genetic.mix_entropy" = "genetic.mix_entropy"
"genetic.verify_lineage" = "genetic.verify_lineage"
"genetic.generate_proof" = "genetic.generate_lineage_proof"

# Parameter Mappings: Translate semantic param names to actual param names
# Format: "semantic.capability" = { "semantic_param" = "actual_param" }
[nodes.parameter_mappings]
"crypto.ecdh_derive" = { "private_key" = "our_secret", "public_key" = "their_public" }
# Note: ECDSA and RSA methods use semantic parameter names (data, signature, public_key)
# so no parameter mapping needed for those methods

# Phase 2: Germinate Songbird (Network + BTSP)
[[nodes]]
id = "germinate_songbird"
depends_on = ["germinate_beardog"]  # CRITICAL: Wait for BearDog
output = "songbird_genesis"

[nodes.primal]
by_capability = "discovery"  # Discovers songbird binary via capability

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "nat0"

# Environment variables for Songbird
[nodes.operation.environment]
NEURAL_API_SOCKET = "/tmp/neural-api-nat0.sock"  # For capability translation routing
BEARDOG_SOCKET = "/tmp/beardog-nat0.sock"  # Security provider (for non-HTTP crypto operations)
SONGBIRD_SECURITY_PROVIDER = "/tmp/beardog-nat0.sock"  # Alternative name for security provider

# Genetic bonding: Songbird inherits from BearDog
# BEARDOG_SOCKET will be injected by executor (nucleation)

[nodes.constraints]
timeout_ms = 30000  # 30s to start

# Capability Translation: Songbird's semantic → actual method mappings
[nodes.capabilities_provided]
"http.request" = "http_request"
"http.get" = "http_get"
"http.post" = "http_post"
"discovery.announce" = "discovery_announce"
"discovery.query" = "discovery_query"

# Phase 3: Validate Tower Atomic Health
[[nodes]]
id = "validate_tower"
depends_on = ["germinate_beardog", "germinate_songbird"]
output = "tower_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_btsp_tunnel = true  # Verify they can establish BTSP tunnel
timeout_seconds = 10

[nodes.constraints]
timeout_ms = 15000  # 15s for validation

