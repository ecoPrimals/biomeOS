# Tower Atomic HTTPS Test Graph
# Tests 100% Pure Rust HTTPS via Neural API orchestration
#
# Prerequisites: tower_atomic_bootstrap.toml has been executed
# This graph validates HTTPS functionality against real servers

[graph]
id = "tower_atomic_https_test"
description = "Validate HTTPS via Tower Atomic (BearDog + Songbird)"
coordination = "Sequential"
version = "1.0.0"

# Optional: Run bootstrap if not already running
# [includes]
# bootstrap = "tower_atomic_bootstrap.toml"

# Test 1: HTTPS GET to Cloudflare (known TLS 1.3 support)
[[nodes]]
id = "https_cloudflare"
output = "cloudflare_response"

[nodes.operation]
name = "http.request"
target_capability = "discovery"  # Routes to Songbird

[nodes.operation.params]
url = "https://www.cloudflare.com"
method = "GET"
timeout_ms = 10000

[nodes.constraints]
timeout_ms = 15000
retry_count = 1

# Test 2: HTTPS GET to Google (excellent TLS 1.3)
[[nodes]]
id = "https_google"
depends_on = ["https_cloudflare"]
output = "google_response"

[nodes.operation]
name = "http.request"
target_capability = "discovery"

[nodes.operation.params]
url = "https://www.google.com"
method = "GET"
timeout_ms = 10000

[nodes.constraints]
timeout_ms = 15000
retry_count = 1

# Test 3: HTTPS GET to GitHub (real-world API endpoint)
[[nodes]]
id = "https_github"
depends_on = ["https_google"]
output = "github_response"

[nodes.operation]
name = "http.request"
target_capability = "discovery"

[nodes.operation.params]
url = "https://api.github.com"
method = "GET"
headers = { "User-Agent" = "Songbird/5.20.0 Pure-Rust-TLS" }
timeout_ms = 10000

[nodes.constraints]
timeout_ms = 15000
retry_count = 1

# Validation: Check all responses
[[nodes]]
id = "validate_https"
depends_on = ["https_cloudflare", "https_google", "https_github"]
output = "validation_result"

[nodes.operation]
name = "assert"

[nodes.operation.params]
# All should return HTTP 200 or 301/302 (redirects)
cloudflare_success = "outputs.cloudflare_response.status_code >= 200 && outputs.cloudflare_response.status_code < 400"
google_success = "outputs.google_response.status_code >= 200 && outputs.google_response.status_code < 400"
github_success = "outputs.github_response.status_code >= 200 && outputs.github_response.status_code < 400"

[nodes.constraints]
timeout_ms = 5000

# Summary: Log results
[[nodes]]
id = "summary"
depends_on = ["validate_https"]
output = "test_summary"

[nodes.operation]
name = "log.info"

[nodes.operation.params]
message = """
═══════════════════════════════════════════════════════════
🎉 TOWER ATOMIC HTTPS TEST COMPLETE!
═══════════════════════════════════════════════════════════

Cloudflare: ${outputs.cloudflare_response.status_code}
Google:     ${outputs.google_response.status_code}
GitHub:     ${outputs.github_response.status_code}

All HTTPS requests successful! 100% Pure Rust TLS working!
═══════════════════════════════════════════════════════════
"""

