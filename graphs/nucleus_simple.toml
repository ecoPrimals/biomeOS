# NUCLEUS Simple Deployment Graph
# =============================================================================
#
# Lightweight NUCLEUS: 5 core primals without the Onion/Mesh init steps.
# Use this for development or resource-constrained deployments.
#
# =============================================================================

[graph]
id = "nucleus_simple"
version = "1.0.0"
description = "Simple NUCLEUS: 5 core primals, sequential start, no Onion/Mesh init"
coordination = "Sequential"

# 1: BearDog (Security Foundation)
[[nodes]]
id = "beardog"
output = "beardog_ready"
capabilities = ["crypto", "security"]

[nodes.primal]
by_capability = "security"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
RUST_LOG = "beardog=info"

[nodes.constraints]
timeout_ms = 30000

# 2: Songbird (Network + Discovery)
[[nodes]]
id = "songbird"
depends_on = ["beardog"]
output = "songbird_ready"
capabilities = ["http", "discovery"]

[nodes.primal]
by_capability = "discovery"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
SONGBIRD_SECURITY_PROVIDER = "beardog"
RUST_LOG = "songbird=info"

[nodes.constraints]
timeout_ms = 30000

# 3: Toadstool (Compute)
[[nodes]]
id = "toadstool"
depends_on = ["songbird"]
output = "toadstool_ready"
capabilities = ["compute"]

[nodes.primal]
by_capability = "compute"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
RUST_LOG = "toadstool=info"

[nodes.constraints]
timeout_ms = 45000

# 4: NestGate (Storage)
[[nodes]]
id = "nestgate"
depends_on = ["songbird"]
output = "nestgate_ready"
capabilities = ["storage"]

[nodes.primal]
by_capability = "storage"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
RUST_LOG = "nestgate=info"

[nodes.constraints]
timeout_ms = 60000

# 5: Squirrel (AI)
[[nodes]]
id = "squirrel"
depends_on = ["songbird"]
output = "squirrel_ready"
capabilities = ["ai"]

[nodes.primal]
by_capability = "ai"

[nodes.operation]
name = "start"

[nodes.operation.params]
mode = "server"
family_id = "${FAMILY_ID}"

[nodes.operation.environment]
BEARDOG_SOCKET = "${XDG_RUNTIME_DIR}/biomeos/beardog-${FAMILY_ID}.sock"
RUST_LOG = "squirrel=info"

[nodes.constraints]
timeout_ms = 30000

# 6: Validate
[[nodes]]
id = "validate"
depends_on = ["toadstool", "nestgate", "squirrel"]
output = "nucleus_validated"

[nodes.operation]
name = "health_check"

[nodes.operation.params]
check_beardog = true
check_songbird = true
check_toadstool = true
check_nestgate = true
check_squirrel = true
timeout_seconds = 15

[nodes.constraints]
timeout_ms = 20000
