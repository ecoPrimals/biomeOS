# BiomeOS Federation Topology
# Pure Rust deployment configuration

metadata:
  name: "biomeos-3vm-federation"
  version: "1.0.0"
  description: "3-VM BiomeOS federation with primals"

network:
  bridge_name: "biomeos-br0"
  bridge_ip: "10.0.0.1/24"
  subnet: "10.0.0.0/24"

vms:
  - name: "tower1"
    memory: 2048  # MB
    cpus: 2
    disk_image: "vm-testing/tower1-primal.qcow2"
    ip_address: "10.0.0.10"
    mac_address: "52:54:00:00:00:01"
    serial_log: "vm-testing/tower1.log"

  - name: "tower2"
    memory: 2048
    cpus: 2
    disk_image: "vm-testing/tower2-primal.qcow2"
    ip_address: "10.0.0.11"
    mac_address: "52:54:00:00:00:02"
    serial_log: "vm-testing/tower2.log"

  - name: "tower3"
    memory: 2048
    cpus: 2
    disk_image: "vm-testing/tower3-primal.qcow2"
    ip_address: "10.0.0.12"
    mac_address: "52:54:00:00:00:03"
    serial_log: "vm-testing/tower3.log"

