# BiomeOS VM Federation Topology
# For benchScale libvirt backend

name: biomeos-vm-federation
description: "3-node BiomeOS VM federation for P2P coordination testing"

# VMs (libvirt domains)
nodes:
  - name: tower-01
    image: "biomeos:latest"  # Will use our ISO
    cpu: 1
    memory: 512M
    disk: 2G
    ip: 192.168.100.11
    labels:
      role: tower
      region: east
      primal: birdsong
    
  - name: tower-02
    image: "biomeos:latest"
    cpu: 1
    memory: 512M
    disk: 2G
    ip: 192.168.100.12
    labels:
      role: tower
      region: central
      primal: beardog
    
  - name: tower-03
    image: "biomeos:latest"
    cpu: 1
    memory: 512M
    disk: 2G
    ip: 192.168.100.13
    labels:
      role: tower
      region: west
      primal: songbird

# Network configuration
networks:
  - name: biomeos-mesh
    subnet: 192.168.100.0/24
    gateway: 192.168.100.1
    
    # Network simulation (optional)
    conditions:
      # Simulate internet latency between towers
      latency: 20ms
      jitter: 5ms
      bandwidth: 100mbit

# Test scenarios
tests:
  - name: boot-verification
    description: "Verify all VMs boot successfully"
    commands:
      - node: tower-01
        cmd: "uname -a"
        expect: "BiomeOS"
      - node: tower-02
        cmd: "uname -a"
        expect: "BiomeOS"
      - node: tower-03
        cmd: "uname -a"
        expect: "BiomeOS"
  
  - name: network-connectivity
    description: "Verify VMs can reach each other"
    commands:
      - node: tower-01
        cmd: "ping -c 3 192.168.100.12"
        expect: "0% packet loss"
      - node: tower-01
        cmd: "ping -c 3 192.168.100.13"
        expect: "0% packet loss"
  
  - name: primal-deployment
    description: "Deploy and verify primals"
    commands:
      - node: tower-01
        cmd: "/usr/local/bin/birdsong-discovery --version"
        expect: "birdsong"
      - node: tower-02
        cmd: "/usr/local/bin/beardog-client --version"
        expect: "beardog"
      - node: tower-03
        cmd: "/usr/local/bin/songbird-client --version"
        expect: "songbird"
  
  - name: p2p-coordination
    description: "Test P2P discovery and coordination"
    commands:
      - node: tower-01
        cmd: "birdsong-discovery scan --timeout 10"
        expect: "tower-02.*tower-03"
      - node: tower-02
        cmd: "beardog-client discover-peers"
        expect: "Found 2 peers"

# Deployment configuration
deployment:
  backend: libvirt  # Use libvirt backend for VMs
  provisioner: cloud-init
  
  # ISO image for VMs
  iso: "../biomeOS/dist/biomeos-20251227-144233.iso"
  
  # Cloud-init user-data for automated setup
  cloud_init:
    user: biomeos
    password: biomeos  # Change in production
    ssh_authorized_keys:
      - "{{ SSH_PUBLIC_KEY }}"
    
    # Run on first boot
    runcmd:
      - echo "BiomeOS VM initialized"
      - systemctl enable biomeos-init
      - systemctl start biomeos-init

