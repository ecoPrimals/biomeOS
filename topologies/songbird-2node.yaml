# Songbird P2P 2-Node Federation
# Simple topology for benchScale

name: songbird-federation
description: "2-node federation for Songbird P2P validation"

nodes:
  - name: songbird-vm1
    template: /var/lib/libvirt/images/rustdesk-ubuntu-22.04-template.qcow2
    memory: 2048  # 2GB
    cpus: 2
    disk: 10G
    
  - name: songbird-vm2
    template: /var/lib/libvirt/images/rustdesk-ubuntu-22.04-template.qcow2
    memory: 2048  # 2GB
    cpus: 2
    disk: 10G

# Cloud-init configuration
cloud_init:
  user: biomeos
  password: biomeos
  ssh_authorized_keys:
    - "{{ lookup_env('HOME') }}/.ssh/id_rsa.pub"
  
  # Install avahi for mDNS
  packages:
    - avahi-daemon
    - avahi-utils
  
  runcmd:
    - systemctl enable avahi-daemon
    - systemctl start avahi-daemon
    - echo "Songbird node ready" > /tmp/node-ready

network:
  type: bridge
  bridge: virbr0  # Default libvirt bridge

