# Niche Template: Gaming Tournament
# A complete competitive gaming infrastructure biome

niche:
  id: "gaming-tournament"
  name: "Gaming Tournament"
  version: "1.0.0"
  description: |
    Complete infrastructure for running competitive gaming tournaments.
    Includes low-latency networking, anti-cheat, replay storage, and 
    scalable matchmaking.
  
  category: "gaming"
  difficulty: "advanced"
  author: "biomeOS Team"
  
  features:
    - "Sub-5ms latency networking"
    - "Cryptographic anti-cheat"
    - "Automatic tournament brackets"
    - "Replay recording and storage"
    - "Scalable to 10,000+ concurrent players"
    - "GPU-accelerated game logic"

# Organisms in this niche
organisms:
  
  # The Gaming Mesh chimera handles most gaming infrastructure
  chimeras:
    gaming_mesh:
      type: "gaming-mesh"
      required: true
      config:
        songbird_count: "{{songbird_count}}"
        gpu_model: "{{gpu_model}}"
        max_players: "{{max_players}}"
      
      # Chimera-specific overrides
      fusion_overrides:
        secure_relay:
          max_overhead_us: 30  # Even tighter for competitive
        game_authority:
          frame_budget_ms: 8   # 120fps for competitive
  
  # Standalone primals for additional functionality
  primals:
    
    # BearDog for anti-cheat (separate from chimera's BTSP)
    anti_cheat:
      type: "beardog"
      required: true
      config:
        mode: "anti_cheat"
        sign_all_actions: true
        replay_window_ms: 500
        detect:
          - "speed_hack"
          - "wall_hack"
          - "aim_bot"
          - "replay_attack"
      dependencies: ["gaming_mesh"]
    
    # NestGate for replay storage
    replay_storage:
      type: "nestgate"
      required: true
      config:
        purpose: "replay_storage"
        compression: "zstd"
        retention_days: 30
        indexing:
          - "match_id"
          - "player_id"
          - "timestamp"
      dependencies: []
    
    # Squirrel for AI-assisted moderation (optional)
    ai_moderation:
      type: "squirrel"
      required: false
      config:
        purpose: "moderation"
        capabilities:
          - "toxicity_detection"
          - "cheat_pattern_recognition"
          - "player_behavior_analysis"
        privacy:
          local_only: true
          no_external_apis: true
      dependencies: ["anti_cheat"]

# Interactions between organisms
interactions:
  
  # Gaming mesh sends actions to anti-cheat
  - from: "chimeras.gaming_mesh"
    to: "primals.anti_cheat"
    type: "action_stream"
    config:
      verify_before_apply: true
      reject_on_failure: true
  
  # Anti-cheat violations go to AI moderation
  - from: "primals.anti_cheat"
    to: "primals.ai_moderation"
    type: "violation_events"
    config:
      severity_threshold: "medium"
  
  # Gaming mesh state goes to replay storage
  - from: "chimeras.gaming_mesh"
    to: "primals.replay_storage"
    type: "state_snapshots"
    config:
      interval_ticks: 60  # Every second at 60fps
      include_inputs: true
  
  # Replay storage provides to AI moderation for analysis
  - from: "primals.replay_storage"
    to: "primals.ai_moderation"
    type: "replay_access"
    config:
      on_demand: true

# Customization options for BYOB
customization:
  
  - id: "max_players"
    name: "Maximum Players"
    description: "Maximum concurrent players in tournament"
    type: "select"
    options: ["100", "1000", "5000", "10000"]
    default: "1000"
    required: true
  
  - id: "songbird_count"
    name: "Matchmaking Servers"
    description: "Number of Songbird instances for brackets"
    type: "number"
    min: 1
    max: 64
    default: 8
    required: true
  
  - id: "gpu_model"
    name: "GPU Requirement"
    description: "Minimum GPU for game authority"
    type: "select"
    options: ["any", "nvidia_gtx_1060", "nvidia_rtx_3060", "nvidia_rtx_4080"]
    default: "nvidia_gtx_1060"
    required: true
  
  - id: "anti_cheat_level"
    name: "Anti-Cheat Strictness"
    description: "How aggressive anti-cheat should be"
    type: "select"
    options: ["relaxed", "standard", "competitive", "paranoid"]
    default: "competitive"
    required: true
  
  - id: "enable_ai_moderation"
    name: "AI Moderation"
    description: "Enable AI-assisted cheat detection"
    type: "boolean"
    default: true
    required: false

# Resource requirements
resources:
  base:
    cpu_cores: 8
    memory_gb: 16
    storage_gb: 100
  
  per_player:
    cpu_millicores: 10
    memory_mb: 16
    storage_mb: 10
  
  gpu:
    required: true
    min_vram_gb: 4

# Networking
networking:
  mode: "mesh"
  ports:
    game_server: 7777
    matchmaking: 8080
    admin_api: 9090
    spectator: 8888
  
  requirements:
    latency_target_ms: 5
    jitter_tolerance_ms: 2
    packet_loss_tolerance_percent: 0.1

# Security
security:
  encryption: "beardog_btsp"
  authentication: "did_required"
  trust_model: "tofu_with_verification"
  audit_logging: true

