# RootPulse Biome Niche - BYOB Manifest

apiVersion: biomeOS/v1
kind: Niche
metadata:
  name: rootpulse
  displayName: "RootPulse - Emergent Version Control"
  version: "0.1.0"
  description: "Universal temporal tracking through primal coordination"
  author: "ecoPrimals"
  license: "AGPL-3.0"
  tags:
    - version-control
    - temporal-tracking
    - emergent
    - late-stage
  
spec:
  # Niche Type
  type: emergent-capability
  complexity: advanced
  maturity: experimental
  
  # Required Primals
  primals:
    required:
      - name: rhizoCrypt
        version: ">=0.13.0"
        capabilities:
          - ephemeral-workspace
          - dag-structure
          - lock-free-concurrency
        purpose: "Present/Future branching (DAG)"
        
      - name: loamSpine
        version: ">=0.1.0"
        capabilities:
          - linear-history
          - immutable-log
          - temporal-anchors
        purpose: "Past immutable history (Linear)"
        
      - name: nestGate
        version: ">=0.1.0"
        capabilities:
          - content-addressed-storage
          - zfs-backend
          - sovereign-storage
        purpose: "Content storage"
        
      - name: bearDog
        version: ">=0.9.0"
        capabilities:
          - unified-cryptography
          - ssh-integration
          - gpg-integration
          - lineage-proofs
        purpose: "Cryptographic substrate"
    
    optional:
      - name: sweetGrass
        version: ">=0.5.0"
        capabilities:
          - semantic-attribution
          - braiding
          - contribution-tracking
        purpose: "Semantic attribution (beyond line counts)"
        
      - name: songbird
        version: ">=3.0"
        capabilities:
          - federation
          - mdns-discovery
          - p2p-coordination
        purpose: "Federated discovery and collaboration"
        
      - name: squirrel
        version: ">=0.1.0"
        capabilities:
          - ai-assistance
          - intelligent-config
        purpose: "AI-powered workflow assistance"
        
      - name: petalTongue
        version: ">=0.1.0"
        capabilities:
          - visualization
          - timeline-view
          - graph-rendering
        purpose: "Visual and audio timeline representation"
  
  # Coordination Patterns
  coordination:
    # How primals work together
    workflows:
      - name: commit
        description: "Commit changes to version control"
        steps:
          - primal: rhizoCrypt
            action: create_ephemeral_snapshot
            output: dag_node
          - primal: bearDog
            action: sign_commit
            input: dag_node
            output: signed_commit
          - primal: nestGate
            action: store_content
            input: signed_commit
            output: content_hash
          - primal: loamSpine
            action: append_linear_history
            input: content_hash
            output: history_entry
          - primal: sweetGrass
            action: attribute_contribution
            input: signed_commit
            optional: true
      
      - name: branch
        description: "Create a new branch"
        steps:
          - primal: rhizoCrypt
            action: create_dag_branch
            output: branch_ref
          - primal: bearDog
            action: sign_branch
            input: branch_ref
          - primal: nestGate
            action: store_ref
            input: signed_branch
      
      - name: merge
        description: "Merge branches"
        steps:
          - primal: rhizoCrypt
            action: merge_dag_branches
            output: merge_node
          - primal: bearDog
            action: sign_merge
            input: merge_node
          - primal: loamSpine
            action: record_merge
            input: signed_merge
          - primal: sweetGrass
            action: attribute_merge_contributors
            optional: true
      
      - name: federate
        description: "Federated synchronization"
        steps:
          - primal: songbird
            action: discover_peers
            output: peer_list
          - primal: nestGate
            action: sync_content
            input: peer_list
          - primal: loamSpine
            action: validate_history
          - primal: bearDog
            action: verify_signatures
  
  # Configuration
  configuration:
    # Temporal settings
    temporal:
      resolution: auto  # auto, nanosecond, microsecond, millisecond, second, minute, hour, day
      dag_retention: 30d  # How long to keep DAG branches before dehydration
      linear_anchors:
        - crypto  # Cryptographic timestamps
        - causal  # Causal ordering
        - consensus  # Optional consensus anchors
    
    # Storage settings
    storage:
      backend: zfs  # ZFS via NestGate
      compression: true
      deduplication: true
      content_addressing: sha256
    
    # Cryptography
    cryptography:
      signing: required
      encryption: optional
      lineage: enabled
      unified_keys: true  # BearDog unified SSH+GPG
    
    # Attribution
    attribution:
      semantic: true  # Use SweetGrass
      track_ai_contributions: true
      braid_complexity: auto
    
    # Federation
    federation:
      enabled: true
      discovery: mdns  # Via Songbird
      sync_mode: pull  # pull, push, both
  
  # Deployment
  deployment:
    strategy: coordinate  # BiomeOS coordinates existing primals
    
    # No new services to deploy
    services: []
    
    # Environment variables for coordination
    environment:
      ROOTPULSE_STORAGE_BACKEND: "${NESTGATE_URL}"
      ROOTPULSE_CRYPTO_BACKEND: "${BEARDOG_PATH}"
      ROOTPULSE_DAG_BACKEND: "${RHIZOCRYPT_URL}"
      ROOTPULSE_LINEAR_BACKEND: "${LOAMSPINE_URL}"
      ROOTPULSE_ATTRIBUTION: "${SWEETGRASS_URL}"
      ROOTPULSE_FEDERATION: "${SONGBIRD_URL}"
    
    # Resource requirements (aggregate)
    resources:
      cpu: 2-4 cores  # Distributed across primals
      memory: 4-8GB   # Distributed across primals
      disk: 10GB+     # For content storage (NestGate)
      network: 100Mbps+  # For federation (Songbird)
  
  # Interfaces
  interfaces:
    # CLI (primary interface)
    cli:
      command: rootpulse
      install: |
        # BiomeOS generates unified CLI wrapper
        biomeos niche interface rootpulse --type cli
      
      commands:
        - init: "Initialize RootPulse workspace"
        - commit: "Commit changes"
        - branch: "Create/switch branches"
        - merge: "Merge branches"
        - log: "Show history (linear)"
        - dag: "Show DAG (ephemeral)"
        - push: "Push to federation"
        - pull: "Pull from federation"
        - status: "Show workspace status"
    
    # API (programmatic access)
    api:
      type: REST
      port: auto  # BiomeOS assigns
      endpoints:
        - POST /commit
        - POST /branch
        - POST /merge
        - GET /log
        - GET /dag
        - GET /status
    
    # UI (visualization)
    ui:
      primal: petalTongue
      features:
        - timeline-view
        - dag-visualization
        - contribution-graph
        - audio-sonification
  
  # Health & Monitoring
  health:
    checks:
      - primal: rhizoCrypt
        endpoint: /health
        required: true
      - primal: loamSpine
        endpoint: /health
        required: true
      - primal: nestGate
        endpoint: /health
        required: true
      - primal: bearDog
        command: --version
        required: true
      - primal: sweetGrass
        endpoint: /health
        required: false
      - primal: songbird
        endpoint: /health
        required: false
  
  # Testing
  testing:
    scenarios:
      - name: basic-workflow
        description: "Init, commit, branch, merge"
        steps:
          - command: rootpulse init
          - command: rootpulse commit -m "Test"
          - command: rootpulse branch test
          - command: rootpulse merge test
      
      - name: federation
        description: "Multi-tower collaboration"
        requires:
          - songbird
        steps:
          - command: rootpulse init
          - command: rootpulse push
          - tower: remote
            command: rootpulse pull
  
  # Documentation
  documentation:
    whitepaper: "whitePaper_RootPulse/"
    quickstart: "niches/rootpulse/QUICKSTART.md"
    api: "niches/rootpulse/API.md"
    examples: "niches/rootpulse/examples/"
  
  # Success Criteria
  success:
    required:
      - "All required primals discovered"
      - "Basic workflow (init, commit, branch) working"
      - "Content stored in NestGate"
      - "Commits signed by BearDog"
    
    optional:
      - "Semantic attribution via SweetGrass"
      - "Federation via Songbird"
      - "Visualization via PetalTongue"
  
  # Known Gaps
  gaps:
    critical:
      - "LoamSpine primal not yet implemented (linear history)"
      - "Dehydration engine not yet built"
      - "CLI wrapper needs generation"
    
    minor:
      - "Git migration tools not yet created"
      - "Performance benchmarks needed"
      - "Production hardening required"

---

# Usage

## Deploy RootPulse Niche

```bash
# Deploy via BiomeOS
biomeos niche deploy rootpulse-niche.yaml

# BiomeOS will:
# 1. Discover all required primals
# 2. Validate capabilities
# 3. Generate unified CLI
# 4. Coordinate primal interactions
# 5. Expose RootPulse interface
```

## Use RootPulse

```bash
# Traditional VCS workflow
rootpulse init
echo "code" > file.rs
rootpulse commit -m "Initial commit"
rootpulse branch feature/new
rootpulse merge feature/new

# Universal temporal tracking
rootpulse track --type art --resolution minute
rootpulse track --type experiment --resolution nanosecond
rootpulse track --type ceremony --resolution day
```

## Visualize

```bash
# Timeline view (PetalTongue)
rootpulse ui timeline

# DAG view
rootpulse ui dag

# Linear history
rootpulse log --linear
```

