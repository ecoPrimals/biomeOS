[package]
name = "biomeos-graph"
version = "0.1.0"
edition = "2021"
description = "Type-safe ingestion layer for Neural API deployment graphs"
license = "AGPL-3.0-only"
repository = "https://github.com/ecoPrimals/biomeOS"
keywords = ["biomeOS", "graph", "deployment", "toml"]
categories = ["config"]

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Async & Events (for events.rs GraphEventBroadcaster)
tokio = { version = "1.34", features = ["sync", "time"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"

# biomeOS internal crates
biomeos-types = { path = "../biomeos-types" }
biomeos-nucleus = { path = "../biomeos-nucleus" }

[dev-dependencies]
# Testing
tempfile = "3.10"

[features]
default = []

# Enable async execution
async = []
