[package]
name = "biomeos-graph"
version = "0.1.0"
edition = "2021"
description = "Type-safe ingestion layer for Neural API deployment graphs"
license = "AGPL-3.0-or-later"
repository = "https://github.com/ecoPrimals/biomeOS"
keywords = ["biomeOS", "graph", "deployment", "toml"]
categories = ["config"]

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Error handling
thiserror = "1.0"

[dev-dependencies]
# Testing
tempfile = "3.10"

[features]
default = []

# Enable async execution
async = []
