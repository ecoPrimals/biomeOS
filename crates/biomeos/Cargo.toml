[package]
name = "biomeos-unibin"
version = "0.1.0"
edition = "2021"
license = "AGPL-3.0-only"
description = "biomeOS Universal Nucleus & Orchestrator - UniBin"
authors = ["biomeOS Team"]

[[bin]]
name = "biomeos"
path = "src/main.rs"

[dependencies]
# Mode implementations (as libraries)
biomeos-api = { path = "../biomeos-api", version = "0.1.0" }
biomeos-atomic-deploy = { path = "../biomeos-atomic-deploy", version = "0.1.0" }
biomeos-core = { path = "../biomeos-core", version = "0.1.0" }
biomeos-types = { path = "../biomeos-types", version = "0.1.0" }
biomeos-spore = { path = "../biomeos-spore", version = "0.1.0" }
biomeos-graph = { path = "../biomeos-graph", version = "0.1.0" }
biomeos-genomebin-v3 = { path = "../biomeos-genomebin-v3", version = "3.0.0" }

# CLI framework
clap = { version = "4.0", features = ["derive", "color"] }

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# Time
chrono = { workspace = true }

# System info for doctor mode (pure Rust via /proc - ecoBin v3)
rustix = { version = "0.38", features = ["fs"] }

# Formatting
colored = "2.0"
comfy-table = "7.0"

# Encoding
base64 = { workspace = true }

# Directory utilities - Pure Rust!
# dirs = "5.0"  # DEPRECATED: Uses dirs-sys (C dependency)
etcetera = "0.8"  # Pure Rust replacement

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils" }
tempfile = "3.8"

