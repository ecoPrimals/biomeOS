[package]
name = "biomeos-unibin"
version = "0.1.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true
description = "biomeOS Universal Nucleus & Orchestrator - UniBin"
authors = ["biomeOS Team"]

[[bin]]
name = "biomeos"
path = "src/main.rs"

[dependencies]
# Mode implementations (as libraries)
biomeos-api = { path = "../biomeos-api", version = "0.1.0" }
biomeos-atomic-deploy = { path = "../biomeos-atomic-deploy", version = "0.1.0" }
biomeos-core = { path = "../biomeos-core", version = "0.1.0" }
biomeos-types = { path = "../biomeos-types", version = "0.1.0" }
biomeos-spore = { path = "../biomeos-spore", version = "0.1.0" }
biomeos-graph = { path = "../biomeos-graph", version = "0.1.0" }
biomeos-genomebin-v3 = { path = "../biomeos-genomebin-v3", version = "3.0.0" }

# CLI framework
clap = { workspace = true, features = ["color"] }

# Async runtime
tokio = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = ["json"] }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }

# Time
chrono = { workspace = true }

# System info for doctor mode (pure Rust via /proc - ecoBin v3)
rustix = { workspace = true, features = ["fs"] }

# Formatting
colored = { workspace = true }
comfy-table = { workspace = true }

# Encoding
base64 = { workspace = true }

# Cryptographic randomness
rand = { workspace = true }

# Directory utilities - Pure Rust!
# dirs = "5.0"  # DEPRECATED: Uses dirs-sys (C dependency)
etcetera = { workspace = true }  # Pure Rust replacement

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils", version = "0.1.0" }
tempfile = { workspace = true }

[lints]
workspace = true
