[package]
name = "biomeos-atomic-deploy"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.35", features = ["full"] }
tracing = "0.1"
thiserror = "1.0"
nix = { version = "0.29", features = ["signal", "user"] }

# biomeOS crates
biomeos-spore = { path = "../biomeos-spore" }
biomeos-core = { path = "../biomeos-core" }
biomeos-federation = { path = "../biomeos-federation" }
chrono = "0.4"
toml = "0.8"  # For Neural API graph parsing

# Neural API integration (TODO: Create neural-api-client crate)
# neural-api-client = { path = "../neural-api-client" }

[dev-dependencies]
tempfile = "3.8"
tokio-test = "0.4"
rand = "0.8"

