[package]
name = "biomeos-atomic-deploy"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.35", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }  # For binaries
thiserror = "1.0"
nix = { version = "0.29", features = ["signal", "user"] }
users = "0.11"  # For Neural API server
sysinfo = "0.32"  # For system metrics
regex = "1.11"  # For socket pattern matching
rand = "0.8"  # For JWT secret generation
base64 = "0.22"  # For JWT secret encoding

# biomeOS crates
biomeos-spore = { path = "../biomeos-spore" }
biomeos-core = { path = "../biomeos-core" }
biomeos-federation = { path = "../biomeos-federation" }
biomeos-types = { path = "../biomeos-types" }
biomeos-graph = { path = "../biomeos-graph" }
chrono = "0.4"
uuid = { version = "1.11", features = ["v4"] }  # For request ID generation
toml = "0.8"  # For Neural API graph parsing

# Neural API integration (TODO: Create neural-api-client crate)
# neural-api-client = { path = "../neural-api-client" }

[dev-dependencies]
tempfile = "3.8"
tokio-test = "0.4"
rand = "0.8"

