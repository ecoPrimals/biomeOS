[package]
name = "biomeos-api"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework
axum = "0.7"
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
futures = "0.3"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Internal dependencies
biomeos-core = { path = "../biomeos-core" }
biomeos-types = { path = "../biomeos-types" }

# Async utilities
async-trait = "0.1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "1"

# HTTP client (for querying primals)
reqwest = { version = "0.11", features = ["json"] }

# Configuration
config = "0.14"

[dev-dependencies]
reqwest = { version = "0.12", features = ["json"] }
