[package]
name = "biomeos-api"
version = "0.1.0"
edition = "2021"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["ws"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }

# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tokio-util = { version = "0.7", features = ["compat"] }
futures = "0.3"

# HTTP server (for Unix socket support)
hyper = { version = "1", features = ["server", "http1"] }
hyper-util = { version = "0.1", features = ["tokio", "server", "server-auto"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Internal dependencies
biomeos-core = { path = "../biomeos-core" }
biomeos-types = { path = "../biomeos-types" }
biomeos-graph = { path = "../biomeos-graph" }
biomeos-spore = { path = "../biomeos-spore" }

# Async utilities
async-trait = "0.1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1"
thiserror = "1"

# HTTP client DEPRECATED: Use atomic_client (Unix sockets) for primal queries
# reqwest = { version = "0.11", features = ["json"] } # REMOVED - Use Songbird/BearDog

# Configuration
config = "0.14"

# WebSocket support (JSON-RPC 2.0 over WebSocket)
tokio-tungstenite = "0.21"
futures-util = "0.3"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
# Testing HTTP client - can be used for Tower atomic benchmarks
reqwest = { version = "0.12", features = ["json"], optional = false } # For testing/benchmarking only
