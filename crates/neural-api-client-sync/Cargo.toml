version = "0.1.0"
edition.workspace = true
license = "AGPL-3.0-only"
repository = "https://github.com/ecoPrimals/biomeOS"

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }

[dev-dependencies]
tempfile = "3.8"

[lints]
workspace = true
