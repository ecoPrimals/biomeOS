[package]
name = "biomeos-test-utils"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-only"

[dependencies]
# Core dependencies
tokio = { workspace = true, features = ["full", "test-util"] }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Testing
tempfile = { workspace = true }
wiremock = "0.6"

# HTTP server for mocks
axum = { workspace = true }
tower = { workspace = true }

# Async
async-trait = { workspace = true }
futures = { workspace = true }

# Utilities
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
hyper = { workspace = true }  # Pure Rust HTTP client for testing
hyper-util = { version = "0.1", features = ["client-legacy", "http1", "tokio"] }  # HTTP client utilities
http-body-util = "0.1"  # Body utilities for hyper
# Testing HTTP client - for benchmarks comparing Tower atomic vs HTTP
# reqwest = { workspace = true } # REMOVED (TRUE ecoBin v2.0): Use atomic_client for Pure Rust testing

[lints]
workspace = true
