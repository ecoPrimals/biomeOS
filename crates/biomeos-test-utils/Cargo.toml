[package]
name = "biomeos-test-utils"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
rust-version.workspace = true

[dependencies]
# Core dependencies
tokio = { workspace = true, features = ["full", "test-util"] }
anyhow = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Testing
tempfile = { workspace = true }
wiremock = { workspace = true }

# HTTP server for mocks
axum = { workspace = true }
tower = { workspace = true }

# Async
async-trait = { workspace = true }
futures = { workspace = true }

# Utilities
tracing = { workspace = true }
uuid = { workspace = true }

[dev-dependencies]
tokio-test = { workspace = true }
hyper = { workspace = true }  # Pure Rust HTTP client for testing
hyper-util = { workspace = true, features = ["client-legacy", "http1", "tokio"] }  # HTTP client utilities
http-body-util = { workspace = true }  # Body utilities for hyper
# Testing HTTP client - for benchmarks comparing Tower atomic vs HTTP
# reqwest = { workspace = true } # REMOVED (TRUE ecoBin v2.0): Use atomic_client for Pure Rust testing

