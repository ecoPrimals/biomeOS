# HTTP client DEPRECATED: Use atomic_client (Unix sockets) for BearDog/Songbird
# # reqwest = { workspace = true }  # REMOVED: Use Tower Atomic (Songbird + BearDog) for Pure Rust HTTPS # REMOVED - Songbird/BearDog handle HTTP/TLS
base64 = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
