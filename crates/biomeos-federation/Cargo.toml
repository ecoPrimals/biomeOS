[package]
name = "biomeos-federation"
version = "0.1.0"
edition = "2021"
description = "BiomeOS Federation Services"
authors = ["BiomeOS Team"]
license = "MIT OR Apache-2.0"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
anyhow = "1.0"
tracing = "0.1"

[dependencies.biomeos-types]
path = "../biomeos-types"
