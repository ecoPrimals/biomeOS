[package]
name = "biomeos-system"
version.workspace = true
edition.workspace = true
authors = ["biomeOS Team"]
description = "System information and monitoring utilities for biomeOS using the unified type system"
license.workspace = true
rust-version.workspace = true
repository = "https://github.com/your-org/biomeos"

[dependencies]
# Unified types from biomeos ecosystem
biomeos-types = { path = "../biomeos-types", version = "0.1.0" }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Date/time handling
chrono = { workspace = true }

# UUID support
uuid = { workspace = true }

# Async runtime
tokio = { workspace = true, features = ["test-util"] }

# Structured logging
tracing = { workspace = true }

# System information utilities (pure Rust - ecoBin v3)
gethostname = { workspace = true }
rustix = { workspace = true, features = ["fs", "mount"] }

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils", version = "0.1.0" }
tokio-test = { workspace = true }

[features]
default = []

[lints]
workspace = true
