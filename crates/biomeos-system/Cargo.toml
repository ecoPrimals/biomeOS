[package]
name = "biomeos-system"
version = "0.1.0"
edition = "2021"
authors = ["biomeOS Team"]
description = "System information and monitoring utilities for biomeOS using the unified type system"
license = "AGPL-3.0-only"
repository = "https://github.com/your-org/biomeos"

[dependencies]
# Unified types from biomeos ecosystem
biomeos-types = { path = "../biomeos-types", version = "0.1.0" }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Date/time handling
chrono = { version = "0.4", features = ["serde"] }

# UUID support
uuid = { version = "1.6", features = ["v4", "serde"] }

# Async runtime
tokio = { version = "1.0", features = ["full"] }

# System information utilities (pure Rust - ecoBin v3)
hostname = "0.3"
rustix = { version = "0.38", features = ["fs", "mount"] }

[dev-dependencies]
tokio-test = "0.4"

[features]
default = []
