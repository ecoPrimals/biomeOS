[package]
name = "biomeos-manifest"
version = "0.1.0"
edition = "2021"
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
description = "biomeOS manifest (biome.yaml) parsing, validation, and execution"

[dependencies]
# Core functionality
biomeos-core = { path = "../biomeos-core" }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
uuid = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
anyhow = { workspace = true }
thiserror = "1.0"
tracing = "0.1"

# Async traits
async-trait = "0.1"

# Validation
validator = { workspace = true }
jsonschema = "0.17"

# Configuration
config = { workspace = true }

# HTTP client and archive handling
reqwest = { version = "0.11", features = ["json", "stream"] }
flate2 = "1.0"
tar = "0.4"
zip = "0.6"
regex = "1.10"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"
pretty_assertions = "1.0" 