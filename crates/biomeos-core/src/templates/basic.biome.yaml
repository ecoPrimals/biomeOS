apiVersion: biomeOS/v1
kind: Biome
metadata:
  name: basic-biome
  version: "1.0.0"
  description: "Basic biome deployment template"
  owner: "team-name"

services:
  web-service:
    primal: toadstool
    runtime: native
    command: ["./web-server"]
    environment:
      PORT: "8080"
      ENV: "development"
    resources:
      cpu: 1.0
      memory: 1073741824  # 1GB
    health_check:
      command: ["curl", "-f", "http://localhost:8080/health"]
      interval_secs: 30
      timeout_secs: 5
      retries: 3

  data-service:
    primal: nestgate
    runtime: native
    command: ["./data-server"]
    environment:
      DB_PATH: "/data/app.db"
    resources:
      cpu: 0.5
      memory: 536870912  # 512MB
      disk: 5368709120   # 5GB
    depends_on:
      - web-service

networking:
  discovery: true
  load_balancing: true

resources:
  cpu: 2.0
  memory: 2147483648  # 2GB total
  disk: 10737418240   # 10GB total 