[package]
name = "biomeos-core"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Core biomeOS functionality"

[[bin]]
name = "tower"
path = "src/bin/tower.rs"

[dependencies]
# Core async and serialization
anyhow = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
uuid = { version = "1.6", features = ["v4", "serde"] }
chrono = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = "0.3"
reqwest = { workspace = true }
futures = "0.3"
clap = { version = "4.5", features = ["derive", "env"] }

# Configuration and environment
config = { workspace = true }
dirs = { workspace = true }
toml = "0.8"

# Utilities
itertools = { workspace = true }
once_cell = { workspace = true }
base64 = "0.22"
sha2 = "0.10"
semver = { version = "1.0", features = ["serde"] }
url = "2.5"
zeroize = { version = "1.7", features = ["derive"] }
rand = "0.8"
hostname = "0.4"
glob = "0.3"

# biomeOS dependencies
biomeos-types = { path = "../biomeos-types" }
biomeos-primal-sdk = { path = "../biomeos-primal-sdk" }
biomeos-graph = { path = "../biomeos-graph" }
biomeos-manifest = { path = "../biomeos-manifest" }

[dev-dependencies]
# Testing framework
mockall = { workspace = true }
tokio-test = "0.4"
wiremock = "0.6" 
tempfile = { workspace = true }
criterion = { workspace = true }

# Test utilities
serde_json = { workspace = true }
tracing-test = "0.2"
