[package]
name = "biomeos-spore"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "biomeOS USB spore management - orchestration layer only"

[dependencies]
# Core async and serialization
tokio = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
toml = "0.8"  # For manifest files

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# File I/O and system
rand = { workspace = true }  # For entropy generation only
gethostname = { workspace = true }  # For node identification

# Genetic derivation (sibling seeds)
sha2 = { workspace = true }  # For SHA256-based seed derivation
getrandom = "0.2"  # For secure random nonce generation
serde_bytes = "0.11"  # For binary data serialization
hex = "0.4"  # For hex encoding
uuid = { workspace = true }  # For unique IDs
async-fs = "2.1"  # For async file operations

# biomeOS dependencies
biomeos-types = { path = "../biomeos-types" }

# Logging
tracing = { workspace = true }

# NOTE: Genetic derivation uses SHA256 for seed mixing
# BearDog still handles all cryptographic operations on the seeds

[dev-dependencies]
tokio-test = "0.4"
tempfile = { workspace = true }
futures = "0.3"

