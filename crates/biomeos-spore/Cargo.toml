[package]
name = "biomeos-spore"
version.workspace = true
edition.workspace = true
authors.workspace = true
license = "AGPL-3.0-only"
description = "biomeOS USB spore management - orchestration layer only"

[dependencies]
# Core biomeOS dependencies
biomeos-core = { path = "../biomeos-core", version = "0.1.0" }

# Core async and serialization
tokio = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
toml = "0.8"  # For manifest files

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# File I/O and system
rand = { workspace = true }  # For entropy generation only
gethostname = { workspace = true }  # For node identification

# Genetic derivation (sibling seeds)
sha2 = { workspace = true }  # For SHA256-based seed derivation
bytes = { version = "1", features = ["serde"] }  # Zero-copy binary data
getrandom = "0.2"  # For secure random nonce generation
serde_bytes = "0.11"  # For binary data serialization
base64 = "0.22"  # For beacon encoding
rustix = { version = "0.38", features = ["fs", "process"] }  # statvfs + kill for rollback
hex = "0.4"  # For hex encoding
uuid = { workspace = true }  # For unique IDs
async-fs = "2.1"  # For async file operations

# biomeOS dependencies
biomeos-types = { path = "../biomeos-types", version = "0.1.0" }

# Logging
tracing = { workspace = true }

# NOTE: Genetic derivation uses SHA256 for seed mixing
# BearDog still handles all cryptographic operations on the seeds

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils" }
tokio-test = "0.4"
tempfile = { workspace = true }
futures = "0.3"
tracing-subscriber = { workspace = true }
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "dark_forest_benches"
harness = false

