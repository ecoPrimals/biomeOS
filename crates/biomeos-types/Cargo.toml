[package]
name = "biomeos-types"
version = "0.1.0"
edition.workspace = true
authors = ["biomeOS Team"]
description = "Unified type system for the biomeOS ecosystem"
license = "AGPL-3.0-only"
repository = "https://github.com/your-org/biomeos"

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml.workspace = true
bytes = { version = "1.0", features = ["serde"] }
base64 = { workspace = true }

# RPC framework (tarpc for high-performance binary RPC)
tarpc = { version = "0.37", features = ["serde-transport", "serde-transport-bincode", "tokio1"] }

# Date/time handling
chrono = { version = "0.4", features = ["serde"] }

# UUID support
uuid = { version = "1.6", features = ["v4", "serde"] }

# URL parsing and validation
url = { version = "2.5", features = ["serde"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Async support
tokio = { workspace = true }
async-trait = "0.1"

# Collections and utilities
indexmap = { version = "2.0", features = ["serde"] }

# XDG directory support
# dirs = "5.0"  # DEPRECATED: Uses dirs-sys (C dependency)
etcetera = "0.8"  # Pure Rust replacement for dirs

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils", version = "0.1.0" }
tempfile = "3.8"
proptest = "1"
serial_test = "3.2"

[features]
default = []
# Optional features for advanced functionality
validation = []
metrics = [] 
[lints]
workspace = true
