[package]
name = "biomeos-types"
version = "0.1.0"
edition.workspace = true
authors = ["biomeOS Team"]
description = "Unified type system for the biomeOS ecosystem"
license.workspace = true
rust-version.workspace = true
repository = "https://github.com/your-org/biomeos"

[dependencies]
# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml.workspace = true
bytes = { workspace = true, features = ["serde"] }
base64 = { workspace = true }

# RPC framework (tarpc for high-performance binary RPC)
tarpc = { workspace = true }

# Date/time handling
chrono = { workspace = true }

# UUID support
uuid = { workspace = true }

# URL parsing and validation
url = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Async support
tokio = { workspace = true }
async-trait = { workspace = true }

# Collections and utilities
indexmap = { workspace = true }

# XDG directory support
# dirs = "5.0"  # DEPRECATED: Uses dirs-sys (C dependency)
etcetera = { workspace = true }  # Pure Rust replacement for dirs

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils", version = "0.1.0" }
tempfile = { workspace = true }
proptest = { workspace = true }

[features]
default = []
# Optional features for advanced functionality
validation = []
metrics = [] 
[lints]
workspace = true
