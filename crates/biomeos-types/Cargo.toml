[package]
name = "biomeos-types"
version = "0.1.0"
edition = "2021"
authors = ["biomeOS Team"]
description = "Unified type system for the biomeOS ecosystem"
license = "MIT OR Apache-2.0"
repository = "https://github.com/your-org/biomeos"

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# Date/time handling
chrono = { version = "0.4", features = ["serde"] }

# UUID support
uuid = { version = "1.6", features = ["v4", "serde"] }

# Error handling
thiserror = "1.0"

# Async support
tokio = { version = "1.0", features = ["full"] }
async-trait = "0.1"

# Collections and utilities
indexmap = { version = "2.0", features = ["serde"] }

[features]
default = []
# Optional features for advanced functionality
validation = []
metrics = [] 