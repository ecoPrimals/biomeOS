[package]
name = "neural-api-client"
version = "0.1.0"
edition = "2021"
authors = ["biomeOS Team"]
description = "Pure Rust client for Neural API capability-based routing"
license = "MIT OR Apache-2.0"

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.35", features = ["net", "io-util"] }
thiserror = "1.0"

[dev-dependencies]
tokio = { version = "1.35", features = ["full"] }
tokio-test = "0.4"

