[package]
name = "neural-api-client"
version = "0.1.0"
edition.workspace = true
authors = ["biomeOS Team"]
description = "Pure Rust client for Neural API capability-based routing"
license = "AGPL-3.0-only"

[dependencies]
anyhow = "1.0"
biomeos-types = { path = "../biomeos-types" }
bytes = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.35", features = ["net", "io-util"] }
thiserror = "1.0"

[dev-dependencies]
tempfile = "3.10"
tokio = { version = "1.35", features = ["full"] }
tokio-test = "0.4"


[lints]
workspace = true
