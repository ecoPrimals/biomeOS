[package]
name = "genomebin-stub"
version = "0.1.0"
edition = "2021"

# Don't inherit workspace settings - standalone crate
[workspace]

[[bin]]
name = "genomebin-stub"
path = "main.rs"

[dependencies]
anyhow = "1.0"
bincode = "1.3"
zstd = "0.13"
sha2 = "0.10"
hex = "0.4"
tempfile = "3.0"
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Re-use types from main crate
biomeos-genomebin-v3 = { path = ".." }

[profile.release]
opt-level = "z"      # Optimize for size
lto = true           # Link-time optimization
codegen-units = 1    # Single codegen unit for smaller binary
panic = "abort"      # Abort on panic (smaller)
strip = true         # Strip symbols
