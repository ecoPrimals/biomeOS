# Static linking configuration for biomeos-boot binaries
# This is critical for biomeos-init which runs as PID 1 without libraries

[build]
# Use musl for fully static binaries
# rustflags = ["-C", "target-feature=+crt-static"]

[target.x86_64-unknown-linux-gnu]
# Static linking flags for glibc-based systems
rustflags = [
    "-C", "link-arg=-static-libgcc",
    "-C", "link-arg=-static-libstdc++",
    "-C", "target-feature=+crt-static",
]

# For fully static build with musl (alternative approach)
# [target.x86_64-unknown-linux-musl]
# rustflags = ["-C", "target-feature=+crt-static"]

