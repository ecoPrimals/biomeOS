[package]
name = "biomeos-ui"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Interactive UI orchestration for biomeOS - network effect of multiple primals"
license.workspace = true
rust-version.workspace = true

[dependencies]
# Core biomeOS
biomeos-core = { path = "../biomeos-core", version = "0.1.0" }
biomeos-types = { path = "../biomeos-types", version = "0.1.0" }

# Async runtime
tokio = { workspace = true, features = ["net", "io-util", "fs"] }
tokio-stream = { workspace = true }

# WebSocket client for real-time events (Pure Rust)
tokio-tungstenite = { workspace = true }
futures-util = { workspace = true }

# HTTP client REMOVED - External HTTP requests go through Songbird
# SSE support stubbed until Songbird exposes streaming

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Collections
indexmap = { workspace = true }

# System info (statvfs for disk usage, pure Rust via rustix)
rustix = { workspace = true, features = ["fs"] }

# Time
chrono = { workspace = true }

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils", version = "0.1.0" }
tokio-test = { workspace = true }
tempfile = { workspace = true }


[lints]
workspace = true
