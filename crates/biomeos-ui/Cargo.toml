[package]
name = "biomeos-ui"
version = "0.1.0"
edition.workspace = true
authors = ["biomeOS Contributors"]
description = "Interactive UI orchestration for biomeOS - network effect of multiple primals"
license = "AGPL-3.0-only"

[dependencies]
# Core biomeOS
biomeos-core = { path = "../biomeos-core", version = "0.1.0" }
biomeos-types = { path = "../biomeos-types", version = "0.1.0" }

# Async runtime
tokio = { workspace = true }
tokio-stream = "0.1"

# WebSocket client for real-time events (Pure Rust)
tokio-tungstenite = "0.21"
futures-util = "0.3"

# HTTP client REMOVED - External HTTP requests go through Songbird
# SSE support stubbed until Songbird exposes streaming

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Collections
indexmap = "2.0"

# System info (statvfs for disk usage, pure Rust via rustix)
rustix = { version = "0.38", features = ["fs"] }

# Time
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
biomeos-test-utils = { path = "../biomeos-test-utils", version = "0.1.0" }
tokio-test = "0.4"
tempfile = "3.0"


[lints]
workspace = true
