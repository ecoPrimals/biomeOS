[package]
name = "biomeos-ui"
version = "0.1.0"
edition = "2021"
authors = ["biomeOS Contributors"]
description = "Interactive UI orchestration for biomeOS - network effect of multiple primals"
license = "AGPL-3.0-only"

[dependencies]
# Core biomeOS
biomeos-core = { path = "../biomeos-core" }
biomeos-types = { path = "../biomeos-types" }

# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"

# WebSocket client for real-time events (Pure Rust)
tokio-tungstenite = "0.21"
futures-util = "0.3"

# HTTP client REMOVED - External HTTP requests go through Songbird
# SSE support stubbed until Songbird exposes streaming

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Collections
indexmap = "2.0"

# Time
chrono = { version = "0.4", features = ["serde"] }

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3.0"

