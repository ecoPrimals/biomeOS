[package]
name = "biomeos-ui"
version = "0.1.0"
edition = "2021"
description = "Universal AI-first UI for biomeOS ecosystem"
license = "MIT OR Apache-2.0"
repository = "https://github.com/sovereignscience/biomeOS"

[dependencies]
# Core dependencies
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1.0"
thiserror = "1.0"

# HTTP client for API communication
reqwest = { version = "0.11", features = ["json", "stream"] }
url = "2.4"

# UI Framework - using Tauri for cross-platform desktop app
tauri = { version = "1.0", features = ["api-all"] }
tauri-build = "1.0"

# Web technologies for UI
wry = "0.24"
tao = "0.16"

# Real-time communication
tokio-tungstenite = "0.20"
futures-util = "0.3"

# Configuration management
config = "0.14"
dirs = "5.0"

# Async utilities
async-trait = "0.1"
futures = "0.3"

# JSON handling and templating
handlebars = "4.4"
tera = "1.19"

# Terminal UI components (for CLI mode)
crossterm = "0.27"
ratatui = "0.24"

# AI integration
openai-api-rs = "0.1"

# Workspace dependencies
biomeos-core = { path = "../biomeos-core" }

[dev-dependencies]
tokio-test = "0.4"
mockall = "0.11"

[build-dependencies]
tauri-build = { version = "1.0", features = [] }

[features]
default = ["desktop-ui"]
desktop-ui = ["tauri"]
terminal-ui = ["ratatui", "crossterm"]
web-ui = ["wry"]
ai-enhanced = ["openai-api-rs"] 